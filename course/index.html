        "title": "Spring Data JpaRepository: CRUD for Free",
        "body": "Here's the part that feels like cheating. You declare a repository as an <strong>interface</strong> that extends <code>JpaRepository&lt;PriorAuth, Long&gt;</code> (the entity type and its id type) \u2014 and you write no implementation at all. At startup Spring Data generates a proxy bean that implements every method for you: <code>save</code>, <code>saveAll</code>, <code>findById</code>, <code>findAll</code>, <code>findAll(Pageable)</code>, <code>deleteById</code>, <code>count</code>, <code>existsById</code>, and more.\n\nThat <code>findAll(Pageable)</code> is exactly what powered the pagination in M12 \u2014 it was a Spring Data repository underneath all along. Inject the repository into your <code>PriorAuthService</code> (constructor injection from M01) and the service gains persistence without a single line of JDBC. You only write a method when you need a query Spring can't already provide.",
        "visual": "m13-repository",
        "code": "public interface PriorAuthRepository extends JpaRepository<PriorAuth, Long> {\n    // inherited automatically \u2014 no implementation needed:\n    //   save, saveAll, findById, findAll, findAll(Pageable),\n    //   deleteById, count, existsById, ...\n}"
      },
      {
        "title": "Derived Query Methods",
        "body": "When you need a query beyond the basics, you often don't write one \u2014 you <em>name</em> it. Spring Data parses repository <strong>method names</strong> into queries. <code>findByAuthNumber(String)</code> becomes <code>WHERE auth_number = ?</code>; <code>findByPatientMemberIdAndStatus(...)</code> becomes <code>WHERE patient_member_id = ? AND status = ?</code>. Prefixes choose the operation: <code>findBy</code> returns rows, <code>countBy</code> returns a count, <code>existsBy</code> returns a boolean.\n\nThe grammar is rich: <code>And</code>/<code>Or</code>, <code>Between</code>, <code>LessThan</code>, <code>Like</code>, <code>OrderBy\u2026Desc</code>, <code>Top</code>/<code>First</code>. Return an <code>Optional</code> for a single result, a <code>List</code> for many, or a <code>Page</code> with a <code>Pageable</code> argument. The method name is the query \u2014 readable, type-checked, and refactor-safe. For anything too complex to express as a name, M14 introduces <code>@Query</code> and Specifications.",
        "visual": "m13-derived-queries",
        "code": "public interface PriorAuthRepository extends JpaRepository<PriorAuth, Long> {\n\n    Optional<PriorAuth> findByAuthNumber(String authNumber);\n\n    Page<PriorAuth> findByStatus(AuthStatus status, Pageable pageable);\n\n    List<PriorAuth> findByPatientMemberIdAndStatus(String memberId, AuthStatus status);\n\n    long countByStatus(AuthStatus status);\n\n    boolean existsByAuthNumber(String authNumber);\n}"

      {
        "title": "From H2 to PostgreSQL: Config & Dialect",
        "body": "Because JPA abstracts over the database, the <em>same</em> entity and repository run on different engines \u2014 you just change configuration. In development you point at an in-memory <strong>H2</strong> database: zero install, fresh on every restart, perfect for fast feedback and tests. In production you point at <strong>PostgreSQL</strong>. Hibernate detects the right SQL dialect from the connection, so your Java doesn't change.\n\nThis is exactly the M07 profile pattern: an <code>application-dev.yml</code> with the H2 datasource and an <code>application-prod.yml</code> with PostgreSQL, selected by <code>spring.profiles.active</code>. One setting to watch is <code>spring.jpa.hibernate.ddl-auto</code> \u2014 <code>update</code>/<code>create</code> are convenient in dev (Hibernate manages the schema), but production should use <code>validate</code> (or <code>none</code>) and let real migrations own the schema, which is M16's topic.",
        "visual": "m13-h2-postgres",
        "code": "# application-dev.yml \u2014 in-memory H2\nspring:\n  datasource:\n    url: jdbc:h2:mem:priorauth\n  jpa:\n    hibernate:\n      ddl-auto: update        # convenient in dev only\n---\n# application-prod.yml \u2014 PostgreSQL\nspring:\n  datasource:\n    url: jdbc:postgresql://db:5432/priorauth\n  jpa:\n    hibernate:\n      ddl-auto: validate      # migrations own the schema (M16)"

      "context": "Spring Data JPA replaces all of it. Annotations map the class to the table; extending JpaRepository yields full CRUD and paging with no implementation; and method names become queries. You write a data layer in a few lines, it works across H2 and PostgreSQL unchanged, and adding a field is one annotated property \u2014 Hibernate handles the SQL and the row-to-object mapping."

    "intro": "Derived method names (M13) handle most queries, but they hit a ceiling: complex conditions, joins, aggregations, and especially <em>dynamic</em> filters whose shape depends on what the caller supplied. The Prior Authorization Service needs all of these \u2014 a report of approval counts per CPT code, a search over a date range, and the combinable <code>status</code>/<code>cptCode</code> filters you sketched back in M12. This module is the toolbox for going beyond <code>findByX</code>.\n\nThere are three levels. <strong><code>@Query</code></strong> lets you write the query yourself in <strong>JPQL</strong> \u2014 a query language over your <em>entities</em> rather than tables \u2014 or in <strong>native SQL</strong> when you need database-specific features. <strong>Projections</strong> shape results into exactly the fields you want. And for queries you must <em>build at runtime</em>, the <strong>Criteria API</strong> constructs them programmatically and type-safely \u2014 which is what <strong>Specifications</strong> wrap in a clean, composable form.\n\nSpecifications are the payoff: each filter becomes a small reusable predicate, you compose only the ones a request actually provided, and the repository runs the combination with paging and sorting. That's how the M12 list endpoint's optional filters work under the hood \u2014 and you'll finally build them here.",
    "concepts": [
      {
        "title": "@Query: JPQL Queries",
        "body": "When a query is too complex to express as a method name, write it explicitly with <code>@Query</code>. The default language is <strong>JPQL</strong> (Jakarta Persistence Query Language), which looks like SQL but operates on your <em>entity model</em>: you select from <code>PriorAuth</code> (the entity, not the table) and reference <code>p.status</code> (the field, not the column). Hibernate translates JPQL into the right SQL for whatever database you're on, so the query stays portable.\n\nBind inputs with named parameters and <code>@Param</code> \u2014 <code>:status</code>, <code>:since</code> \u2014 which is safe from injection because values are bound, never concatenated. <code>@Query</code> is ideal for fixed, non-trivial reads: a multi-condition filter, a join across entities, or an aggregation. It keeps the SQL out of your Java logic while remaining explicit and reviewable.",
        "visual": "m14-jpql",
        "code": "public interface PriorAuthRepository extends JpaRepository<PriorAuth, Long> {\n\n    @Query(\"select p from PriorAuth p \" +\n           \"where p.status = :status and p.requestDate >= :since\")\n    List<PriorAuth> findActiveSince(@Param(\"status\") AuthStatus status,\n                                    @Param(\"since\") LocalDate since);\n}"
      },

        "title": "Native Queries & Projections",
        "body": "Sometimes you need SQL features JPQL doesn't model \u2014 window functions, vendor extensions, a hand-tuned reporting query. Set <code>@Query(nativeQuery = true)</code> and write real SQL against the <code>prior_auth</code> table. You trade portability for power, so reserve it for cases that need it.\n\nFor reads that don't want the whole entity, use a <strong>projection</strong>. An <em>interface projection</em> declares getters matching the selected columns, and Spring Data returns lightweight proxies \u2014 perfect for an aggregate like \"approved count per CPT code,\" which isn't an entity at all. Projections reduce data transfer and make the result's shape explicit; you can also project into a record (a DTO projection) when you prefer a concrete type.",

        "title": "The Criteria API: Type-Safe Dynamic Queries",
        "body": "<code>@Query</code> strings are fixed at compile time. But some queries must be <strong>built at runtime</strong> \u2014 a search screen where any combination of filters may or may not be present. Concatenating SQL for that is both unsafe and unmaintainable. The <strong>Criteria API</strong> is JPA's answer: you construct a query programmatically from objects \u2014 a <code>CriteriaBuilder</code>, a <code>Root</code> (the entity), and <code>Predicate</code>s (the conditions) \u2014 and assemble only the parts you need.\n\nIt's verbose, and you'll rarely use it raw. Its value here is conceptual: it's the <strong>type-safe, dynamic foundation</strong> that Specifications sit on top of. Understanding that a <code>Predicate</code> is just a condition built from a <code>Root</code> and a <code>CriteriaBuilder</code> makes the next concept \u2014 Specifications \u2014 read naturally, because a Specification is essentially a function that produces one <code>Predicate</code>.",
        "visual": "m14-criteria",
        "code": "CriteriaBuilder cb = em.getCriteriaBuilder();\nCriteriaQuery<PriorAuth> q = cb.createQuery(PriorAuth.class);\nRoot<PriorAuth> root = q.from(PriorAuth.class);\n\n// build conditions programmatically, add only those you need\nq.select(root).where(cb.equal(root.get(\"status\"), AuthStatus.PENDING));"
      },
      {
        "title": "Specifications: Composable Dynamic Filters",
        "body": "A <strong><code>Specification&lt;T&gt;</code></strong> is a clean wrapper over the Criteria API: a small object that, given the <code>root</code>, <code>query</code>, and <code>CriteriaBuilder</code>, returns one <code>Predicate</code>. Make your repository extend <code>JpaSpecificationExecutor&lt;PriorAuth&gt;</code> and it gains <code>findAll(Specification, Pageable)</code>.\n\nThe power is <strong>composition</strong>. Each filter is its own reusable Specification \u2014 <code>byStatus</code>, <code>cptCodeIs</code>, <code>requestedAfter</code> \u2014 and you combine the ones a request supplied with <code>where(...).and(...)</code>. A Specification that returns <code>null</code> is simply skipped, so optional filters fall away cleanly with no <code>if</code> sprawl. This is exactly the mechanism behind the M12 list endpoint: the controller composes a Specification from whatever query parameters arrived, and the repository runs it with the page and sort. Dynamic, type-safe, and reusable across endpoints.",
        "visual": "m14-specifications",
        "code": "public interface PriorAuthRepository extends JpaRepository<PriorAuth, Long>,\n        JpaSpecificationExecutor<PriorAuth> { }\n\npublic class PriorAuthSpecs {\n    public static Specification<PriorAuth> byStatus(AuthStatus s) {\n        return (root, query, cb) -> s == null ? null : cb.equal(root.get(\"status\"), s);\n    }\n    public static Specification<PriorAuth> cptCodeIs(String c) {\n        return (root, query, cb) -> c == null ? null : cb.equal(root.get(\"cptCode\"), c);\n    }\n}\n\n// compose only the filters that were supplied, then page\nrepo.findAll(where(byStatus(status)).and(cptCodeIs(cpt)), pageable);"

    "id": "M15",
    "track": "jpa",

    "track_color": "#f59e0b",
    "level": "Intermediate",
    "title": "Transactions & Caching",
    "subtitle": "Make multi-step operations all-or-nothing, and stop repeating expensive work \u2014 both declaratively.",
    "objectives": [
      "Make multi-step operations atomic with @Transactional and understand commit and rollback",
      "Control how nested transactions compose with propagation (REQUIRED vs REQUIRES_NEW)",
      "Choose isolation levels and use readOnly, avoiding the proxy self-invocation pitfall",
      "Cache expensive lookups with @Cacheable and invalidate with @CacheEvict via the CacheManager"
    ],
    "intro": "Persisting and querying data (M13\u2013M14) is only correct if it's also <strong>consistent</strong> under failure and concurrency \u2014 and fast enough under load. This module adds the two declarative tools that deliver both: <strong>transactions</strong> for atomicity and <strong>caching</strong> for performance.\n\nConsider deciding a prior authorization: the service updates the <code>PriorAuth</code> status <em>and</em> writes an audit entry. Those two writes must succeed together or not at all \u2014 a status change with no audit trail (or vice versa) is a corrupt record. <code>@Transactional</code> makes the whole method one atomic unit: commit on success, roll back on failure, automatically.\n\nThe second half is speed. Looking up a payer's coverage <strong>policy</strong> for a CPT code is a slow external call, and the same codes are requested constantly. Spring's cache abstraction lets you annotate the lookup with <code>@Cacheable</code> so the result is remembered and the expensive call is skipped on the next hit \u2014 and <code>@CacheEvict</code> clears it when the underlying data changes. Like so much of Spring, both transactions and caching are driven by annotations and implemented with the proxies you met in M03 \u2014 which is also where their one famous pitfall comes from.",
    "concepts": [
      {
        "title": "@Transactional: Atomic Units of Work",
        "body": "A <strong>transaction</strong> is an all-or-nothing unit of work: every write inside it commits together, or if anything fails, they all roll back, leaving the database untouched. In Spring you mark a method (usually on the <em>service</em> layer) with <code>@Transactional</code>, and the framework opens a transaction before the method runs and commits it after \u2014 or rolls back if an exception escapes.\n\nBy default Spring rolls back on unchecked (runtime) exceptions and commits on checked ones, though you can configure <code>rollbackFor</code>. Putting <code>@Transactional</code> on <code>decide()</code> means the status update and the audit insert either both land or both vanish \u2014 there's no partial state. Keep transactional boundaries at the service method that represents a complete business operation, not on individual repository calls.",
        "visual": "m15-transaction",
        "code": "@Service\npublic class PriorAuthService {\n\n    @Transactional                               // both writes commit together\n    public PriorAuthResponse decide(String authNumber, Decision decision) {\n        PriorAuth pa = repo.findByAuthNumber(authNumber)\n            .orElseThrow(() -> new PriorAuthNotFoundException(authNumber));\n        pa.setStatus(decision.toStatus());\n        auditRepo.save(new AuditEntry(authNumber, decision));\n        return toResponse(pa);                   // exception here \u2192 everything rolls back\n    }\n}"
      },
      {
        "title": "Propagation: How Transactions Compose",
        "body": "What happens when one transactional method calls another? <strong>Propagation</strong> decides. The default, <code>REQUIRED</code>, means \"join the caller's transaction if one exists, otherwise start one\" \u2014 so a chain of service calls runs as a single transaction with a single commit. That's usually what you want.\n\nSometimes you need a step to commit <em>independently</em> of the outer work. <code>REQUIRES_NEW</code> suspends the caller's transaction and runs the method in a brand-new one that commits on its own \u2014 useful for an audit or notification that should persist even if the main operation later rolls back. There are others (<code>NESTED</code>, <code>SUPPORTS</code>, <code>MANDATORY</code>), but <code>REQUIRED</code> and <code>REQUIRES_NEW</code> cover the vast majority of real cases. Choosing wrong here causes subtle bugs, so reach for <code>REQUIRES_NEW</code> deliberately, not by habit.",
        "visual": "m15-propagation",
        "code": "@Transactional                                   // REQUIRED (default)\npublic void submit(SubmitPriorAuthRequest body) {\n    PriorAuth saved = repo.save(toEntity(body));\n    attempts.record(saved.getAuthNumber());      // commits independently (below)\n}\n\n@Transactional(propagation = Propagation.REQUIRES_NEW)\npublic void record(String authNumber) {          // own transaction; survives outer rollback\n    attemptRepo.save(new Attempt(authNumber, Instant.now()));\n}"
      },
      {
        "title": "Isolation & Common Pitfalls",
        "body": "<strong>Isolation</strong> controls how concurrent transactions see each other's uncommitted changes. Higher levels prevent more anomalies \u2014 <em>dirty reads</em>, <em>non-repeatable reads</em>, <em>phantom reads</em> \u2014 at the cost of throughput. Most applications run at the database default (usually <code>READ_COMMITTED</code>) and only raise it (<code>REPEATABLE_READ</code>, <code>SERIALIZABLE</code>) for specific operations like financial reconciliation. Mark pure reads with <code>@Transactional(readOnly = true)</code> so the provider can optimize them.\n\nThe pitfall to remember: <code>@Transactional</code> is <strong>proxy-based</strong>, exactly like the AOP advice in M03. If a method calls another <code>@Transactional</code> method on <code>this</code>, the call doesn't go through the proxy and the annotation is <em>ignored</em>. The fix is the same as M03 \u2014 invoke it through an injected bean reference, or restructure so the transactional method is called from outside.",
        "visual": "m15-isolation",
        "code": "@Transactional(readOnly = true)                  // optimization: no dirty-checking/flush\npublic Page<PriorAuthResponse> list(Specification<PriorAuth> spec, Pageable pageable) {\n    return repo.findAll(spec, pageable).map(this::toResponse);\n}\n\n@Transactional(isolation = Isolation.REPEATABLE_READ)\npublic void reconcileDaily() { /* stronger guarantees for a sensitive batch */ }"
      },
      {
        "title": "Caching: @Cacheable & CacheManager",
        "body": "Spring's <strong>cache abstraction</strong> turns 'remember this result' into an annotation. <code>@Cacheable(\"policies\")</code> on a method means: on the first call for a given key, run the method and store the result; on later calls with the same key, return the stored value and <em>skip the method entirely</em>. For the Prior Authorization Service, caching <code>policyFor(cptCode)</code> avoids hammering the payer's slow policy API for codes you've already looked up.\n\nThe key is derived from the method arguments by default, or you set it with SpEL (<code>key = \"#cptCode\"</code>). When the underlying data changes, <code>@CacheEvict</code> removes stale entries, and <code>@CachePut</code> updates them. A <code>CacheManager</code> backs all of this \u2014 an in-memory provider like <strong>Caffeine</strong> for a single instance, or <strong>Redis</strong> for a shared cache across the microservices you'll build in Track 6. You enable it once with <code>@EnableCaching</code>; the annotations (proxy-based again) do the rest.",
        "visual": "m15-cache",
        "code": "@Cacheable(value = \"policies\", key = \"#cptCode\")   // miss \u2192 run; hit \u2192 skip method\npublic Policy policyFor(String cptCode) {\n    return payerClient.fetchPolicy(cptCode);          // slow external call\n}\n\n@CacheEvict(value = \"policies\", key = \"#cptCode\")   // invalidate when it changes\npublic void refreshPolicy(String cptCode) { /* ... */ }"
      }
    ],
    "comingFrom": {
      "java": "With plain JDBC you managed transactions by hand: conn.setAutoCommit(false), call commit() at the end, rollback() in a catch, and close in finally \u2014 and one forgotten rollback or leaked connection corrupted data or exhausted the pool. Caching meant a hand-rolled HashMap you had to populate, size-bound, and invalidate yourself, with no thread-safety or expiry unless you wrote it.",
      "context": "Spring makes both declarative. @Transactional wraps a method in begin/commit/rollback automatically with configurable propagation and isolation; @Cacheable/@CacheEvict add and invalidate cache entries through a pluggable CacheManager (Caffeine, Redis). You express intent \u2014 'this is one unit of work', 'remember this result' \u2014 and the proxies handle the mechanics, including rollback on failure and key management."
    },
    "keyTakeaways": [
      "@Transactional makes a service method atomic: all writes commit together or roll back (default rollback on runtime exceptions)",
      "Propagation composes transactions: REQUIRED joins the caller's tx; REQUIRES_NEW runs and commits independently",
      "Use readOnly for pure reads and raise isolation only when needed; @Transactional is proxy-based, so self-invocation skips it",
      "@Cacheable stores a method's result by key and skips repeat work; @CacheEvict invalidates it, all via a CacheManager"
    ]
  },

    "track_color": "#f59e0b",

    "title": "Database Migrations",
    "subtitle": "Evolve your schema safely and reproducibly with versioned migrations \u2014 the same way you version code.",
    "objectives": [
      "Explain why versioned migrations replace Hibernate ddl-auto for real environments",
      "Use Flyway's V<version>__name.sql convention and the schema-history table",
      "Write versioned and repeatable migrations following safe practices",
      "Combine a Flyway-owned schema with JPA ddl-auto=validate"
    ],
    "intro": "Back in M13 you let Hibernate's <code>ddl-auto</code> create tables in development, with a promise: production needs something better. This is that something. A real service's schema changes constantly \u2014 add a <code>priority</code> column, a new table, an index \u2014 and every change has to apply <em>identically</em> and <em>safely</em> across every developer's laptop, CI, staging, and production, with a permanent record of what ran where.\n\n<strong>Database migrations</strong> treat schema changes like source code: small, ordered, versioned scripts checked into the repo. <strong>Flyway</strong> (Spring Boot auto-configures it) runs any not-yet-applied migrations when the app starts, in order, and records each one in a <code>flyway_schema_history</code> table. Run the Prior Authorization Service against a fresh database and Flyway builds the entire schema from <code>V1</code> onward; run it against an existing one and it applies only what's new. The schema becomes reproducible and auditable.\n\nThe final piece is the handoff with JPA: Flyway <em>owns</em> the schema, and Hibernate switches to <code>ddl-auto: validate</code> \u2014 it no longer changes anything, it just verifies your entities match the migrated schema and fails fast at startup if they've drifted apart.",
    "concepts": [
      {
        "title": "Why Migrations: ddl-auto Isn't Enough",
        "body": "Hibernate's <code>ddl-auto</code> is convenient in development \u2014 <code>update</code> tweaks the schema to match your entities automatically. But it's the wrong tool for any shared or production environment. It has <strong>no history</strong> (you can't see what changed or when), it can be <strong>destructive</strong> or simply refuse ambiguous changes, it <strong>can't express data migrations</strong> (backfilling a new column), and it makes environments <strong>non-reproducible</strong> because the schema is a side effect of whatever entity code happens to be deployed.\n\nMigrations fix all of that by making each schema change an explicit, ordered, version-controlled artifact. You review them in pull requests, apply them identically everywhere, and always know exactly what state any database is in. Dev convenience stays available; production gets discipline.",
        "visual": "m16-why-migrations"
      },
      {
        "title": "Flyway: Versioned Migrations",
        "body": "<strong>Flyway</strong> applies SQL migration files placed in <code>src/main/resources/db/migration</code>. Each versioned file follows the convention <code>V&lt;version&gt;__&lt;description&gt;.sql</code> \u2014 <code>V1__create_prior_auth.sql</code>, <code>V2__add_priority.sql</code> \u2014 and Flyway runs them in version order. On startup it compares the files against its <strong><code>flyway_schema_history</code></strong> table, applies any that haven't run yet, and records each with its checksum, who ran it, and when.\n\nBecause Spring Boot detects <code>flyway-core</code> on the classpath and runs migrations automatically before the app fully starts, deploying a new version of the service also applies its schema changes \u2014 no manual step, no forgotten script. A brand-new database gets every migration in sequence; an up-to-date one gets nothing. The history table is the single source of truth for what's been applied.",
        "visual": "m16-flyway-flow",
        "code": "-- src/main/resources/db/migration/V1__create_prior_auth.sql\ncreate table prior_auth (\n    id                bigserial   primary key,\n    auth_number       varchar(20) not null unique,\n    patient_member_id varchar(40) not null,\n    cpt_code          varchar(5)  not null,\n    status            varchar(20) not null,\n    request_date      date        not null\n);"
      },
      {
        "title": "Writing Migrations: Versioned & Repeatable",
        "body": "Flyway has two kinds. <strong>Versioned</strong> migrations (<code>V\u2026</code>) run <em>once</em>, in order, and are <strong>immutable</strong> \u2014 never edit one after it's been applied anywhere, because Flyway validates checksums and will refuse to start if an applied migration changed. To fix or extend the schema, add a <em>new</em> <code>V</code> file. Prefer additive, backward-compatible changes so a migration can deploy before the code that needs it.\n\n<strong>Repeatable</strong> migrations (<code>R__\u2026</code>) are different: they have no version, run <em>after</em> all versioned ones, and re-apply whenever their <strong>checksum changes</strong>. They're meant for objects you can redefine wholesale \u2014 views, stored procedures, functions. A reporting view over prior-auths is a perfect <code>R</code> migration: edit the file, and Flyway re-runs the <code>create or replace</code> on the next startup.",
        "visual": "m16-migration-types",
        "code": "-- V2__add_priority.sql  (versioned \u00b7 runs once \u00b7 immutable)\nalter table prior_auth\n    add column priority varchar(10) not null default 'ROUTINE';\n\n-- R__pending_by_cpt.sql  (repeatable \u00b7 re-runs when its checksum changes)\ncreate or replace view pending_by_cpt as\n    select cpt_code, count(*) as cnt\n    from prior_auth where status = 'PENDING'\n    group by cpt_code;"
      },
      {
        "title": "Migrations + JPA: validate, not update",
        "body": "With Flyway owning the schema, Hibernate must stop trying to change it. Set <code>spring.jpa.hibernate.ddl-auto: validate</code>: at startup Hibernate compares your <code>@Entity</code> mappings against the actual (Flyway-built) tables and <strong>fails fast</strong> if they don't match \u2014 a missing column, a wrong type \u2014 but it never alters anything itself. This catches the classic bug where an entity and the schema drift apart.\n\nThe workflow becomes clean and safe: write a migration for the schema change, update the matching entity, and start the app \u2014 Flyway applies the migration, then Hibernate validates the entity against it. Tests can run the same migrations against an in-memory database (or, better, a real PostgreSQL via Testcontainers, which you'll meet in Track 9), so the schema you test is the schema you ship. This closes the data-access track: entities, repositories, queries, transactions, caching, and now a disciplined, reproducible schema.",
        "visual": "m16-validate",
        "code": "spring:\n  flyway:\n    enabled: true            # Flyway owns the schema (db/migration/*.sql)\n  jpa:\n    hibernate:\n      ddl-auto: validate     # Hibernate only checks entities match \u2014 never alters"
      }
    ],
    "comingFrom": {
      "java": "Without a migration tool, schema changes were loose SQL scripts emailed around or kept in a wiki, run by hand against each environment in whatever order someone remembered. Nobody could say with certainty what state production's schema was in, dev and prod drifted apart, and changing a live schema was a nerve-wracking manual event with no rollback story or audit trail.",
      "context": "Flyway makes the schema a versioned, automated part of the build. Migrations live in source control, apply in a deterministic order on startup, and are recorded in a history table, so every environment converges on the same schema and you always know what's applied. Paired with ddl-auto=validate, Hibernate guarantees your entities and the real schema stay in lockstep."
    },
    "keyTakeaways": [
      "ddl-auto is fine for dev but unsafe for shared/prod: no history, can be destructive, not reproducible \u2014 use migrations",
      "Flyway runs V<version>__name.sql files in order on startup and records them in flyway_schema_history",
      "Versioned (V) migrations run once and are immutable; repeatable (R) migrations re-run on checksum change for views/procs",
      "Let Flyway own the schema and set JPA ddl-auto=validate so Hibernate verifies entities match but never alters tables"
    ]
  },

    "id": "M17",
    "track": "security",
    "track_label": "Spring Security",
    "track_color": "#f87171",
    "level": "Advanced",
    "title": "Security Fundamentals",
    "subtitle": "Put a filter chain in front of the API: authenticate who's calling and authorize what they may do.",
    "objectives": [
      "Explain how Spring Security's filter chain sits in front of your controllers",
      "Define authorization rules with a SecurityFilterChain bean and the lambda DSL",
      "Authenticate users with a UserDetailsService and verify passwords with a PasswordEncoder",

    ],
    "intro": "The Prior Authorization API has been wide open \u2014 anyone who can reach it can submit, read, or decide authorizations. That's fine for learning and fatal in production: prior-auth data is sensitive health information, and a decision must only be made by an authorized reviewer. Track 5 locks the service down, and it starts with the fundamentals of <strong>Spring Security</strong>.\n\nSecurity in Spring is a <strong>filter chain</strong> that sits in front of the <code>DispatcherServlet</code> you met in M04. Every request passes through an ordered set of servlet filters <em>before</em> it reaches any controller \u2014 filters that handle CORS, CSRF, and the two core jobs: <strong>authentication</strong> (who are you?) and <strong>authorization</strong> (are you allowed to do this?). Only requests that satisfy your rules make it through to your code; the rest are rejected with <code>401</code> or <code>403</code>.\n\nYou'll configure that chain with a <code>SecurityFilterChain</code> bean, authenticate users through a <code>UserDetailsService</code> with properly hashed passwords via a <code>PasswordEncoder</code>, and set up CORS and CSRF correctly for a stateless API. This module uses simple in-memory users and HTTP Basic to keep the focus on the mechanics; the next modules replace that with JWT (M18) and OAuth2 (M19), and add method-level rules (M20).",
    "concepts": [
      {
        "title": "The Security Filter Chain",
        "body": "Spring Security plugs into the servlet container as a chain of <strong>filters</strong> that run before the <code>DispatcherServlet</code>. A request entering the Prior Authorization Service passes through this chain first: filters for CORS and CSRF, then an <strong>authentication</strong> filter that establishes who the caller is, then an <strong>authorization</strong> filter that checks whether they may access the requested URL. If every filter is satisfied, the request continues to your controller; if not, the chain short-circuits with <code>401 Unauthorized</code> (not authenticated) or <code>403 Forbidden</code> (authenticated but not allowed).\n\nThe key mental model: your controllers never see an unauthorized request, because security is enforced <em>upstream</em> of them. Order matters \u2014 authentication must run before authorization \u2014 and Spring Security wires a sensible default order, which you customize rather than assemble from scratch.",
        "visual": "m17-filter-chain"
      },
      {
        "title": "Configuring Access: the SecurityFilterChain Bean",
        "body": "You configure security by declaring a <strong><code>SecurityFilterChain</code></strong> bean and describing rules with the lambda DSL on <code>HttpSecurity</code>. Inside <code>authorizeHttpRequests</code> you map URL patterns (and optionally HTTP methods) to access rules: <code>permitAll()</code> for public endpoints like <code>/actuator/health</code>, <code>hasRole(\"REVIEWER\")</code> for privileged actions, <code>authenticated()</code> for anything requiring a logged-in user, and <code>denyAll()</code> as a safe default for everything else.\n\nRules are evaluated <strong>top to bottom</strong>, so put the most specific first and a restrictive catch-all last. The same builder configures the rest of the chain \u2014 disabling CSRF for a stateless API, setting a stateless session policy, and choosing an authentication method (here HTTP Basic; a JWT filter in M18). One bean expresses your entire access policy in one readable place.",
        "visual": "m17-securityconfig",
        "code": "@Bean\nSecurityFilterChain api(HttpSecurity http) throws Exception {\n    http\n      .authorizeHttpRequests(auth -> auth\n          .requestMatchers(\"/actuator/health\", \"/swagger-ui/**\").permitAll()\n          .requestMatchers(HttpMethod.POST, \"/api/prior-auths\").hasRole(\"SUBMITTER\")\n          .requestMatchers(\"/api/prior-auths/**\").authenticated()\n          .anyRequest().denyAll())          // safe default\n      .csrf(csrf -> csrf.disable())          // stateless API\n      .sessionManagement(s -> s.sessionCreationPolicy(STATELESS))\n      .httpBasic(withDefaults());\n    return http.build();\n}"
      },
      {
        "title": "Authentication: UserDetailsService & PasswordEncoder",
        "body": "<strong>Authentication</strong> answers \"who are you?\" Spring Security models a user as <code>UserDetails</code> (username, hashed password, granted authorities/roles) and loads them through a <code>UserDetailsService</code> \u2014 its single method <code>loadUserByUsername</code> fetches the user from wherever they live (an in-memory list now, a database table later). When credentials arrive, the framework loads the user and uses a <strong><code>PasswordEncoder</code></strong> to verify the submitted password against the stored hash.\n\nNever store or compare plaintext passwords. <code>BCryptPasswordEncoder</code> hashes with a per-password salt and a tunable work factor, and <code>matches(raw, encoded)</code> does the constant-time comparison. You expose both as beans; Spring's <code>AuthenticationManager</code> orchestrates them. On success it places an <code>Authentication</code> in the <code>SecurityContext</code> for the rest of the request; on failure the caller gets <code>401</code>.",
        "visual": "m17-authentication",
        "code": "@Bean\nPasswordEncoder passwordEncoder() {\n    return new BCryptPasswordEncoder();           // salted, tunable work factor\n}\n\n@Bean\nUserDetailsService users(PasswordEncoder encoder) {\n    UserDetails reviewer = User.withUsername(\"reviewer\")\n        .password(encoder.encode(\"secret\"))       // stored hashed, never plaintext\n        .roles(\"REVIEWER\")\n        .build();\n    return new InMemoryUserDetailsManager(reviewer);\n}"
      },
      {
        "title": "CORS, CSRF & Stateless APIs",
        "body": "Two cross-cutting settings trip people up. <strong>CORS</strong> (Cross-Origin Resource Sharing) governs whether a browser on one origin may call your API on another. Browsers send a preflight <code>OPTIONS</code> request, and your server must explicitly allow the origin, methods, and headers \u2014 otherwise the call is blocked by the browser, not your code. You configure allowed origins centrally and enable it on the chain.\n\n<strong>CSRF</strong> (Cross-Site Request Forgery) protection guards <em>session-cookie</em> apps, where a browser auto-attaches the cookie to forged requests. A stateless API authenticated by a token (the Basic/JWT pattern here) is not vulnerable in the same way, so CSRF protection is conventionally <strong>disabled</strong> for it \u2014 and you pair that with a <strong>stateless</strong> session policy so the server keeps no session at all. The rule of thumb: keep CSRF for browser/session apps; disable it for token-based stateless APIs.",
        "visual": "m17-cors-csrf",
        "code": "http\n  .cors(cors -> cors.configurationSource(corsSource()))   // allow known origins\n  .csrf(csrf -> csrf.disable())                            // stateless token API\n  .sessionManagement(s -> s.sessionCreationPolicy(STATELESS));\n// keep CSRF enabled instead if you use session cookies in a browser app"
      }
    ],
    "comingFrom": {
      "java": "Rolling your own security meant writing a servlet Filter to intercept requests, parsing credentials, looking up users, and stashing them in the HttpSession; scattering role checks (if (!user.isAdmin()) throw ...) throughout controllers; and hashing passwords yourself \u2014 if you remembered to, and with the right algorithm and salt. Every app reinvented it slightly differently, and the gaps were where breaches happened.",
      "context": "Spring Security provides the whole apparatus: a battle-tested filter chain, a standard UserDetails/UserDetailsService model, a proper PasswordEncoder (BCrypt), and declarative URL authorization in one SecurityFilterChain bean. You describe your policy \u2014 who can reach what \u2014 and the framework enforces it before any controller runs, with CORS and CSRF handled by configuration rather than guesswork."
    },
    "keyTakeaways": [
      "Spring Security is a filter chain that runs before the DispatcherServlet, enforcing authn then authz (401 vs 403)",
      "A SecurityFilterChain bean maps URL patterns to rules (permitAll/hasRole/authenticated/denyAll), evaluated top to bottom",
      "UserDetailsService loads users and a PasswordEncoder (BCrypt) verifies hashed passwords \u2014 never store plaintext",
      "Disable CSRF and use a stateless session for token-based APIs; configure CORS to allow known cross-origin callers"
    ]

    "id": "M18",
    "track": "security",
    "track_label": "Spring Security",
    "track_color": "#f87171",
    "level": "Advanced",
    "title": "JWT Authentication",
    "subtitle": "Replace server sessions with a self-contained, signed token the client carries on every request.",
    "objectives": [
      "Explain why stateless JWT authentication suits REST APIs and microservices",
      "Read a JWT's structure: header, claims payload, and signature",
      "Issue signed tokens with claims and an expiry on successful authentication",
      "Validate tokens in a OncePerRequestFilter and populate the SecurityContext"
    ],
    "intro": "M17 secured the Prior Authorization API with HTTP Basic and in-memory users \u2014 fine for learning, but it sends credentials on every request and leans on server-side state. Real APIs, especially ones destined to become microservices (Track 6), need authentication that is <strong>stateless</strong> and <strong>portable</strong>: a caller proves who they are once, then carries proof on each request that <em>any</em> service can verify on its own.\n\nThat proof is a <strong>JWT</strong> (JSON Web Token): a compact, URL-safe, <em>signed</em> token that encodes the user's identity and roles as claims. The client authenticates once (username/password), the server issues a JWT, and the client sends it in the <code>Authorization: Bearer \u2026</code> header on every subsequent call. The server validates the <strong>signature</strong> and <strong>expiry</strong> \u2014 no session lookup, no shared session store \u2014 and trusts the claims inside because only the issuer could have signed them.\n\nYou'll see why this fits horizontal scaling and microservices, dissect a JWT's three parts, issue tokens with the JJWT library, and write the <code>OncePerRequestFilter</code> that validates an incoming token and places an <code>Authentication</code> into the <code>SecurityContext</code> so the authorization rules from M17 still apply.",
    "concepts": [
      {
        "title": "Why JWT for Stateless APIs",
        "body": "Session-based auth keeps user state on the server: a session id in a cookie points to server-side memory. That works for a single app but fights horizontal scaling (every instance needs the session, so you add sticky routing or a shared session store) and doesn't translate cleanly to many independent services. <strong>JWT</strong> flips it: the token itself carries the identity and roles, signed so it can't be forged, so the server stores <em>nothing</em>.\n\nThe flow is simple. The client logs in once; the server verifies credentials and returns a signed JWT. From then on the client attaches <code>Authorization: Bearer &lt;token&gt;</code> to each request, and the server validates the token locally. Because validation needs only the signing key, every instance \u2014 and later every microservice \u2014 can authenticate a request independently. Statelessness is the whole point, and it's exactly what the gateway and services in Track 6 rely on.",
        "visual": "m18-jwt-flow"
      },
      {
        "title": "Anatomy of a JWT",
        "body": "A JWT is three Base64URL parts joined by dots: <code>header.payload.signature</code>. The <strong>header</strong> names the signing algorithm (e.g., <code>HS256</code> or <code>RS256</code>). The <strong>payload</strong> holds <strong>claims</strong> \u2014 standard ones like <code>sub</code> (subject/username), <code>iat</code> (issued-at), <code>exp</code> (expiry), plus custom ones like <code>roles</code>. The <strong>signature</strong> is computed over the header and payload with the secret or private key.\n\nTwo things to internalize. First, the payload is <em>encoded, not encrypted</em> \u2014 anyone can Base64-decode and read it, so never put secrets in a JWT. Second, the signature is what makes it trustworthy: change a single claim and the signature no longer matches, so the server rejects it. The token is a tamper-evident, self-describing credential \u2014 readable, but only forgeable by whoever holds the signing key.",
        "visual": "m18-jwt-anatomy"
      },
      {
        "title": "Issuing Tokens",
        "body": "When a user authenticates successfully, you <strong>mint</strong> a token. Using a library like <strong>JJWT</strong>, you build a JWT with the claims you want the rest of the system to trust \u2014 the subject, the user's roles, an issued-at timestamp \u2014 and crucially an <strong>expiry</strong>, so a leaked token is useful only briefly. Then you <code>signWith</code> a key: an <strong>HMAC</strong> secret (symmetric \u2014 the same key signs and verifies) or an <strong>RSA</strong> private key (asymmetric \u2014 services verify with the public key without being able to mint tokens).\n\nKeep tokens short-lived and put only what downstream code needs in the claims. A typical setup issues a short-lived access token (minutes to an hour) and, optionally, a longer-lived refresh token to get new ones without re-entering credentials. The signing key is the crown jewel \u2014 it lives in configuration/secrets (M07), never in code.",
        "visual": "m18-jwt-issue",
        "code": "public String issue(UserDetails user) {\n    Instant now = Instant.now();\n    return Jwts.builder()\n        .subject(user.getUsername())\n        .claim(\"roles\", user.getAuthorities())\n        .issuedAt(Date.from(now))\n        .expiration(Date.from(now.plus(Duration.ofHours(1))))   // short-lived\n        .signWith(key)                  // HMAC secret or RSA private key\n        .compact();\n}"
      },
      {
        "title": "Validating Tokens: a OncePerRequestFilter",
        "body": "Validation happens in a custom filter that runs early in the security chain (M17). Extending <strong><code>OncePerRequestFilter</code></strong> guarantees it executes exactly once per request. It reads the <code>Authorization</code> header, and if a <code>Bearer</code> token is present, it <strong>verifies the signature and expiry</strong> with the signing key \u2014 parsing throws if the token is tampered with or expired. From the validated claims it builds an <code>Authentication</code> (username + roles) and places it in the <code>SecurityContextHolder</code>.\n\nOnce the <code>SecurityContext</code> holds an authenticated principal, the rest of Spring Security behaves exactly as in M17: the <code>authorizeHttpRequests</code> rules and any method-level checks (M20) apply to the roles carried in the token. You register this filter <em>before</em> the username/password filter. If no token is present or it's invalid, the context stays empty and the request is rejected downstream with <code>401</code>. No session is ever created.",
        "visual": "m18-jwt-filter",
        "code": "public class JwtAuthFilter extends OncePerRequestFilter {\n    protected void doFilterInternal(HttpServletRequest req, HttpServletResponse res,\n                                    FilterChain chain) throws ... {\n        String header = req.getHeader(\"Authorization\");\n        if (header != null && header.startsWith(\"Bearer \")) {\n            Jws<Claims> jws = Jwts.parser().verifyWith(key).build()\n                .parseSignedClaims(header.substring(7));   // throws if invalid/expired\n            var auth = toAuthentication(jws.getPayload());  // username + roles\n            SecurityContextHolder.getContext().setAuthentication(auth);\n        }\n        chain.doFilter(req, res);\n    }\n}"
      }
    ],
    "comingFrom": {
      "java": "The classic approach kept a server-side HttpSession: a session cookie identified the user, and their state lived in server memory. To scale past one instance you needed sticky sessions or an external session store (Redis), and sharing a login across separate services meant sharing that session infrastructure. Every request also implicitly trusted the session without re-checking who the user really was.",
      "context": "JWT moves the proof into a signed, self-contained token the client carries. The server validates it with just the signing key \u2014 no session, no shared store \u2014 so any instance or microservice can authenticate a request independently. You issue short-lived tokens with the user's roles as claims and validate them in a OncePerRequestFilter, keeping the API stateless and horizontally scalable."
    },
    "keyTakeaways": [
      "JWT is stateless auth: the signed token carries identity and roles, so the server stores no session",
      "A JWT is header.payload.signature; the payload is encoded (readable) not encrypted \u2014 never put secrets in it",
      "Issue short-lived signed tokens (claims + exp) with JJWT, signing with an HMAC secret or RSA private key",
      "Validate the Bearer token in a OncePerRequestFilter, then set the SecurityContext so M17/M20 rules apply"
    ]
  },
  {
    "id": "M19",
    "track": "security",
    "track_label": "Spring Security",
    "track_color": "#f87171",
    "level": "Advanced",
    "title": "OAuth2 Resource Server",
    "subtitle": "Stop minting your own tokens \u2014 let a dedicated identity provider issue them and have Spring validate them for you.",
    "objectives": [
      "Use Spring Security's OAuth2 Resource Server instead of a hand-written JWT filter",
      "Configure JWT validation against an external authorization server (issuer / JWKS)",
      "Map JWT scopes and role claims to Spring authorities and authorize on them",
      "Explain the OAuth2 roles and why delegating authentication to a dedicated IdP is preferable"
    ],
    "intro": "In M18 you issued JWTs and validated them with a hand-written filter \u2014 invaluable for understanding how tokens work, but not how most production systems are built. Real organizations don't let every service mint its own tokens or handle passwords. Instead a single, dedicated <strong>authorization server</strong> / identity provider (Keycloak, Auth0, Okta, Azure AD) owns login, multi-factor auth, token issuance, refresh, and signing-key rotation. Each API becomes a <strong>resource server</strong> whose only security job is to <em>validate</em> the tokens that IdP issues.\n\nSpring Security has first-class support for this. The <code>oauth2ResourceServer</code> configuration replaces your entire M18 filter: Spring fetches the IdP's public keys, validates each incoming JWT's signature, issuer, audience, and expiry, and turns it into an authenticated principal \u2014 in a few lines. The Prior Authorization Service stops caring <em>how</em> a reviewer logged in (password, SSO, MFA \u2014 the IdP's concern) and only checks that the presented token is genuine and carries the right permissions.\n\nYou'll configure the resource server, point it at an issuer, map OAuth2 <strong>scopes</strong> and role claims to Spring authorities, and authorize endpoints on them. This is also the security model the microservices in Track 6 share: one IdP, many resource servers, all validating the same tokens independently.",
    "concepts": [
      {
        "title": "Resource Server vs Custom JWT",
        "body": "Your M18 code played three roles at once: it authenticated users, issued tokens, and validated them. OAuth2 separates these. An <strong>authorization server</strong> (the IdP) handles authentication and issues tokens; your service is purely a <strong>resource server</strong> that protects resources by validating presented tokens. It never sees a password and never signs a token \u2014 it only verifies.\n\nThis division is why it scales. The IdP centralizes the hard, security-critical parts (credential storage, MFA, account lockout, key rotation, single sign-on), and every API trusts tokens it signs. Swapping in Spring's resource server support means deleting your custom token endpoint and JWT filter and replacing them with declarative configuration \u2014 less code, and code you don't have to keep secure yourself.",
        "visual": "m19-resource-server"
      },
      {
        "title": "Configuring the Resource Server",
        "body": "Add <code>spring-boot-starter-oauth2-resource-server</code> and enable it on the chain with <code>oauth2ResourceServer(oauth -&gt; oauth.jwt(...))</code>. Then point Spring at your IdP with a single property \u2014 <code>issuer-uri</code>. From the issuer's well-known metadata Spring discovers the <strong>JWKS</strong> endpoint (the set of public keys), and builds a <code>JwtDecoder</code> that, for every request, validates the token's <strong>signature</strong> against those keys and checks the <strong>issuer</strong>, <strong>expiry</strong>, and (if configured) <strong>audience</strong>.\n\nKey rotation is handled automatically: when the IdP rotates signing keys, Spring refreshes the JWKS and keeps validating. There's no secret to manage in your service \u2014 validation uses the IdP's <em>public</em> keys. The authorization rules look just like M17, but now the authenticated principal comes from a validated external token.",
        "visual": "m19-jwt-validation",
        "code": "@Bean\nSecurityFilterChain api(HttpSecurity http) throws Exception {\n    http\n      .authorizeHttpRequests(auth -> auth\n          .requestMatchers(HttpMethod.POST, \"/api/prior-auths\")\n              .hasAuthority(\"SCOPE_prior-auth:write\")\n          .requestMatchers(\"/api/prior-auths/**\").authenticated()\n          .anyRequest().denyAll())\n      .oauth2ResourceServer(oauth -> oauth.jwt(Customizer.withDefaults()));\n    return http.build();\n}\n\n// application.yml\n//   spring.security.oauth2.resourceserver.jwt.issuer-uri:\n//     https://idp.payer.com/realms/priorauth"
      },
      {
        "title": "Scopes & Authorities Mapping",
        "body": "OAuth2 tokens carry <strong>scopes</strong> \u2014 strings describing what the token is allowed to do, like <code>prior-auth:read</code> and <code>prior-auth:write</code>. By default Spring maps each scope to an authority prefixed <code>SCOPE_</code>, so you authorize with <code>hasAuthority(\"SCOPE_prior-auth:write\")</code>. Scopes express the <em>permissions granted to the token</em>, which is often what you want to gate write operations on.\n\nIdPs also put <strong>roles</strong> in custom claims (a <code>realm_access.roles</code> array in Keycloak, for example). To authorize on those, supply a <code>JwtAuthenticationConverter</code> that reads the claim and emits <code>ROLE_</code> authorities, so <code>hasRole(\"REVIEWER\")</code> works as before. You choose per endpoint whether the right gate is a scope (what the client may do) or a role (who the user is) \u2014 and map both from the token's claims into Spring's authority model.",
        "visual": "m19-scopes",
        "code": "@Bean\nJwtAuthenticationConverter jwtAuthConverter() {\n    JwtAuthenticationConverter conv = new JwtAuthenticationConverter();\n    conv.setJwtGrantedAuthoritiesConverter(jwt -> {\n        var auths = new ArrayList<GrantedAuthority>();\n        // default scopes \u2192 SCOPE_*\n        new JwtGrantedAuthoritiesConverter().convert(jwt).forEach(auths::add);\n        // custom realm roles claim \u2192 ROLE_*\n        Map<String,Object> realm = jwt.getClaim(\"realm_access\");\n        if (realm != null) ((List<String>) realm.get(\"roles\"))\n            .forEach(r -> auths.add(new SimpleGrantedAuthority(\"ROLE_\" + r)));\n        return auths;\n    });\n    return conv;\n}"
      },
      {
        "title": "OAuth2 Roles & Why an IdP",
        "body": "OAuth2 defines four <strong>roles</strong>. The <strong>resource owner</strong> is the user (a reviewer). The <strong>client</strong> is the application acting on their behalf (a web UI or another service). The <strong>authorization server</strong> authenticates the owner and issues tokens. The <strong>resource server</strong> \u2014 your Prior Authorization API \u2014 holds the protected resources and accepts tokens. Keeping these distinct is what enables single sign-on, consistent security policy, and independent services that all trust one issuer.\n\nWhy centralize? Because authentication is hard and dangerous to get wrong. A dedicated IdP gives you battle-tested credential handling, MFA, account recovery, audit, token refresh, and automated key rotation \u2014 none of which you want re-implemented in each microservice. Your services shrink to a validation policy. This is the foundation Track 6 builds on: a fleet of resource servers behind one gateway, every request bearing a token any of them can verify.",
        "visual": "m19-oauth-roles"
      }
    ],
    "comingFrom": {
      "java": "Even with M18's knowledge, integrating an external identity provider by hand is a lot: fetch and cache the IdP's JWKS, pick the right key by `kid`, verify the signature, validate issuer/audience/expiry, parse claims, map them to authorities, and re-fetch keys when they rotate \u2014 security-critical code you must get exactly right and maintain. Rolling your own token issuance also means owning password storage and MFA.",
      "context": "Spring's OAuth2 Resource Server does all of that from one `issuer-uri` and `oauth2ResourceServer().jwt()`: automatic JWKS discovery and refresh, full token validation, and claim-to-authority mapping via a converter. Authentication is delegated to a dedicated IdP, so your service holds no credentials and signs no tokens \u2014 it just validates, declaratively, and authorizes on scopes and roles."
    },
    "keyTakeaways": [
      "A resource server only validates tokens an external authorization server (IdP) issues \u2014 it never handles passwords or signs tokens",
      "oauth2ResourceServer().jwt() + an issuer-uri gives automatic JWKS discovery, signature/issuer/expiry validation, and key rotation",
      "Scopes map to SCOPE_ authorities by default; a JwtAuthenticationConverter maps custom role claims to ROLE_ authorities",
      "OAuth2's four roles (resource owner, client, authorization server, resource server) enable SSO and shared trust across microservices"
    ]
  },

    "id": "M20",
    "track": "security",
    "track_label": "Spring Security",
    "track_color": "#f87171",
    "level": "Advanced",
    "title": "Method-Level Security",
    "subtitle": "Authorize close to the logic: per-method and per-object rules with SpEL \u2014 and test them.",
    "objectives": [
      "Enable method security and contrast it with URL-based rules (defense in depth)",
      "Authorize methods with @PreAuthorize and SpEL expressions",
      "Write fine-grained, object-level rules using arguments, the principal, and custom beans",
      "Test secured endpoints with @WithMockUser and MockMvc for allowed and forbidden cases"
    ],
    "intro": "URL-based rules (M17) and token validation (M18\u2013M19) protect the <em>edges</em> of the Prior Authorization Service: which paths a request may reach, and whether its token is genuine. But some rules aren't about paths at all. \"Only a <strong>REVIEWER</strong> may decide an authorization\" is about a method. \"A reviewer may only decide auths <strong>assigned to them</strong>\" is about a method <em>and the specific object</em> it operates on. Those belong next to the business logic, not in a URL matcher.\n\n<strong>Method-level security</strong> puts authorization directly on service (or controller) methods with annotations like <code>@PreAuthorize</code>, evaluated with the Spring Expression Language (SpEL). The check runs before the method body, can reference the method's arguments and the authenticated principal, and throws <code>AccessDenied</code> (a <code>403</code>) when it fails. It also gives you <strong>defense in depth</strong>: even if a method is reached through a path your URL rules didn't anticipate, its own guard still holds.\n\nThis module also covers <strong>testing</strong> \u2014 security you can't verify is security you can't trust. With <code>@WithMockUser</code> and MockMvc you assert that the right roles are allowed and the wrong ones forbidden. Finishing here, the monolith is secured end to end, ready to be decomposed into microservices in Track 6.",
    "concepts": [
      {
        "title": "Method Security vs URL Security",
        "body": "URL security is <strong>coarse</strong>: it matches request paths to rules in one central place, ideal for broad statements like \"all of <code>/api/prior-auths/**</code> requires authentication.\" But it can't easily express rules tied to a specific operation or domain object, and it only guards the HTTP entry point. <strong>Method security</strong> is <strong>fine-grained</strong>: the rule lives on the method itself, travels with it, and applies no matter how the method is invoked.\n\nUse both \u2014 that's <em>defense in depth</em>. URL rules reject obviously-unauthorized traffic early; method rules enforce the precise business authorization right where the work happens. Enable it once with <code>@EnableMethodSecurity</code> on a configuration class, and Spring activates the <code>@PreAuthorize</code>/<code>@PostAuthorize</code> annotations across your beans (it's proxy-based, like the AOP and transactions you've seen).",
        "visual": "m20-method-vs-url",
        "code": "@Configuration\n@EnableMethodSecurity          // turns on @PreAuthorize / @PostAuthorize\npublic class MethodSecurityConfig { }"
      },
      {
        "title": "@PreAuthorize & SpEL",
        "body": "<code>@PreAuthorize</code> guards a method with a boolean <strong>SpEL</strong> expression evaluated <em>before</em> the body runs. The simplest expressions mirror the URL DSL \u2014 <code>hasRole('REVIEWER')</code>, <code>hasAuthority('SCOPE_prior-auth:write')</code>, <code>isAuthenticated()</code> \u2014 and you can combine them with <code>and</code>, <code>or</code>, <code>not</code>. If the expression is false, Spring throws <code>AccessDeniedException</code>, which surfaces as <code>403 Forbidden</code> (and you can shape it with the M10 advice).\n\nPlacing the annotation on the <em>service</em> method means the rule protects the operation regardless of which controller or background job calls it. <code>@PostAuthorize</code> is the mirror image: it runs <em>after</em> the method and can inspect the <strong>return value</strong> \u2014 useful when you can only decide based on what was loaded. Prefer <code>@PreAuthorize</code> when you can check up front; reach for <code>@PostAuthorize</code> when the decision depends on the result.",
        "visual": "m20-preauthorize",
        "code": "@PreAuthorize(\"hasRole('REVIEWER')\")\npublic PriorAuthResponse decide(String authNumber, Decision decision) {\n    // only reached if the caller has ROLE_REVIEWER; otherwise 403\n    ...\n}\n\n@PreAuthorize(\"hasAuthority('SCOPE_prior-auth:write')\")\npublic PriorAuthResponse submit(SubmitPriorAuthRequest body) { ... }"
      },
      {
        "title": "Expression-Based & Object-Level Rules",
        "body": "SpEL makes truly fine-grained rules possible because the expression can see the <strong>method arguments</strong> (by name, e.g. <code>#authNumber</code>), the <strong>authentication</strong> (<code>authentication.name</code>, the principal's authorities), and even <strong>custom beans</strong> (<code>@beanName.method(...)</code>) for logic too complex for an inline expression. That's how you express ownership: \"a reviewer may decide an auth only if it's assigned to them.\"\n\nFor decisions that depend on the loaded entity, <code>@PostAuthorize</code> can reference <code>returnObject</code>. And to trim collections to what a user may see, <code>@PostFilter</code>/<code>@PreFilter</code> remove disallowed elements. Push genuinely complex checks into a small <code>@Component</code> (a permission evaluator) and call it from the expression \u2014 keeping the annotation readable while the rule stays unit-testable. These object-level rules are where method security earns its keep.",
        "visual": "m20-spel",
        "code": "// object-level: a reviewer may only decide auths assigned to them\n@PreAuthorize(\"hasRole('REVIEWER') and \" +\n              \"@assignments.isAssignedTo(#authNumber, authentication.name)\")\npublic PriorAuthResponse decide(String authNumber, Decision decision) { ... }\n\n// return-based: you can only read an auth you're assigned to\n@PostAuthorize(\"returnObject.assignedReviewer == authentication.name\")\npublic PriorAuthResponse get(String authNumber) { ... }"
      },
      {
        "title": "Testing Secured Endpoints",
        "body": "Authorization rules are critical code, so test them like any other behavior. The <code>spring-security-test</code> library lets you run a request <em>as</em> a given user: annotate a test with <code>@WithMockUser(roles = \"REVIEWER\")</code> and the security context is populated as if that user were authenticated, no real token needed. Combined with <code>MockMvc</code>, you assert the outcomes directly \u2014 a <code>REVIEWER</code> gets <code>200</code> on <code>decide</code>, a <code>SUBMITTER</code> gets <code>403</code>.\n\nWrite both the positive and negative cases: it's easy to confirm the allowed path works and never notice that the forbidden path is <em>also</em> allowed because a rule was mistyped. A small matrix \u2014 each role against each protected operation \u2014 turns your security policy into executable, regression-proof specifications. With these tests green, the Prior Authorization monolith is fully and verifiably secured.",
        "visual": "m20-security-test",
        "code": "@Test\n@WithMockUser(roles = \"REVIEWER\")\nvoid reviewer_canDecide() throws Exception {\n    mockMvc.perform(patch(\"/api/prior-auths/PA-1/decision\").content(body))\n           .andExpect(status().isOk());\n}\n\n@Test\n@WithMockUser(roles = \"SUBMITTER\")\nvoid submitter_cannotDecide() throws Exception {\n    mockMvc.perform(patch(\"/api/prior-auths/PA-1/decision\").content(body))\n           .andExpect(status().isForbidden());     // 403\n}"
      }
    ],
    "comingFrom": {
      "java": "Without method security, authorization meant manual guards at the top of methods: if (!currentUser().hasRole(\"REVIEWER\")) throw new AccessDeniedException(); repeated in every protected method, easy to forget on a new one, hard to read when ownership logic crept in, and almost never covered by tests. The rule and the business logic tangled together.",
      "context": "Spring lets you declare the rule once, in a @PreAuthorize SpEL expression on the method, with access to arguments, the principal, and custom beans for object-level checks. The framework enforces it via proxies before (or after) the method runs, and @WithMockUser makes each rule directly testable. Authorization becomes a readable, reusable, verifiable annotation instead of scattered imperative checks."
    },
    "keyTakeaways": [
      "Method security (@EnableMethodSecurity) authorizes at the method, complementing coarse URL rules \u2014 defense in depth",
      "@PreAuthorize runs a SpEL check before the method (403 on failure); @PostAuthorize checks the return value after",
      "SpEL can read method args (#arg), the principal (authentication), and custom beans (@bean) for object-level/ownership rules",
      "Test rules with @WithMockUser + MockMvc, asserting both allowed (200) and forbidden (403) cases"
    ]

    "intro": "Tracks 2\u20135 built a complete, secured Prior Authorization <strong>monolith</strong>: one Spring Boot application with REST APIs, a JPA database, and end-to-end security. It works, it's cohesive, and for many systems that's exactly where you should stop. Track 6 takes the next step \u2014 decomposing that monolith into <strong>microservices</strong> \u2014 but the most important lesson comes first: do it for real reasons, not fashion.\n\nA monolith becomes painful when one part needs to scale independently of the others, when teams step on each other deploying a single artifact, when a fault in one area takes down everything, or when different parts want different release cadences. Microservices address those by making each business capability an <strong>independently deployable service</strong> with its own data \u2014 at the cost of real distributed-systems complexity: the network is now in the middle of your calls, data consistency spans services, and you need new infrastructure for configuration, discovery, routing, and resilience.\n\nThis module is the architectural map. You'll see how to find the <strong>seams</strong> in the Prior Authorization domain using bounded contexts, why each service must <strong>own its data</strong> (and never share a database), and what the target platform looks like \u2014 intake, review, eligibility, and notification services behind a gateway, supported by the config, discovery, messaging, and resilience pieces the rest of the course builds.",
    "concepts": [
      {
        "title": "Why Decompose? Monolith Limits",
        "body": "A monolith is a single deployable that contains every capability and usually talks to one database. That simplicity is a genuine strength: one build, one deploy, easy local development, no network between components, straightforward transactions. <strong>Monolith-first is a legitimate and often correct strategy</strong> \u2014 premature decomposition is one of the most expensive mistakes a team can make.\n\nYou decompose when the monolith's coupling starts to <em>cost</em> more than the distribution would. Signature symptoms: one feature (say, eligibility checks) needs far more compute than the rest but you must scale the whole app; multiple teams contend over a single release pipeline; an outage in one area cascades to all; or parts of the system genuinely need independent technology or release cadence. Decompose to solve those specific problems \u2014 not because microservices are in vogue.",
        "visual": "m21-monolith-limits"
      },
      {
        "title": "Bounded Contexts & Decomposition",
        "body": "The hardest question is <em>where to cut</em>. The wrong answer is by technical layer (a 'controllers service', a 'database service') \u2014 that just distributes a tangle. The right answer comes from Domain-Driven Design's <strong>bounded contexts</strong>: split along <strong>business capabilities</strong>, each owning a cohesive slice of the domain with a clear responsibility and its own model.\n\nIn the Prior Authorization domain the seams are natural. <strong>Intake</strong> accepts and validates submissions. <strong>Review</strong> manages the decision workflow (approve/deny, assignment). <strong>Eligibility</strong> looks up payer policies and member coverage \u2014 a distinct capability with different scaling and an external dependency. <strong>Notification</strong> reacts to events and informs providers. Each is a candidate service because each is a bounded context: it changes for its own reasons and can be reasoned about independently. Get these boundaries right and the services stay loosely coupled; get them wrong and every change spans several services.",
        "visual": "m21-bounded-contexts",
        "code": "prior-auth-platform/\n\u251c\u2500\u2500 api-gateway/            # single entry point (M24)\n\u251c\u2500\u2500 prior-auth-intake/      # submit + validate   \u00b7 owns intake DB\n\u251c\u2500\u2500 prior-auth-review/      # decision workflow    \u00b7 owns review DB\n\u251c\u2500\u2500 eligibility-service/    # payer policy & coverage \u00b7 owns its DB\n\u251c\u2500\u2500 notification-service/   # reacts to events (M26)\n\u251c\u2500\u2500 config-server/          # centralized config (M22)\n\u2514\u2500\u2500 discovery-server/       # service registry (M23)"
      },
      {
        "title": "Data Ownership & Shared-Nothing",
        "body": "This is the rule people break first and regret most: <strong>each service owns its own data, and no other service touches that database directly</strong>. A shared database recreates the monolith's coupling invisibly \u2014 two services reading and writing the same tables can't evolve their schemas independently, and a change in one silently breaks the other. It's the single biggest anti-pattern in microservices.\n\n<strong>Shared-nothing</strong> means a service's database is private; others get its data only by calling its API or consuming its <strong>events</strong>. This buys true independence \u2014 Eligibility can change how it stores policies without coordinating with Review \u2014 but it also means data is now <em>distributed</em>: there's no cross-service transaction, and you trade strong consistency for <em>eventual</em> consistency, coordinated by events (Track 7) and patterns like Saga (M27). Accepting that trade-off deliberately is the core discipline of microservice data design.",
        "visual": "m21-data-ownership"
      },
      {
        "title": "The Road Ahead: Decomposing the Prior-Auth System",
        "body": "The rest of the course assembles the supporting platform around these services. A request enters through an <strong>API Gateway</strong> (M24) that routes to the right service and centralizes cross-cutting concerns. Services read their settings from a <strong>Config Server</strong> (M22) and find each other through <strong>Service Discovery</strong> (M23) instead of hardcoded URLs. They communicate <strong>synchronously</strong> over HTTP (M25) and <strong>asynchronously</strong> via Kafka events (M26), coordinating multi-service workflows with the <strong>Saga</strong> pattern (M27).\n\nThen Track 8 makes the distributed system <em>survivable</em> \u2014 circuit breakers and retries (M29), distributed tracing (M30), centralized logging (M31), and health/metrics (M32) \u2014 and Track 9 ships it with Docker and Kubernetes (M33\u2013M36). Keep the bounded contexts and data ownership from this module in mind throughout: every later piece exists to manage the complexity that decomposition introduces. The destination is the same Prior Authorization system you already built, now running as a resilient fleet of services.",
        "visual": "m21-target-arch"
      }
    ],
    "comingFrom": {
      "java": "The default Java deployment is the monolith you built: one JAR, one database, in-process method calls, and a single transaction boundary. It's simple to build, test, and run \u2014 and for a great many systems it's the right answer for a long time. Scaling means running more copies of the whole thing.",
      "context": "Microservices swap that simplicity for independent deployability, per-capability scaling, fault isolation, and team autonomy \u2014 paid for with network calls, distributed data, and operational machinery. Spring Cloud provides the building blocks (config, discovery, gateway, resilience) so you manage that distributed system with the same Spring programming model, rather than inventing the infrastructure yourself."
    },
    "keyTakeaways": [

      "Each service owns its data; sharing a database is the top anti-pattern \u2014 exchange data via APIs and events instead",

    "subtitle": "One versioned source of truth for every service's settings \u2014 fetched on startup, refreshable at runtime, secrets encrypted.",
    "objectives": [
      "Explain why centralized configuration matters once you have many services",
      "Stand up a Spring Cloud Config Server backed by a Git repository",
