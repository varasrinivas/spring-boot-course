    "id": "M31",
    "track": "resilience",
    "track_label": "Resilience & Observability",
    "track_color": "#f472b6",
    "level": "Advanced",
    "title": "Centralized Logging",
    "subtitle": "Ship every service's logs to one searchable place, as structured JSON tagged with the IDs that tie a request together.",
    "objectives": [
      "Explain why microservice logs must be centralized and structured",
      "Emit structured JSON logs that are machine-queryable",
      "Enrich every log line with correlation context via the MDC (trace IDs, business keys)",
      "Aggregate, search, and alert on logs with an ELK/Loki-style pipeline"
    ],
    "intro": "Tracing (M30) showed you <em>where</em> a request spent its time; logs tell you <em>what happened</em> at each step \u2014 the messages, warnings, and errors your code emits. But in the decomposed Prior Authorization platform, those logs are a problem of their own. Each service runs as several ephemeral instances in containers, every one writing to its own local output. When you're investigating an incident, you can't SSH into a dozen short-lived containers and <code>grep</code> them, and the moment a container is replaced its logs are gone.\n\nThe answer has three parts. <strong>Centralize</strong>: ship every instance's logs to one store so you search the whole system from a single place. <strong>Structure</strong>: emit logs as <strong>JSON</strong> with named fields instead of free-form text, so they're machine-parseable and queryable by any field, not just full-text grep. And <strong>correlate</strong>: tag every log line with the context that ties a request together \u2014 the <strong>trace ID</strong> from M30 plus business keys like <code>authNumber</code> \u2014 using the logging <strong>MDC</strong>, so you can pull up every line from every service for one specific authorization.\n\nA <strong>log pipeline</strong> \u2014 classically the <strong>ELK</strong> stack (Elasticsearch, Logstash, Kibana), or Grafana <strong>Loki</strong>, or a cloud service \u2014 collects, indexes, and lets you search and alert on it all. Together with tracing and metrics (M32), centralized structured logging completes observability: when something breaks at 2 a.m., you can find the exact request, follow it across services, and read precisely what each one logged.",
    "concepts": [
      {
        "title": "Why Centralized Logging",
        "body": "In a single-server app, logs live in one file you can tail and grep. Microservices destroy that convenience: a request touches several services, each runs as multiple replicas, and in containers those replicas are <strong>ephemeral</strong> \u2014 created and destroyed by the orchestrator, taking their local logs with them. Searching for an error means it could be in any of dozens of places, and the instance that logged it may no longer exist.\n\n<strong>Centralized logging</strong> ships every instance's log output to a single, durable, searchable store as it's produced. Now there's one place to look, logs survive the container that wrote them, and you can search <em>across</em> all services and replicas at once \u2014 \"show me everything about <code>authNumber=PA-2026-000123</code>\" returns lines from intake, review, and eligibility together. This is a prerequisite for operating a distributed system; without it, debugging in production is impractical.",
        "visual": "m31-centralized"
      },
      {
        "title": "Structured (JSON) Logging",
        "body": "Traditional logs are human-readable lines of free text. That's fine to eyeball but terrible to query at scale: extracting \"all WARN logs for the review service where the response took over 500ms\" from plain text means brittle regex. <strong>Structured logging</strong> emits each log event as <strong>JSON</strong> with named fields \u2014 <code>timestamp</code>, <code>level</code>, <code>service</code>, <code>message</code>, plus any contextual fields \u2014 so the log store can index them and you can filter and aggregate by exact field values.\n\nIn Spring Boot you switch the Logback (or Log4j2) encoder to a JSON encoder (Logstash Logback Encoder, or Boot's built-in structured logging support). Your code keeps using the normal <code>Logger</code> API; only the output <em>format</em> changes. The payoff is that a log becomes data: queryable, dashboard-able, and alertable on specific fields rather than string matching. Structure is what turns a pile of text into a searchable dataset.",
        "visual": "m31-structured",
        "code": "<!-- logback-spring.xml \u2014 emit JSON instead of plain text -->\n<appender name=\"json\" class=\"ch.qos.logback.core.ConsoleAppender\">\n  <encoder class=\"net.logstash.logback.encoder.LogstashEncoder\"/>\n</appender>\n\n// code is unchanged \u2014 still the normal Logger API:\nlog.info(\"prior-auth decided\");\n// output: {\"@timestamp\":\"...\",\"level\":\"INFO\",\"service\":\"review\",\n//          \"traceId\":\"4bf92f\",\"authNumber\":\"PA-2026-000123\",\"message\":\"prior-auth decided\"}"
      },
      {
        "title": "Correlation: MDC & Trace IDs",
        "body": "Structured logs are far more powerful when every line carries the <strong>context</strong> of the request that produced it. The mechanism is the <strong>MDC</strong> (Mapped Diagnostic Context) \u2014 a per-thread (and context-propagated) map of key/value pairs that the logging framework automatically attaches to every log event on that thread. Micrometer Tracing (M30) already puts <code>traceId</code> and <code>spanId</code> into the MDC for you, so each JSON log line is stamped with the trace it belongs to.\n\nYou add the <strong>business keys</strong> that matter for your domain: put <code>authNumber</code> (and maybe the authenticated user) into the MDC at the start of handling a request, and every subsequent log line \u2014 across that service \u2014 includes it automatically, no need to pass it into each log call. Now correlation works two ways: filter the log store by <code>traceId</code> to see every service's logs for one request (joined to the trace timeline in Zipkin), or filter by <code>authNumber</code> to see everything that ever happened to one authorization. Always clear MDC keys when the request finishes so they don't leak to the next one on a reused thread.",
        "visual": "m31-mdc",
        "code": "// at the start of handling a request (e.g. a filter)\nMDC.put(\"authNumber\", request.authNumber());   // business key\ntry {\n    // ...handle... every log line here now includes authNumber\n    log.info(\"validating prior-auth\");           // + traceId/spanId from M30 (auto)\n} finally {\n    MDC.remove(\"authNumber\");                     // clear \u2014 threads are reused\n}"
      },
      {
        "title": "The Log Pipeline: Aggregation & Search",
        "body": "Centralized logging is a <strong>pipeline</strong>. Services write JSON logs; a <strong>shipper</strong> (Filebeat, Fluent Bit, or a Loki agent \u2014 often a sidecar in Kubernetes) collects them and forwards to a <strong>store</strong> that indexes the fields (<strong>Elasticsearch</strong>, or Grafana <strong>Loki</strong>); and a <strong>UI</strong> (<strong>Kibana</strong> or Grafana) lets you search, build dashboards, and define alerts. This is the classic <strong>ELK</strong> stack (Elasticsearch, Logstash, Kibana) or its lighter cousins; managed cloud equivalents exist too.\n\nWith the pipeline in place, operating the platform changes character. You query by any field (<code>service</code>, <code>level</code>, <code>traceId</code>, <code>authNumber</code>), watch error rates on a dashboard, and fire an <strong>alert</strong> when, say, <code>ERROR</code> logs from <code>eligibility</code> spike. Crucially, because the same <code>traceId</code> appears in both your logs and your traces (M30), you can pivot between them \u2014 find a slow trace in Zipkin, copy its trace ID, and read exactly what every service logged during it. Centralized logs, distributed traces, and the metrics coming in M32 are the three pillars of observability that make a microservice system operable.",
        "visual": "m31-elk"
      }
    ],
    "comingFrom": {
      "java": "On a single server you tailed one log file and grepped it. Across containerized microservices that falls apart: logs are split across many ephemeral instances, plain text is hard to query, and a replaced container's logs vanish \u2014 so finding an error means hunting through scattered, short-lived files and correlating them by hand, if they still exist at all.",
      "context": "Centralized structured logging ships every instance's logs as JSON to one indexed, durable store, where each line carries correlation context (traceId from Micrometer Tracing, plus business keys via the MDC). A pipeline (ELK/Loki) lets you search across all services by any field, build dashboards, and alert \u2014 and because the trace ID links logs to traces, you pivot seamlessly between 'what happened' and 'where the time went'."
    },
    "keyTakeaways": [
      "Centralize logs from all ephemeral instances into one durable, searchable store \u2014 local files don't work for microservices",
      "Emit structured JSON logs (via a Logback/Log4j2 JSON encoder) so logs are queryable by field, not just full-text grep",
      "Use the MDC to stamp every log line with correlation context \u2014 traceId/spanId (from M30) and business keys like authNumber; clear keys after the request",
      "A pipeline (ELK or Loki/Grafana) aggregates, indexes, searches, and alerts; shared trace IDs let you pivot between logs and traces"
    ]

    "id": "M32",
    "track": "resilience",
    "track_label": "Resilience & Observability",
    "track_color": "#f472b6",
    "level": "Advanced",
    "title": "Health Checks & Monitoring",
    "subtitle": "Probes that let the platform manage your instances, metrics that quantify health, and alerts that page you before users do.",
    "objectives": [
      "Expose liveness and readiness probes with custom HealthIndicators for orchestration",
      "Publish application metrics via Micrometer and scrape them with Prometheus",
      "Visualize the four golden signals on Grafana dashboards",
      "Alert on symptoms and frame reliability with SLOs \u2014 completing the observability triad"
    ],
    "intro": "Observability has <strong>three pillars</strong>, and you've now built two: <strong>logs</strong> (M31) tell you <em>what happened</em>, <strong>traces</strong> (M30) show <em>where</em> a request spent its time. The third is <strong>metrics</strong> \u2014 numeric measurements over time that answer <em>how much</em> and <em>how healthy</em>: requests per second, error rate, p95 latency, queue depth. This module adds metrics and the operational machinery around them, completing the picture and closing the resilience track.\n\nThree capabilities come together. <strong>Health probes</strong> extend the Actuator health from M08 into the <strong>liveness</strong> and <strong>readiness</strong> signals Kubernetes uses to manage instances \u2014 restart a dead one, stop routing to one that isn't ready \u2014 fed by custom <code>HealthIndicator</code>s like a check that the payer API is reachable. <strong>Metrics</strong> flow through <strong>Micrometer</strong> (the metrics facade you met in M08) to a <code>/actuator/prometheus</code> endpoint that <strong>Prometheus</strong> scrapes into a time-series database. And <strong>Grafana</strong> turns those time series into dashboards and <strong>alerts</strong>.\n\nFor the Prior Authorization platform that means watching submission throughput, decision latency, and eligibility error rates on a dashboard; gating a service's readiness on its dependencies; and getting paged the moment errors spike \u2014 instead of hearing about an outage from a provider. With metrics joining logs and traces, the system is finally <strong>observable</strong>: you can ask any question about its behavior and get an answer.",
    "concepts": [
      {
        "title": "Health Checks for Orchestration",
        "body": "M08 introduced Actuator's <code>/actuator/health</code> and the idea of <code>HealthIndicator</code>s that aggregate into an overall status. In an orchestrated platform that health splits into two operational signals the scheduler acts on. <strong>Liveness</strong> answers \"is this instance alive, or wedged and unrecoverable?\" \u2014 if it's down, Kubernetes (M35) <strong>restarts</strong> the pod. <strong>Readiness</strong> answers \"can this instance serve traffic right now?\" \u2014 if it's down, the platform <strong>stops routing</strong> requests to it but leaves it running to recover.\n\nThe distinction matters: a service that's temporarily can't reach the payer API isn't <em>dead</em> (don't restart it), but it shouldn't take traffic (mark it not-ready). You put a custom <code>PayerHealthIndicator</code> into the <strong>readiness group</strong> so the instance is pulled from rotation while the dependency is down and returns automatically when it recovers. Boot exposes these as <code>/actuator/health/liveness</code> and <code>/readiness</code>, which the orchestrator's probes call \u2014 the bridge between your app's health and the platform managing it.",
        "visual": "m32-probes",
        "code": "@Component\nclass PayerHealthIndicator implements HealthIndicator {\n    public Health health() {\n        return payer.isReachable() ? Health.up().build()\n                                   : Health.down().withDetail(\"payer\",\"unreachable\").build();\n    }\n}\n\n# application.yml \u2014 put it in the readiness group (not liveness)\nmanagement.endpoint.health.group.readiness.include: readinessState,payerHealthIndicator"
      },
      {
        "title": "Metrics with Micrometer & Prometheus",
        "body": "<strong>Micrometer</strong> (M08) is the vendor-neutral metrics facade built into Spring Boot. You record measurements with three core meter types: a <strong>Counter</strong> (a monotonically increasing total \u2014 prior-auths submitted), a <strong>Gauge</strong> (a current value \u2014 queue depth, active connections), and a <strong>Timer</strong> (counts and times events \u2014 decision latency, including a percentile distribution). Boot auto-publishes many out of the box (HTTP request timings, JVM memory, datasource pool), and you add domain metrics by injecting the <code>MeterRegistry</code>.\n\n<strong>Prometheus</strong> is the standard backend. It uses a <strong>pull</strong> model: each service exposes its current metrics at <code>/actuator/prometheus</code> (add the registry dependency), and a Prometheus server <strong>scrapes</strong> that endpoint every few seconds, storing the values as time series labeled by service, instance, endpoint, etc. From those series you can compute rates, percentiles, and aggregations across instances. Metrics are cheap and continuous \u2014 unlike per-request traces, they're always on, giving you the constant pulse of the system.",
        "visual": "m32-prometheus",
        "code": "@Service\nclass PriorAuthService {\n    private final Counter submitted;\n    private final Timer  decisionTimer;\n    PriorAuthService(MeterRegistry reg) {\n        this.submitted     = reg.counter(\"priorauth.submitted\");\n        this.decisionTimer = reg.timer(\"priorauth.decision.latency\");\n    }\n    void submit(...) { submitted.increment(); /* ... */ }\n    Decision decide(...) { return decisionTimer.record(() -> doDecide(...)); }\n}\n// scraped by Prometheus from /actuator/prometheus"
      },
      {
        "title": "The Four Golden Signals & Dashboards",
        "body": "With metrics flowing, the question is <em>which</em> to watch. The SRE <strong>four golden signals</strong> are a proven starting set: <strong>Latency</strong> (how long requests take \u2014 track p95/p99, and separate success from error latency), <strong>Traffic</strong> (demand \u2014 requests per second), <strong>Errors</strong> (the rate of failed requests), and <strong>Saturation</strong> (how full the system is \u2014 CPU, memory, pool/queue utilization). Together they characterize a service's health and usually surface a problem before it becomes an outage.\n\n<strong>Grafana</strong> queries Prometheus and renders these as <strong>dashboards</strong> \u2014 a panel per signal, per service, updating live. For the Prior Authorization platform you'd watch decision latency, submission rate, eligibility error rate, and resource saturation at a glance, and spot, say, latency creeping up as the payer slows. Build dashboards around the golden signals first; add domain-specific panels (approval rate, manual-review fallback rate from M29) as you learn what questions you ask most. A good dashboard turns continuous metrics into an at-a-glance read on whether the system is healthy.",
        "visual": "m32-golden-signals"
      },
      {
        "title": "Alerting & SLOs",
        "body": "Dashboards are for when you're looking; <strong>alerts</strong> are for when you're not. You define rules over the metrics \u2014 error rate above a threshold for several minutes, p99 latency past a budget, a readiness probe failing \u2014 and an alerting system (Prometheus Alertmanager, Grafana alerts) routes a notification to the on-call channel or pager. The discipline is to <strong>alert on symptoms</strong> that affect users (errors, latency) rather than every internal cause, so alerts are actionable and not noisy.\n\nThe maturest framing is <strong>SLOs</strong> (Service Level Objectives): an explicit target like \"99.5% of decisions succeed within 2 seconds.\" The allowed shortfall is your <strong>error budget</strong>; you alert when you're burning it too fast. SLOs turn reliability from a vague goal into a measured agreement that also guides how much to invest in resilience versus features. With alerting in place, the three pillars are complete \u2014 <strong>metrics</strong> tell you something's wrong and page you, <strong>traces</strong> (M30) show which hop, and <strong>logs</strong> (M31) reveal exactly what \u2014 and the Prior Authorization platform is observable and operable. Track 9 now ships it.",
        "visual": "m32-alerting"
      }
    ],
    "comingFrom": {
      "java": "Operationally, a traditional app often had an ad hoc health endpoint, no real metrics (or hand-rolled counters logged to a file), no dashboards, and no automated alerting \u2014 so you learned about an outage when users complained, then dug through logs to guess at causes. Capacity and latency trends were invisible until something broke.",
      "context": "Spring Boot plus Micrometer, Prometheus, and Grafana make this standard and automatic: liveness/readiness probes let the orchestrator manage instances, Micrometer publishes metrics scraped by Prometheus, Grafana dashboards show the golden signals, and alerts page on symptoms against SLOs. Combined with traces and centralized logs, you get true observability \u2014 continuous insight into health, with the ability to drill from a metric alert to the exact trace and log lines."
    },

    "intro": "Back in M05 you packaged a Spring Boot app as an executable <strong>fat JAR</strong> with an embedded server, runnable with <code>java -jar</code> on any machine that has the right Java. That's a big step, but \"the right Java, the right OS libraries, the right environment\" is still real friction \u2014 and it's the source of the eternal \"works on my machine.\" The final track removes it by <strong>containerizing</strong> each prior-auth service.\n\nA <strong>container image</strong> bundles your application <em>and</em> everything it needs to run \u2014 the JRE, OS libraries, configuration \u2014 into one immutable, layered artifact. A container runtime then runs that image identically anywhere: your laptop, a CI runner, a production node, a Kubernetes cluster. There's no host to provision to a precise spec, no drift between environments; the image <em>is</em> the environment. For the decomposed platform, each service becomes its own image \u2014 and that image is the unit Docker Compose (M34) and Kubernetes (M35) will schedule.\n\nYou'll learn the idiomatic ways to build these images: a <strong>multi-stage Dockerfile</strong> that compiles in one stage and ships a slim runtime in another, <strong>layered JARs</strong> that make rebuilds fast by caching dependencies separately from your code, and <strong>buildpacks/Jib</strong> that produce optimized images with no Dockerfile at all. Containerization is the bridge from a runnable JAR to a deployable, orchestratable service.",
    "concepts": [
      {
        "title": "Containerizing a Spring Boot App",
        "body": "A <strong>container</strong> packages a process with its entire userspace environment \u2014 runtime, libraries, files \u2014 isolated from the host, so it runs the same wherever there's a container engine. A <strong>container image</strong> is the immutable, layered blueprint; a <strong>container</strong> is a running instance of it. Compared with deploying a bare JAR onto a host you had to provision with the correct JDK and OS packages, the image carries all of that <em>inside</em> it.\n\nThe benefits are exactly what a microservice fleet needs: <strong>consistency</strong> (dev, CI, and prod run byte-identical images, killing environment drift), <strong>portability</strong> (any machine with a runtime can run it), and <strong>isolation</strong> (each service's dependencies are its own). The fat JAR from M05 is the perfect starting point \u2014 Spring Boot's self-contained JAR maps cleanly onto a container image, where you simply put a JRE and the JAR together and define how to launch it. Each prior-auth service ships as one image, tagged and versioned like any release artifact.",
        "visual": "m33-why-containers"
      },
      {
        "title": "Multi-Stage Dockerfile",
        "body": "A <strong>Dockerfile</strong> is the recipe for an image, built up as a series of layers. The naive approach \u2014 build and run in one image \u2014 drags the entire JDK, Maven, and your source code into the artifact you ship, making it large and widening its attack surface. A <strong>multi-stage</strong> Dockerfile fixes this: a first <em>build</em> stage uses a full JDK image to compile and package the app, and a second <em>runtime</em> stage starts from a slim <strong>JRE</strong> image and copies in <em>only</em> the resulting JAR.\n\nThe build tools and source never reach the final image \u2014 it contains just a runtime and your application, so it's smaller, faster to pull, and more secure. <code>COPY --from=build</code> pulls the JAR out of the build stage. This is the standard hand-written approach when you want explicit control, and it's worth understanding even if you later let buildpacks generate the image for you.",
        "visual": "m33-multistage",
        "code": "# ---- build stage: full JDK, compiles the app ----\nFROM eclipse-temurin:21-jdk AS build\nWORKDIR /app\nCOPY . .\nRUN ./mvnw -q clean package -DskipTests\n\n# ---- runtime stage: slim JRE, just the jar ----\nFROM eclipse-temurin:21-jre\nWORKDIR /app\nCOPY --from=build /app/target/prior-auth-review-*.jar app.jar\nEXPOSE 8080\nENTRYPOINT [\"java\", \"-jar\", \"app.jar\"]"
      },
      {
        "title": "Layered JARs for Caching",
        "body": "Docker images are <strong>layered</strong>, and a layer is only rebuilt (and re-pushed/re-pulled) if it or something before it changed. A naive image copies the whole fat JAR as one layer, so <em>any</em> code change invalidates the entire ~50MB JAR layer \u2014 even though your dependencies didn't change. Spring Boot's <strong>layered JAR</strong> support splits the JAR into logical layers: dependencies, Spring Boot loader, snapshot dependencies, and your application classes.\n\nIn the Dockerfile you extract those layers and <code>COPY</code> them in the order they change \u2014 <strong>least-frequently-changed first</strong>. Dependencies (which change rarely) become an early, cacheable layer; your application code (which changes constantly) is the last, tiny layer. Now a typical code change rebuilds only a few kilobytes, and image builds and deploys become dramatically faster \u2014 important when you're rebuilding many services in CI. The launcher entrypoint runs the extracted layers directly.",
        "visual": "m33-layers",
        "code": "FROM eclipse-temurin:21-jre\nWORKDIR /app\n# copy extracted layers least-changed \u2192 most-changed (best caching)\nCOPY --from=build /app/target/extracted/dependencies/ ./\nCOPY --from=build /app/target/extracted/spring-boot-loader/ ./\nCOPY --from=build /app/target/extracted/snapshot-dependencies/ ./\nCOPY --from=build /app/target/extracted/application/ ./\nENTRYPOINT [\"java\", \"org.springframework.boot.loader.launch.JarLauncher\"]"
      },
      {
        "title": "Buildpacks & Jib: No Dockerfile",
        "body": "Writing and maintaining Dockerfiles across many services is repetitive and easy to get subtly wrong (wrong base image, running as root, no layering). Spring Boot offers two ways to build images <strong>without a Dockerfile</strong>. <strong>Cloud Native Buildpacks</strong> are built into the Boot Maven/Gradle plugin: <code>./mvnw spring-boot:build-image</code> inspects your app and produces an optimized OCI image with a sensible JRE, layered automatically, running as a non-root user \u2014 best practices baked in, no Dockerfile to maintain. <strong>Jib</strong> (a Google plugin) similarly builds layered images, and notably can do so <em>without a Docker daemon</em>, which is handy in CI.\n\nFor most services these are the recommended path: less to maintain, secure and optimized by default, and consistent across the whole fleet. You reach for a hand-written Dockerfile when you need unusual control. Either way the output is the same kind of artifact \u2014 a versioned image you push to a registry, ready for Compose to wire together locally (M34) and Kubernetes to orchestrate in production (M35).",
        "visual": "m33-buildpacks",
        "code": "# Cloud Native Buildpacks \u2014 no Dockerfile, optimized OCI image\n./mvnw spring-boot:build-image \\\n  -Dspring-boot.build-image.imageName=payer/prior-auth-review:1.0\n\n# Jib \u2014 builds layered images, even without a Docker daemon (great in CI)\n./mvnw jib:build -Dimage=payer/prior-auth-review:1.0\n\n# then push the versioned image to a registry for Compose / Kubernetes"
      }
    ],
    "comingFrom": {
      "java": "Deployment traditionally meant copying a JAR or WAR onto a server you had provisioned by hand with a specific JDK, OS packages, and configuration \u2014 and hoping it matched dev. Servers became unique 'snowflakes' that drifted over time, upgrades were risky in place, and 'works on my machine' was a genuine failure mode because the machine, not just the app, was part of the deployment.",
      "context": "Containers make the environment part of the immutable artifact: a multi-stage Dockerfile (or a buildpack/Jib build) produces a layered image containing your app plus its JRE and libraries, which runs identically everywhere a container runtime exists. Layered JARs keep rebuilds fast, buildpacks bake in best practices, and the resulting versioned image is the single unit you ship \u2014 the same one Compose and Kubernetes orchestrate."
    },
    "keyTakeaways": [

      "A multi-stage Dockerfile builds with a full JDK then ships only the JAR on a slim JRE, keeping the runtime image small and secure",
      "Spring Boot layered JARs let Docker cache dependencies separately from app code, so typical rebuilds are tiny and fast",

    ],
    "intro": "M33 turned each prior-auth service into an image. But the platform isn't one container \u2014 it's a <em>dozen</em>: the gateway, intake, review, eligibility, and notification services, plus the infrastructure they depend on \u2014 PostgreSQL, Kafka, Zipkin, the config server, the discovery server. Starting all of those by hand with <code>docker run</code>, remembering each port, environment variable, and network link, and launching them in the right order, is tedious and error-prone. You need to describe the whole stack <em>declaratively</em>.\n\n<strong>Docker Compose</strong> does exactly that. A single <code>docker-compose.yml</code> file defines every service, its image or build context, ports, environment, the shared network they communicate over, and the volumes that persist data. Then <code>docker compose up</code> brings the entire platform online together \u2014 and <code>docker compose down</code> tears it cleanly away. The whole environment becomes reproducible, version-controlled, and shareable: a new developer clones the repo and has the full system running in one command.\n\nCompose also handles the realities of a multi-service stack: services reach each other by name over an automatic network, <code>depends_on</code> with <strong>healthchecks</strong> waits for a database to be truly ready before starting the apps that need it, and named volumes keep your Postgres data across restarts. The crucial caveat: Compose is built for a <strong>single host</strong> \u2014 perfect for local development and integration tests, but production multi-host orchestration is Kubernetes's job (M35).",
    "concepts": [
      {
        "title": "Running the Whole Stack Locally",
        "body": "A developer working on the Prior Authorization platform needs all of it running to test a change end to end: the service they're editing, the other services it calls, and the backing infrastructure. Spinning those up individually \u2014 and keeping their ports, credentials, and connections consistent \u2014 is a constant source of friction and \"it worked yesterday\" problems.\n\n<strong>Compose</strong> collapses that into one declarative file and one command. <code>docker compose up</code> builds and starts every defined container; <code>docker compose down</code> stops and removes them. Because the file lives in the repo, the environment is <strong>reproducible</strong> and <strong>shared</strong> \u2014 everyone runs the same stack, and CI can stand up the same set of services for integration tests. The local environment stops being a hand-assembled, drift-prone setup and becomes a versioned artifact like the code itself.",
        "visual": "m34-stack"
      },
      {
        "title": "The Compose File: Services, Networks, Volumes",
        "body": "A <code>docker-compose.yml</code> has three main concepts. <strong>Services</strong> are the containers: each names an <code>image</code> (or a <code>build</code> context for your own services), the <code>ports</code> to publish, and the <code>environment</code> to inject \u2014 this is where you set things like the datasource URL per service. <strong>Networks</strong>: Compose puts all services on a shared network by default and gives each a DNS name equal to its service name, so <code>prior-auth-review</code> reaches the database at host <code>postgres</code> with no IP wiring \u2014 the same service-name addressing discovery used (M23). <strong>Volumes</strong> persist data outside a container's ephemeral filesystem, so the Postgres data survives <code>down</code>/<code>up</code> cycles.\n\nThat's the whole model: declare each container as a service, let the default network handle name-based connectivity, and attach volumes where state must outlive the container. Environment variables in the file (or a referenced <code>.env</code>) configure each service, mapping cleanly onto Spring's externalized configuration from M07.",
        "visual": "m34-compose-anatomy",
        "code": "services:\n  postgres:\n    image: postgres:16\n    environment: { POSTGRES_DB: priorauth, POSTGRES_PASSWORD: secret }\n    volumes: [ \"pgdata:/var/lib/postgresql/data\" ]   # persist DB data\n\n  prior-auth-review:\n    build: ./prior-auth-review\n    ports: [ \"8083:8083\" ]\n    environment:\n      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/priorauth\n      # 'postgres' resolves by service name on the shared network\n\nvolumes:\n  pgdata:"
      },
      {
        "title": "Dependencies & Health: depends_on, healthcheck",
        "body": "Multi-service stacks have a classic race: an application container starts faster than the database it needs and crashes trying to connect. <strong><code>depends_on</code></strong> declares startup order, but on its own it only waits for a container to <em>start</em>, not to be <em>ready</em>. The fix is a <strong><code>healthcheck</code></strong>: a command Compose runs repeatedly to determine whether a service is actually healthy \u2014 <code>pg_isready</code> for Postgres, or hitting <code>/actuator/health/readiness</code> (M32) for a Spring service.\n\nCombine them with <code>depends_on: { condition: service_healthy }</code> and Compose holds a service back until its dependency reports healthy, not merely started. So <code>prior-auth-review</code> waits for Postgres to accept connections before booting, eliminating startup-order flakiness. This makes <code>docker compose up</code> deterministic \u2014 the stack comes up in a correct, gated order every time, which matters as much in CI integration tests as on a laptop.",
        "visual": "m34-depends-health",
        "code": "services:\n  postgres:\n    image: postgres:16\n    healthcheck:\n      test: [ \"CMD-SHELL\", \"pg_isready -U postgres\" ]\n      interval: 5s\n      retries: 5\n\n  prior-auth-review:\n    build: ./prior-auth-review\n    depends_on:\n      postgres:\n        condition: service_healthy      # wait for READY, not just started\n      discovery-server:\n        condition: service_started"
      },
      {
        "title": "Compose's Place: Dev/Test, Not Prod",
        "body": "Compose is superb at what it's for and a poor fit for what it isn't. Its sweet spots: <strong>local development</strong> (the whole platform on your laptop in one command) and <strong>integration testing</strong> (CI spins up real dependencies \u2014 a true Postgres and Kafka \u2014 for tests, which pairs perfectly with Testcontainers in M36). For those, nothing beats its simplicity.\n\nBut Compose runs on a <strong>single host</strong>. It has no real story for spreading services across a cluster, autoscaling, self-healing across node failures, rolling zero-downtime updates, or production-grade networking and secrets. Those are the job of a cluster orchestrator \u2014 <strong>Kubernetes</strong> (M35) \u2014 which takes the same container images and runs them resiliently across many machines. The mental model to keep: <em>Compose for one host in development; Kubernetes for the cluster in production</em>. The images you built in M33 feed both, so moving from Compose locally to Kubernetes in prod doesn't change your artifacts \u2014 only how they're orchestrated.",
        "visual": "m34-compose-vs-k8s"
      }
    ],
    "comingFrom": {
      "java": "Running a multi-service system locally used to mean a README full of manual steps: start the database, set these env vars, run each service in its own terminal in the right order, and hope the ports and links line up. It drifted per developer, broke when someone's setup differed, and was painful to reproduce in CI \u2014 the multi-process equivalent of snowflake servers.",
      "context": "Docker Compose declares the entire stack \u2014 services, network, volumes, health-gated startup order \u2014 in one version-controlled file, brought up with a single command. Services reach each other by name on a shared network, healthchecks make startup deterministic, and volumes persist data. It's the reproducible local and integration-test environment; Kubernetes (M35) takes the same images to production across a cluster."

      "Compose is for single-host development and integration tests; production multi-host orchestration is Kubernetes's role (same images)"
    ]

    "id": "M35",
    "track": "deployment",
    "track_label": "Containerization & Deployment",
    "track_color": "#34d399",
    "level": "Advanced",
    "title": "Kubernetes Essentials",
    "subtitle": "Run the same images across a cluster that scales, self-heals, and updates with zero downtime \u2014 by declaring the desired state.",
    "objectives": [
      "Explain how Kubernetes orchestrates containers across a cluster via declarative desired state",
      "Deploy a service with a Deployment (replicas, self-healing) fronted by a Service",
      "Externalize configuration and secrets with ConfigMaps and Secrets",
      "Wire liveness/readiness probes so Kubernetes self-heals and updates with zero downtime"
    ],
    "intro": "Compose (M34) runs the prior-auth platform beautifully on one machine, but production needs more than one machine \u2014 and it needs the things a single host can't give you: spreading services across nodes, scaling under load, surviving a server failure without downtime, and rolling out new versions without dropping requests. <strong>Kubernetes</strong> is the industry-standard orchestrator that provides all of that, running the very same container images you built in M33 across a <strong>cluster</strong>.\n\nKubernetes is fundamentally <strong>declarative</strong>: you describe the <em>desired state</em> \u2014 \"run three replicas of <code>prior-auth-review:1.0</code>, expose it on this port, give it this config, check it with these probes\" \u2014 in YAML, and the cluster's control plane works continuously to make reality match. If a node dies, it reschedules the lost pods elsewhere; if you ask for more replicas, it creates them; if you deploy a new version, it rolls it out gradually. You manage <em>what you want</em>, not the step-by-step <em>how</em>.\n\nThis module is the <strong>essentials</strong> \u2014 enough to deploy a Spring Boot service properly: the core objects (<strong>Pod</strong>, <strong>Deployment</strong>, <strong>Service</strong>), how to inject configuration and secrets (<strong>ConfigMap</strong>, <strong>Secret</strong>), and how the <strong>liveness/readiness probes</strong> from M32 plug into the cluster to give you self-healing and zero-downtime updates. It pulls the whole course together: the configurable, observable, resilient services you built now run on the platform they were designed for.",
    "concepts": [
      {
        "title": "Kubernetes: Cluster Orchestration",
        "body": "A Kubernetes <strong>cluster</strong> is a set of machines (nodes) managed as one. A <strong>control plane</strong> (the API server, scheduler, and controllers) holds the desired state and decides what runs where; <strong>worker nodes</strong> run the containers. You never start containers directly \u2014 you submit <em>objects</em> describing what you want, and the control plane's controllers run a continuous <strong>reconciliation loop</strong>: compare actual state to desired state and take action to close the gap.\n\nThis is the core idea that makes Kubernetes powerful. Declare three replicas and one crashes? The controller notices actual (2) differs from desired (3) and starts a replacement. Declare a new image version? It rolls pods over to it. A whole node fails? Its pods are rescheduled onto healthy nodes. You describe the target; the system relentlessly drives toward it. The same M33 images run unchanged \u2014 Kubernetes orchestrates <em>how</em> they're placed, scaled, and kept healthy across the cluster.",
        "visual": "m35-cluster"
      },
      {
        "title": "Pods, Deployments & Services",
        "body": "Three objects cover most of what you need. A <strong>Pod</strong> is the smallest deployable unit \u2014 one (or a few tightly-coupled) containers sharing a network and lifecycle; it's where your <code>prior-auth-review</code> container actually runs. But you rarely create Pods directly, because they're <strong>ephemeral</strong>: if one dies, it's gone. A <strong>Deployment</strong> manages them \u2014 you declare a desired replica count and a Pod template, and the Deployment (via a ReplicaSet) keeps that many Pods running, replaces failed ones, and orchestrates <strong>rolling updates</strong> when the template changes.\n\nPods come and go and get new IPs, so clients need something stable to talk to. A <strong>Service</strong> provides that: a stable virtual IP and a cluster-internal DNS name that load-balances across the Pods matching a label <strong>selector</strong>. So <code>prior-auth-review</code> the Service always resolves to whatever review Pods are currently healthy \u2014 the cluster-native version of the service discovery and load balancing from M23. Deployment for managing the Pods, Service for reaching them.",
        "visual": "m35-pod-deploy-svc",
        "code": "apiVersion: apps/v1\nkind: Deployment\nmetadata: { name: prior-auth-review }\nspec:\n  replicas: 3                      # desired count \u2014 controller maintains it\n  selector: { matchLabels: { app: review } }\n  template:\n    metadata: { labels: { app: review } }\n    spec:\n      containers:\n        - name: review\n          image: payer/prior-auth-review:1.0   # the M33 image\n          ports: [ { containerPort: 8083 } ]\n---\napiVersion: v1\nkind: Service\nmetadata: { name: prior-auth-review }\nspec:\n  selector: { app: review }        # load-balances across matching Pods\n  ports: [ { port: 80, targetPort: 8083 } ]"
      },
      {
        "title": "Config & Secrets: ConfigMap, Secret",
        "body": "A container image should be environment-agnostic; the config that differs per environment comes from the cluster. A <strong>ConfigMap</strong> holds non-sensitive configuration as key/value pairs, and a <strong>Secret</strong> holds sensitive values (API keys, passwords) \u2014 same idea, but Secrets are handled more carefully (kept out of plain manifests, mountable from a secrets manager, encryptable at rest). You inject either into a Pod as <strong>environment variables</strong> (<code>envFrom</code>) or as mounted files.\n\nThis maps directly onto Spring's externalized configuration (M07): a ConfigMap key like <code>PRIORAUTH_PAYER_BASE_URL</code> or a Secret key <code>PAYER_API_KEY</code> becomes an environment variable that Spring binds via relaxed binding, exactly as if set in <code>application.yml</code>. So the same image runs in dev and prod with different ConfigMaps/Secrets \u2014 config is decoupled from the artifact, the M07 principle realized at the cluster level. (Spring Cloud Kubernetes can even read them directly, complementing the Config Server from M22.)",
        "visual": "m35-config-secret",
        "code": "apiVersion: v1\nkind: ConfigMap\nmetadata: { name: review-config }\ndata:\n  PRIORAUTH_PAYER_BASE_URL: https://api.payer.com\n---\napiVersion: v1\nkind: Secret\nmetadata: { name: review-secret }\nstringData:\n  PAYER_API_KEY: s3cr3t-rotated-by-platform\n# inject into the Pod (in the Deployment's container spec):\n#   envFrom:\n#     - configMapRef: { name: review-config }\n#     - secretRef:    { name: review-secret }"
      },
      {
        "title": "Probes & Self-Healing",
        "body": "Kubernetes keeps services healthy using exactly the <strong>liveness</strong> and <strong>readiness</strong> probes you built in M32. You point them at <code>/actuator/health/liveness</code> and <code>/actuator/health/readiness</code> in the Deployment. The <strong>liveness</strong> probe answers \"is this Pod wedged?\" \u2014 if it fails, Kubernetes <strong>restarts</strong> the container. The <strong>readiness</strong> probe answers \"can this Pod serve traffic?\" \u2014 if it fails, Kubernetes removes the Pod from the Service's endpoints so no requests are routed to it, without killing it, and adds it back when it recovers (e.g., once the payer dependency is reachable again).\n\nTogether these give <strong>self-healing</strong> (crashed or wedged Pods are replaced automatically) and <strong>zero-downtime rolling updates</strong>: when you deploy a new image, the Deployment starts new Pods, waits for each to pass its readiness probe before sending it traffic, and only then retires an old Pod \u2014 so there's always a healthy set serving requests and a bad rollout never takes the service down. This is the payoff of the whole observability-and-health work: the orchestrator uses your app's own health signals to operate it. Your prior-auth platform \u2014 configured, secured, observable, resilient \u2014 now runs itself on the cluster.",
        "visual": "m35-probes-healing",
        "code": "      containers:\n        - name: review\n          image: payer/prior-auth-review:1.0\n          envFrom:\n            - configMapRef: { name: review-config }\n            - secretRef:    { name: review-secret }\n          livenessProbe:                       # fail \u2192 restart the container\n            httpGet: { path: /actuator/health/liveness, port: 8083 }\n          readinessProbe:                      # fail \u2192 stop routing traffic\n            httpGet: { path: /actuator/health/readiness, port: 8083 }"
      }
    ],
    "comingFrom": {
      "java": "Production deployment traditionally meant a fixed fleet of servers you provisioned and patched, scaling by manually adding machines and re-balancing, failing over by hand (or hoping) when one died, and accepting a maintenance window with downtime to deploy a new version. Configuration was managed per-server, and there was no automatic reconciliation when reality drifted from intent.",
      "context": "Kubernetes makes the deployment declarative and self-managing: you describe the desired state \u2014 image, replica count, config, probes \u2014 and the control plane continuously reconciles it, rescheduling failed Pods, scaling on demand, and rolling out new versions with zero downtime by gating on readiness. ConfigMaps and Secrets decouple config from the image, and your Spring liveness/readiness probes drive the self-healing \u2014 the same images, now orchestrated across a resilient cluster."
    },
    "keyTakeaways": [
      "Kubernetes runs your M33 images across a cluster from declarative desired state; controllers continuously reconcile actual to desired (self-healing, scaling)",
      "A Deployment keeps N replica Pods running and rolls out updates; a Service gives a stable DNS/VIP that load-balances across matching Pods",
      "ConfigMaps (config) and Secrets (sensitive) inject into Pods as env vars/files, mapping to Spring's externalized config \u2014 same image, different environment",
      "Liveness probes restart wedged Pods and readiness probes gate traffic; together they give self-healing and zero-downtime rolling updates using your M32 health endpoints"
    ]
  },

    "title": "CI/CD Pipeline",
    "subtitle": "Automate the path from a commit to production: build, test against real dependencies, push an image, and roll it out with zero downtime.",
    "objectives": [
      "Describe a CI/CD pipeline that takes a commit to the cluster automatically",
      "Build and test on every push with GitHub Actions, including Testcontainers integration tests",

    "intro": "This is the capstone. Over thirty-six modules you've built the <strong>Prior Authorization platform</strong> from the ground up: Spring Core and Boot, REST APIs, JPA persistence, security, a decomposition into microservices, synchronous and event-driven communication, resilience, full observability, container images, and a Kubernetes deployment. One thing remains \u2014 getting a developer's change from a <strong>commit</strong> all the way to <strong>production</strong>, safely, automatically, and often.\n\nThat's <strong>CI/CD</strong>. <strong>Continuous Integration</strong> means every push is automatically built and <em>tested</em> \u2014 including integration tests against <em>real</em> dependencies \u2014 so problems are caught in minutes, not in production. <strong>Continuous Delivery/Deployment</strong> means a change that passes is automatically packaged into a versioned image and rolled out to the cluster with no downtime. The pipeline is the assembly line that connects everything you've built: it compiles the code, runs the tests, builds the image (M33), and updates the Kubernetes Deployment (M35) \u2014 all triggered by <code>git push</code>.\n\nYou'll define a pipeline with <strong>GitHub Actions</strong>, run integration tests with <strong>Testcontainers</strong> (which spin up a genuine Postgres and Kafka in throwaway containers so you test against the real thing), build and push a versioned image, and deploy it to Kubernetes with an automated rolling update. With this in place, shipping the Prior Authorization Service stops being a risky event and becomes a routine, confident, many-times-a-day flow \u2014 and the system you designed now builds, tests, and deploys itself.",
    "concepts": [
      {
        "title": "The CI/CD Pipeline: From Commit to Cluster",
        "body": "A <strong>CI/CD pipeline</strong> is an automated sequence triggered by a code change that carries it through every step needed to reach production. The stages chain together the work of the whole course: <strong>build</strong> the code, <strong>test</strong> it (unit and integration), build and push a container <strong>image</strong>, and <strong>deploy</strong> that image to the cluster. Each stage must pass before the next runs, so a broken build or a failing test stops the change before it can do harm.\n\nThe split: <strong>CI</strong> (Continuous Integration) is the build-and-test half \u2014 it keeps the main branch always releasable by verifying every commit. <strong>CD</strong> is delivery/deployment \u2014 <em>Continuous Delivery</em> produces a deployable artifact and deploys to staging automatically (with a manual gate to prod), while <em>Continuous Deployment</em> goes all the way to production with no human step. The goal is the same: make releasing <strong>small, frequent, and boring</strong>. Big risky releases become a stream of tiny safe ones, each fully tested and trivially rollback-able to the previous image.",

// SIDEBAR RENDER

function renderSidebar(){
  const pct = MODS.length>1 ? Math.round((completed.size/(MODS.length-1))*100) : 0;
  // Group mods by track
  const groups = {};
  MODS.forEach((m,i)=>{
    if(!groups[m.track]) groups[m.track]={meta:TRACK_META[m.track],mods:[]};
    groups[m.track].mods.push({mod:m,idx:i});
  });
  let html = `
    <div class="brand">Spring Boot &<br>Microservices</div>
    <div class="brand-sub">For Java Developers · ${MODS.length} Modules</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${pct}% complete · ${completed.size}/${MODS.length-1} modules</div>
  `;
  for(const [track,group] of Object.entries(groups)){
    html += `<div class="track-group">
      <div class="track-label"><span class="track-dot" style="background:${group.meta.color}"></span>${group.meta.label}</div>`;
    group.mods.forEach(({mod,idx})=>{
      const active = idx===currentIdx ? ' active':'';
      const done = completed.has(mod.id) ? ' done':'';
      html += `<button class="mod-btn${active}${done}" onclick="showModule(${idx})">
        <span class="mod-id">${mod.id}</span>${mod.title}<span class="check">✓</span></button>`;
    });
    html += `</div>`;
  }
  html += `<footer>Built with Claude Code<br>Domain: Prior Authorization Service</footer>`;
  document.getElementById('sidebar').innerHTML = html;
}

function showModule(idx){
  currentIdx = idx;
  const m = MODS[idx];
  document.documentElement.style.setProperty('--accent', m.track_color);
  let html = `
    <div class="mod-header">
      <div class="mod-track"><span class="dot" style="background:${m.track_color}"></span>${m.track_label} · ${m.level}</div>
      <h1 class="mod-title">${m.id}: ${m.title}</h1>
      <p class="mod-subtitle">${m.subtitle}</p>
    </div>
    <div class="objectives"><h3>Learning Objectives</h3><ul>${m.objectives.map(o=>`<li>${o}</li>`).join('')}</ul></div>
    <div class="intro">${m.intro}</div>
  `;
  m.concepts.forEach(c=>{
    html += `<div class="concept"><h3>${c.title}</h3><div class="concept-body">${c.body}</div>`;
    if(c.visual) html += `<div class="visual-container">${renderVisual(c.visual)}</div>`;
    if(c.code) html += `<pre class="code-block">${highlightCode(c.code)}</pre>`;
    html += `</div>`;
  });
  if(m.comingFrom){
    html += `<div class="coming-from">
      <h4>Coming From Java</h4>
      <p><strong>The Java way:</strong> ${m.comingFrom.java}</p>
      <p><strong>The Spring way:</strong> ${m.comingFrom.context}</p>
    </div>`;
  }
  if(m.keyTakeaways){
    html += `<div class="takeaways"><h3>Key Takeaways</h3><ul>${m.keyTakeaways.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  }
  // Mark complete button + nav
  const doneBtn = m.id!=='M00' ? `<button class="nav-btn" onclick="toggleComplete('${m.id}')" style="margin-top:16px">
    ${completed.has(m.id)?'✓ Completed — click to undo':'Mark as Complete'}</button>` : '';
  html += doneBtn;
  html += `<div class="nav-buttons">
    <button class="nav-btn" onclick="showModule(${idx-1})" ${idx===0?'disabled':''}>← Previous</button>
    <button class="nav-btn primary" onclick="showModule(${idx+1})" ${idx===MODS.length-1?'disabled':''}>Next →</button>
  </div>`;
  document.getElementById('main').innerHTML = html;
  renderSidebar();
  window.scrollTo(0,0);
}

function toggleComplete(id){
  if(completed.has(id)) completed.delete(id); else completed.add(id);
  saveProgress();
  showModule(currentIdx);
}

// Simple syntax highlighting for Java code blocks
function highlightCode(code){
  // Escape once, then highlight in a SINGLE pass with alternation so inserted
  // <span> markup is never re-scanned (avoids nested-span corruption).
  // Order matters: comment, then string, then annotation, then keyword.
  // Comment forms (run on the already-escaped text, so XML is &lt;!-- --&gt;):
  //   <!-- --> (XML, multiline) | /* */ (block) | // (not after ':' so URLs survive)
  //   | -- (SQL line; needs a trailing space so YAML '---' separators are NOT matched)
  //   | # (YAML/Dockerfile/shell/properties).
  // Strings match first at the quote, so a comment marker inside a "string" is protected.
  const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(
    /(&lt;!--[\s\S]*?--&gt;|\/\*[^\n]*?\*\/|(?<!:)\/\/[^\n]*|(?<!-)-- [^\n]*|#[^\n]*)|("[^"]*")|(@\w+)|\b(public|private|protected|class|interface|extends|implements|return|new|import|package|void|static|final|if|else|try|catch|throws|throw|var|record)\b/g,
    function(m, comment, str, anno, kw){
      if(comment) return '<span class="cm">' + comment + '</span>';
      if(str)     return '<span class="st">' + str + '</span>';
      if(anno)    return '<span class="an">' + anno + '</span>';
      return '<span class="kw">' + kw + '</span>';
    }
  );
}
