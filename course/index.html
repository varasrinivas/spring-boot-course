    "intro": "Welcome to <strong>Spring Boot & Microservices for Java Developers</strong>. This course is designed for developers who already know core Java \u2014 classes, interfaces, generics, collections, streams \u2014 but haven't yet worked with the Spring ecosystem.\n\nYou'll learn by building a real system: a <strong>Prior Authorization Service</strong> that intakes, validates, reviews, and decisions healthcare prior-authorization requests. Every code example, from your first dependency injection to your Kubernetes deployment, uses this single coherent domain so concepts connect across modules rather than feeling like isolated tutorials.\n\nThe course starts with the <strong>Spring Core Framework</strong> itself \u2014 IoC, dependency injection, beans, AOP, and Spring MVC \u2014 so you understand what Spring Boot automates before you use it. Then it progresses through Spring Boot, REST APIs, JPA data access, and security to build a complete monolith. Finally, it decomposes that monolith into microservices with service discovery, Kafka messaging, resilience patterns, and container orchestration. Each module includes a visual diagram, a \"Coming From Java\" callout that maps Spring concepts to what you already know, and dual-path labs you can work through with Claude Code.",

    "intro": "Every Spring feature you will meet in this course \u2014 Boot's auto-configuration, REST controllers, JPA repositories, security filters \u2014 rests on one foundational idea: <strong>Inversion of Control</strong>. Master it here and the rest of Spring stops feeling like magic.\n\nIn plain Java, your code is in charge of building its collaborators. A <code>PriorAuthService</code> that needs a <code>PriorAuthRepository</code> writes <code>new JpaPriorAuthRepository(...)</code> itself \u2014 and so does every other class that needs one. The wiring is scattered across your codebase, and swapping an implementation means hunting down every construction site.\n\nSpring inverts that control. You <em>declare</em> what a class depends on, and a <strong>container</strong> (the <code>ApplicationContext</code>) constructs the objects, resolves the whole dependency graph, and hands each object its collaborators. Your classes shrink to business logic; the plumbing moves to the container. In this module you'll build the Prior Authorization Service's first managed beans and see exactly how Spring finds and wires them.",

        "title": "Inversion of Control: The Container Owns Object Creation",
        "body": "<strong>Inversion of Control (IoC)</strong> means a framework \u2014 not your code \u2014 decides when and how objects are created and connected. The flow of control is <em>inverted</em>: instead of your <code>PriorAuthService</code> reaching out to build a <code>PriorAuthRepository</code>, the container builds both and pushes the repository into the service.\n\nIn Spring, the IoC container is the <code>ApplicationContext</code>. At startup it reads your configuration, instantiates every <strong>bean</strong> (a container-managed object), works out the dependency graph, and wires it together. By the time your application handles its first request, a fully assembled object graph already exists.\n\nThe payoff is <strong>decoupling</strong>: <code>PriorAuthService</code> no longer knows which <code>PriorAuthRepository</code> implementation it got \u2014 JPA, JDBC, or an in-memory test double. It just knows it has one. That ignorance is exactly what makes Spring code flexible and testable.",

        "body": "Spring can inject a dependency three ways. <strong>Constructor injection</strong> passes collaborators as constructor arguments \u2014 the modern default. <strong>Setter injection</strong> uses a setter method, useful for genuinely optional dependencies. <strong>Field injection</strong> annotates the field directly with <code>@Autowired</code>; it reads compactly but is discouraged.\n\nPrefer <strong>constructor injection</strong>. It lets you mark the field <code>final</code> (the object is fully initialized and immutable once built), it fails fast at startup if a required dependency is missing, and it needs no Spring annotations at all when the class has a single constructor. Crucially, a constructor-injected class can be instantiated in a plain unit test with <code>new</code> \u2014 no container required.",

        "title": "Component Scanning & @Autowired",
        "body": "How does the container know <code>PriorAuthService</code> is a bean at all? <strong>Component scanning</strong>. Spring scans your base package for classes annotated with <code>@Component</code> \u2014 or one of its specializations \u2014 and registers each as a bean.\n\nThe <strong>stereotype annotations</strong> are all <code>@Component</code> under the hood, but they document a class's role: <code>@Repository</code> for data access (and it translates persistence exceptions), <code>@Service</code> for business logic, <code>@RestController</code> for web endpoints. When the scanner finds a bean that needs another bean, it resolves the dependency automatically \u2014 that's <code>@Autowired</code> at work, implicit on a sole constructor.",

    "intro": "In Module 01 the container discovered your beans by scanning for <code>@Component</code> stereotypes. But scanning only works for classes <em>you</em> wrote and can annotate. What about a third-party HTTP client, a <code>Clock</code>, or an object that needs construction logic? And once a bean exists, <strong>how long does it live</strong>, and can you run code when it's created or destroyed?\n\nThis module answers those questions. You'll define beans the explicit way \u2014 <code>@Bean</code> factory methods inside a <code>@Configuration</code> class \u2014 for the Prior Authorization Service's payer HTTP client and clock. You'll see why the default <strong>singleton</strong> scope means one shared instance for the whole application, when to switch to <strong>prototype</strong>, and how the <code>ApplicationContext</code> walks every bean through a defined <strong>lifecycle</strong>.\n\nUnderstanding the lifecycle matters because real services need to do work at the right moments: warm a cache of CPT policy rules <em>after</em> dependencies are injected but <em>before</em> the first request, and release resources cleanly on shutdown. Spring gives you <code>@PostConstruct</code> and <code>@PreDestroy</code> hooks for exactly that.",
    "concepts": [

        "body": "Component scanning registers classes you annotate. But you can't put <code>@Component</code> on a class from a library, and sometimes creating a bean needs real logic \u2014 reading a URL, setting a timeout, choosing an implementation. For those cases you write a <strong><code>@Bean</code> factory method</strong> inside a <strong><code>@Configuration</code></strong> class.\n\nA <code>@Configuration</code> class is itself a bean; each <code>@Bean</code> method it declares returns an object the container manages. The method's parameters are themselves injected, so a <code>@Bean</code> can depend on other beans. By default the method name becomes the bean name. This is how you register a <code>PayerClient</code> for the eligibility API or a shared <code>Clock</code> \u2014 then inject them anywhere, just like a scanned component.",

        "body": "A bean's <strong>scope</strong> controls how many instances the container creates and how long each lives. The default is <strong>singleton</strong>: one instance per <code>ApplicationContext</code>, shared by every collaborator that injects it. That is ideal for <em>stateless</em> services like an <code>AuthRulesEngine</code> \u2014 and it's why singleton beans must be thread-safe.\n\nWhen a bean holds <em>per-use</em> mutable state, a shared singleton would be a bug. <strong>Prototype</strong> scope makes the container hand out a <em>new</em> instance every time the bean is requested. A <code>MedicalNecessityCheck</code> that accumulates findings for one authorization should be prototype-scoped. (Web applications add <code>request</code> and <code>session</code> scopes \u2014 same idea, bounded to an HTTP request or session.)",

        "body": "Every bean moves through a defined lifecycle: the container <strong>instantiates</strong> it (constructor), <strong>injects</strong> its dependencies, runs any <strong>initialization</strong> callbacks, keeps it <strong>in use</strong>, and finally runs <strong>destruction</strong> callbacks before discarding it.\n\nThe two hooks you'll reach for most are <code>@PostConstruct</code> and <code>@PreDestroy</code>. <code>@PostConstruct</code> runs once, <em>after</em> dependencies are wired \u2014 the right place to warm a cache of policy rules or validate configuration. <code>@PreDestroy</code> runs on shutdown \u2014 the place to flush buffers or close connections. Because they fire after injection and before teardown, you never touch a half-built or already-gone object. (Note: prototype beans get <code>@PostConstruct</code> but Spring does <em>not</em> call <code>@PreDestroy</code> on them \u2014 the container stops tracking them once created.)",
        "visual": "m02-lifecycle",
        "code": "@Component\npublic class AuthPolicyCache {\n\n    private final PolicyLoader loader;          // injected\n    private Map<String, Policy> byCpt;\n\n    public AuthPolicyCache(PolicyLoader loader) { this.loader = loader; }\n\n    @PostConstruct                              // after deps injected, before first use\n    void warm() {\n        byCpt = loader.loadAll();               // load CPT policy rules once\n    }\n\n    @PreDestroy                                 // before the container removes the bean\n    void flush() {\n        byCpt.clear();\n    }\n}"
      },
      {
        "title": "@Component vs @Bean: Choosing",
        "body": "Both register a bean \u2014 the question is who owns the class. Reach for <strong><code>@Component</code></strong> (and its stereotypes <code>@Service</code>, <code>@Repository</code>, <code>@RestController</code>) when the class is <em>yours</em> and you can annotate it: the scanner finds it automatically with zero configuration.\n\nReach for a <strong><code>@Bean</code> method</strong> when you <em>can't</em> annotate the class (it's from a library), or when constructing it needs logic \u2014 choosing an implementation, reading configuration, building with a fluent API. Rule of thumb: <em>annotate what you own, declare what you don't.</em> Both produce identical container-managed beans; only the registration mechanism differs."
      }

      "java": "Without Spring you manage all of this by hand. Shared services become hand-rolled singletons (a static field, an enum, or a double-checked-locking getInstance()). Construction logic lives in static factory methods you must remember to call. Initialization runs in constructors, and cleanup means scattering try/finally blocks or registering JVM shutdown hooks yourself. There is no standard 'this object is fully built' or 'this object is about to die' signal.",
      "context": "Spring gives every bean a uniform lifecycle and scope model. Singletons are created and cached for you; prototype hands out fresh instances on demand; @PostConstruct and @PreDestroy are standard, framework-invoked hooks that fire at exactly the right moment. You declare intent (scope, hooks) instead of writing plumbing."

    "id": "M03",
    "track": "core",
    "track_label": "Spring Core Fundamentals",
    "track_color": "#6ea3d8",
    "level": "Foundational",
    "title": "Aspect-Oriented Programming",
    "subtitle": "Pull logging, security, and timing out of your business logic and apply them declaratively across many methods.",
    "objectives": [
      "Recognize cross-cutting concerns and why scattering them across methods hurts maintainability",

      "Apply the advice types \u2014 @Before, @AfterReturning, @AfterThrowing, and @Around",

    ],
    "intro": "Some responsibilities don't belong to any single class but show up <em>everywhere</em>: audit logging, security checks, timing, transaction boundaries. In the Prior Authorization Service, every service method should log who did what (compliance), verify the caller's permissions, and ideally record how long payer calls take. If you write those lines into each method by hand, your business logic drowns in plumbing and the same code is copy-pasted dozens of times.\n\n<strong>Aspect-Oriented Programming (AOP)</strong> solves this by letting you <em>extract</em> a cross-cutting concern into one place \u2014 an <strong>aspect</strong> \u2014 and declaratively apply it to many methods at once. Your <code>PriorAuthService.submit()</code> goes back to expressing only the authorization decision, while an <code>AuditAspect</code> transparently logs every call.\n\nSpring implements AOP with <strong>proxies</strong>: at startup it wraps your beans so that calls pass through your advice before reaching the real method. You'll learn the vocabulary (aspect, pointcut, advice, join point), the advice types and exactly when each fires, and the one proxy-based gotcha \u2014 self-invocation \u2014 that surprises everyone the first time.",
    "concepts": [
      {
        "title": "Cross-Cutting Concerns: The Problem AOP Solves",
        "body": "A <strong>cross-cutting concern</strong> is a responsibility that spans many parts of the application rather than living in one module \u2014 logging, security, caching, timing, transactions. Look at a <code>submit()</code> method that handles them inline: only one line is the actual authorization decision; the rest is logging, a security check, and timing. Now multiply that across <code>approve()</code>, <code>deny()</code>, and <code>search()</code> \u2014 the same boilerplate, copied and slightly varied, impossible to change in one place.\n\nThis is <em>tangling</em> (concerns mixed inside one method) and <em>scattering</em> (one concern spread across many methods). AOP lets you lift each concern into a single aspect and weave it back in declaratively, so business methods state only business logic.",
        "visual": "m03-cross-cutting",
        "code": "// WITHOUT AOP \u2014 business logic buried under cross-cutting noise\npublic Decision submit(PriorAuthRequest r) {\n    log.info(\"submit start: {}\", r.authNumber());     // logging\n    security.check(r);                                 // security\n    long t = System.nanoTime();                        // timing\n    Decision d = rules.evaluate(r);                    // \u2190 the only business line\n    log.info(\"submit done in {}ms\", (System.nanoTime()-t)/1_000_000);\n    return d;\n}"
      },
      {
        "title": "Aspects, Pointcuts & Advice: The Vocabulary",
        "body": "AOP has four core terms. A <strong>join point</strong> is a point in execution where advice could apply \u2014 in Spring AOP, always a method call. A <strong>pointcut</strong> is an expression that <em>selects</em> which join points to match (e.g., \"every method in the service package\"). <strong>Advice</strong> is the code that runs at a matched join point. An <strong>aspect</strong> bundles a pointcut together with its advice.\n\nYou declare an aspect with <code>@Aspect</code> on a <code>@Component</code> (so it's a bean), then annotate methods with advice annotations whose value is a pointcut expression. The <code>execution(...)</code> designator is the workhorse: <code>execution(* com.payer.priorauth.service.*.*(..))</code> reads as \"any return type, any class in the service package, any method, any arguments.\"",
        "visual": "m03-aop-vocab",
        "code": "@Aspect\n@Component\npublic class AuditAspect {\n\n    // pointcut: every method in the service package; advice: log the call\n    @Before(\"execution(* com.payer.priorauth.service.*.*(..))\")\n    public void logEntry(JoinPoint jp) {\n        log.info(\"calling {}\", jp.getSignature().getName());\n    }\n}"
      },
      {
        "title": "Advice Types: @Before, @AfterReturning, @AfterThrowing, @Around",
        "body": "Spring offers five advice types that fire at different moments. <code>@Before</code> runs ahead of the method. <code>@AfterReturning</code> runs after it returns normally (and can read the returned value). <code>@AfterThrowing</code> runs only if it throws. <code>@After</code> runs always, like a <code>finally</code>. <code>@Around</code> is the most powerful: it <em>wraps</em> the call, receives a <code>ProceedingJoinPoint</code>, and must call <code>proceed()</code> to run the target \u2014 letting it measure timing, retry, cache, or even skip the call entirely.\n\nUse the weakest advice that does the job: prefer <code>@Before</code>/<code>@AfterReturning</code> for observation, and reserve <code>@Around</code> for when you need to control or transform the invocation.",
        "visual": "m03-advice-types",
        "code": "@Aspect\n@Component\npublic class TimingAspect {\n\n    @Around(\"execution(* com.payer.priorauth..PayerClient.*(..))\")\n    public Object time(ProceedingJoinPoint pjp) throws Throwable {\n        long start = System.nanoTime();\n        try {\n            return pjp.proceed();                     // run the real method\n        } finally {\n            long ms = (System.nanoTime() - start) / 1_000_000;\n            log.info(\"{} took {}ms\", pjp.getSignature().getName(), ms);\n        }\n    }\n}"
      },
      {
        "title": "How Spring AOP Works: Proxies",
        "body": "Spring AOP is <strong>proxy-based</strong>. When a bean is advised, the container doesn't inject the bean itself \u2014 it injects a <strong>proxy</strong> that wraps it. Every call from outside hits the proxy first, which runs the matching advice and then delegates to the real target. (Spring uses a JDK dynamic proxy when the bean implements an interface, or a CGLIB subclass otherwise.)\n\nThis design has one famous consequence: <strong>self-invocation bypasses advice</strong>. If <code>submit()</code> calls <code>this.approve()</code> directly, the call never leaves the target object, so it never goes through the proxy and <code>approve()</code>'s advice does not fire. The fixes: call through an injected reference to the bean, or restructure so the advised method is invoked from outside. Pointcuts can also match a custom annotation, advising only methods you opt in with it.",
        "visual": "m03-proxy",
        "code": "// Advise only methods you explicitly mark \u2014 a custom-annotation pointcut\n@Around(\"@annotation(com.payer.priorauth.audit.Audited)\")\npublic Object audit(ProceedingJoinPoint pjp) throws Throwable { /* ... */ }"
      }
    ],
    "comingFrom": {
      "java": "Without AOP you centralize cross-cutting logic by hand: write a decorator/wrapper class for each interface and forward every method (verbose, one per type), or simply copy logging, security, and timing into every method and keep them in sync forever. Servlet Filters can wrap the web edge, but they can't see or advise calls between your service and repository beans.",
      "context": "Spring AOP lets you write the concern once as an aspect and select where it applies with a pointcut expression \u2014 no per-class wrappers, no duplication. At startup Spring weaves it in via proxies, so adding audit logging to every service method is a few lines in one file instead of an edit in dozens."
    },
    "keyTakeaways": [
      "Cross-cutting concerns (logging, security, timing, transactions) tangle and scatter when written inline",
      "An aspect pairs a pointcut (which join points to match) with advice (the code to run there)",
      "@Before/@AfterReturning/@AfterThrowing/@After observe; @Around wraps the call and must invoke proceed()",
      "Spring AOP works through proxies, so a bean calling its own advised method (self-invocation) skips the advice"
    ]
  },

    "intro": "Track 1 closes where the outside world meets your application: the <strong>web layer</strong>. Everything you've learned \u2014 beans, injection, aspects \u2014 now has a front door. Spring MVC is the framework that turns an incoming HTTP request into a call on one of your methods and turns your return value into an HTTP response.\n\nAt its heart is a single <strong>front controller</strong>, the <code>DispatcherServlet</code>. Rather than writing one servlet per URL, you register handler methods and let the DispatcherServlet route each request to the right one. When someone asks the Prior Authorization Service for <code>GET /prior-auths/PA-2026-000123</code>, the DispatcherServlet figures out which method handles it, invokes it, and renders the result \u2014 whether that's an HTML page or a JSON document.\n\nThis module is deliberately the <em>mechanics</em>: the request lifecycle, handler mapping, the <code>Model</code>, and view resolution. Understanding it pays off twice \u2014 Track 2 shows how Spring Boot auto-configures the DispatcherServlet so you write none of the setup, and Track 3 builds REST APIs on exactly this machinery, where <code>@RestController</code> is just <code>@Controller</code> that skips the view and serializes your return value.",
    "concepts": [
      {
        "title": "The DispatcherServlet: Spring's Front Controller",
        "body": "Classic Java web apps mapped each URL to its own servlet. Spring MVC instead uses the <strong>front controller</strong> pattern: a single servlet, the <code>DispatcherServlet</code>, receives <em>every</em> request and orchestrates the response. It doesn't contain your logic \u2014 it delegates to the right <strong>handler</strong> (a controller method) and coordinates the supporting components (handler mapping, argument resolution, view resolution).\n\nThis centralization is what makes cross-cutting web behavior \u2014 content negotiation, exception handling, locale resolution \u2014 consistent across the whole app. In a Spring Boot application you never register the DispatcherServlet yourself; Boot auto-configures it and maps it to <code>/</code>. You just write handler methods and the front controller finds them.",

        "title": "The Request Processing Lifecycle",
        "body": "Every request follows the same path. The <strong>DispatcherServlet</strong> receives it, then asks a <strong>HandlerMapping</strong> which handler matches the URL and HTTP method. It invokes that handler through a <strong>HandlerAdapter</strong>, which resolves the method's arguments (path variables, query params, request body) and calls your controller. The controller returns a <strong>Model</strong> (the data) plus a logical <strong>view name</strong>. The DispatcherServlet hands that to a <strong>ViewResolver</strong>, which produces a <strong>View</strong> that renders the model into the response.\n\nThe key insight: the DispatcherServlet orchestrates all of it, and you only write the controller. Every other component has a sensible default that Boot configures for you \u2014 which is exactly why a handler method is often the only code you need.",
        "visual": "m04-request-lifecycle"

        "title": "Controllers & Request Mapping",
        "body": "A <strong><code>@Controller</code></strong> is a stereotype (a <code>@Component</code>) whose methods handle web requests. You declare which requests with mapping annotations: <code>@RequestMapping</code> at the class level sets a base path, and method-level <code>@GetMapping</code>, <code>@PostMapping</code>, etc. match an HTTP verb and path.\n\nHandler methods bind parts of the request to parameters: <code>@PathVariable</code> pulls a value out of the URL template (<code>/{authNumber}</code>), <code>@RequestParam</code> reads a query string value (<code>?status=PENDING</code>), and a <code>Model</code> parameter lets you add attributes the view will render. Spring's argument resolvers populate all of these before your code runs, so a handler reads like a plain method that happens to receive request data.",
        "visual": "m04-mapping",
        "code": "@Controller\n@RequestMapping(\"/prior-auths\")\npublic class PriorAuthViewController {\n\n    private final PriorAuthService service;\n    public PriorAuthViewController(PriorAuthService service) { this.service = service; }\n\n    @GetMapping(\"/{authNumber}\")\n    public String view(@PathVariable String authNumber,\n                       @RequestParam(required = false) String tab,\n                       Model model) {\n        model.addAttribute(\"request\", service.findByNumber(authNumber));\n        return \"prior-auth-detail\";          // logical view name\n    }\n}"
      },

        "visual": "m04-model-view",
        "code": "// Classic MVC: return a view name; ViewResolver renders an HTML page\n@GetMapping(\"/{authNumber}\")\npublic String view(@PathVariable String authNumber, Model model) {\n    model.addAttribute(\"request\", service.findByNumber(authNumber));\n    return \"prior-auth-detail\";\n}\n\n// @ResponseBody: skip the view; serialize the return value to JSON\n@GetMapping(\"/{authNumber}\")\n@ResponseBody\npublic PriorAuthRequest viewJson(@PathVariable String authNumber) {\n    return service.findByNumber(authNumber);\n}"

    "intro": "Track 1 showed you the machinery: the IoC container, dependency injection, bean lifecycle, aspects, and the DispatcherServlet that fronts every web request. It also showed you how much <em>assembly</em> that machinery traditionally requires \u2014 choosing a servlet container, registering the DispatcherServlet, curating compatible library versions, packaging a WAR.\n\n<strong>Spring Boot</strong> is not a different framework; it's an opinionated layer on top of the same core Spring you just learned. Its job is to make the assembly disappear. With one annotation and a starter dependency, the Prior Authorization Service gets a fully configured DispatcherServlet, a JSON message converter, a connection pool, sensible defaults for hundreds of settings \u2014 and an <strong>embedded web server</strong> so the app runs with <code>java -jar</code> instead of being deployed into one.\n\nThis module is your first Boot app. You'll see what <code>@SpringBootApplication</code> actually stands for, generate a project from <code>start.spring.io</code>, and understand why the result is a single executable JAR with Tomcat inside it. Everything after this \u2014 REST, JPA, security, microservices \u2014 runs on this foundation.",
    "concepts": [
      {
        "title": "What Spring Boot Adds Over Core Spring",
        "body": "Plain core Spring gives you the container but leaves the setup to you: select and configure a servlet container, register the <code>DispatcherServlet</code> you met in M04, wire view resolution and message conversion, and \u2014 most painfully \u2014 pick a mutually compatible set of library versions. Miss a version and you get cryptic <code>NoSuchMethodError</code>s at runtime.\n\nSpring Boot replaces that effort with three ideas: <strong>starters</strong> (one dependency that pulls in a curated, version-aligned set of libraries), <strong>auto-configuration</strong> (beans configured automatically based on what's on the classpath), and an <strong>embedded server</strong> (Tomcat ships inside your app). The container, beans, and DI are identical to Track 1 \u2014 Boot just stops making you assemble them by hand.",

        "body": "A Boot app starts from a single class annotated with <code>@SpringBootApplication</code>. That one annotation is a <em>meta-annotation</em> bundling three you can reason about individually: <code>@Configuration</code> marks the class as a source of bean definitions; <code>@EnableAutoConfiguration</code> triggers Boot's classpath-driven configuration (this is the 'magic'); and <code>@ComponentScan</code> discovers your <code>@Component</code>/<code>@Service</code>/<code>@RestController</code> beans in this package and below.\n\nThe <code>main</code> method calls <code>SpringApplication.run(...)</code>, which creates the <code>ApplicationContext</code>, runs auto-configuration, performs component scanning, and starts the embedded server. Because <code>@ComponentScan</code> defaults to the annotated class's package, you place this class at the <strong>root package</strong> so it scans everything below it.",
        "visual": "m05-sba-annotation",
        "code": "package com.payer.priorauth;\n\nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication   // @Configuration + @EnableAutoConfiguration + @ComponentScan\npublic class PriorAuthServiceApplication {\n\n    public static void main(String[] args) {\n        SpringApplication.run(PriorAuthServiceApplication.class, args);\n    }\n}"

        "title": "start.spring.io & Project Structure",
        "body": "You rarely create a Boot project by hand. <strong>Spring Initializr</strong> (<code>start.spring.io</code>, also built into IntelliJ and VS Code) generates one for you: pick the build tool, language, Boot version, and <strong>starter</strong> dependencies, and it produces a ready-to-run project with the conventional Maven/Gradle layout.\n\nThe result follows a standard structure: your root <code>@SpringBootApplication</code> class under <code>src/main/java</code>, configuration in <code>src/main/resources/application.properties</code> (or <code>.yml</code>), tests under <code>src/test/java</code>, and a <code>pom.xml</code> that inherits from <code>spring-boot-starter-parent</code> for managed versions. Adding a capability later means adding a starter \u2014 <code>spring-boot-starter-data-jpa</code>, <code>spring-boot-starter-security</code> \u2014 not hunting individual libraries.",
        "visual": "m05-initializr",

    "intro": "In M05 the <code>@EnableAutoConfiguration</code> half of <code>@SpringBootApplication</code> did something that felt like magic: a single starter dependency produced a working DispatcherServlet, JSON conversion, and more, with no configuration from you. This module pulls back the curtain \u2014 there is no magic, only <strong>conditions</strong>.\n\n<strong>Auto-configuration</strong> is a large set of configuration classes Boot ships, each guarded by conditions. At startup Boot evaluates them against your <em>classpath</em> (which libraries are present) and your <em>properties</em>, and registers the beans whose conditions pass. Add <code>spring-boot-starter-data-jpa</code> and an H2 driver to the Prior Authorization Service, and Boot sees JPA and a JDBC driver on the classpath and auto-configures a <code>DataSource</code>, an <code>EntityManagerFactory</code>, and a transaction manager \u2014 beans you would otherwise have written by hand.\n\nCrucially, this is never a black box you're stuck with. Every auto-configured bean backs off the moment you define your own, and any default can be tuned with a property. You'll learn the conditional annotations that make this work, how starters feed them, and how to override and inspect the result.",
    "concepts": [

        "title": "What Auto-Configuration Actually Does",

    "intro": "In M06 you tuned auto-configured beans by setting properties like <code>spring.datasource.url</code>. But where do those properties come from, how do you add your own, and how do they differ between your laptop and production? That's <strong>externalized configuration</strong> \u2014 and getting it right is what lets one build artifact run unchanged in every environment.\n\nThe Prior Authorization Service needs settings that aren't code: the payer API base URL and timeout, retry counts, pool sizes, feature flags, and secrets like an API key. Hard-coding them is a non-starter \u2014 the payer endpoint in dev isn't the one in production. Spring Boot reads configuration from a <em>layered</em> set of sources (files, environment variables, command-line) with a clear precedence, binds it into your beans, and lets you swap whole sets of values with <strong>profiles</strong>.\n\nThis module covers the four things you'll use constantly: the property-source precedence order, the two ways to inject config (<code>@Value</code> and <code>@ConfigurationProperties</code>), profiles for per-environment values and beans, and how to make config <strong>type-safe, validated, and secret-safe</strong> so a bad setting fails fast at startup instead of at 2 a.m.",
    "concepts": [
      {
        "title": "Externalized Configuration & Property-Source Precedence",
        "body": "Boot gathers configuration from many <strong>property sources</strong> and merges them into a single <code>Environment</code>. The same key can appear in several sources; a defined <strong>precedence order</strong> decides who wins. From highest to lowest: command-line arguments, OS environment variables, <code>application-{profile}.yml</code>, <code>application.yml</code>, and finally any in-code defaults. Higher sources override lower ones for the same key.\n\nThis ordering is what makes a single artifact portable: <code>application.yml</code> carries safe defaults baked into the JAR, while a deployment supplies environment variables or command-line overrides for what changes per environment. You never rebuild to change a URL \u2014 you override the property from a source that ranks higher than the packaged default.",
        "visual": "m07-property-sources"
      },
      {
        "title": "@Value vs @ConfigurationProperties",
        "body": "There are two ways to pull configuration into your beans. <code>@Value(\"${...}\")</code> injects a <strong>single</strong> property into a field or parameter \u2014 handy for the occasional one-off value, but untyped and easy to scatter. <code>@ConfigurationProperties(prefix=\"...\")</code> binds a <strong>whole group</strong> of related properties to a typed object (often a <code>record</code>), giving you compile-time field names, automatic type conversion (a <code>Duration</code> from <code>5s</code>), IDE completion, and a natural place to validate.\n\nPrefer <strong><code>@ConfigurationProperties</code></strong> for any cohesive set of settings \u2014 the payer client's URL, timeout, and retries belong together as one <code>PayerProperties</code> object, not three loose <code>@Value</code> fields. Reserve <code>@Value</code> for a single value with no natural group.",
        "visual": "m07-value-vs-props",
        "code": "// @Value \u2014 one property at a time; untyped, good for a lone value\n@Value(\"${priorauth.payer.base-url}\")\nprivate String payerBaseUrl;\n\n// @ConfigurationProperties \u2014 type-safe, grouped binding to a record\n@ConfigurationProperties(prefix = \"priorauth.payer\")\npublic record PayerProperties(\n        String baseUrl,\n        Duration timeout,      // \"5s\" \u2192 Duration automatically\n        int maxRetries) {\n}"
      },
      {
        "title": "Profiles: Environment-Specific Config",
        "body": "A <strong>profile</strong> is a named set of configuration activated for a particular environment. Boot always loads <code>application.yml</code> as the base; when a profile is active it <em>also</em> loads <code>application-{profile}.yml</code> and lets those values override the base. You choose the active profile with <code>spring.profiles.active</code> \u2014 set via env var <code>SPRING_PROFILES_ACTIVE=prod</code>, a command-line flag, or a property \u2014 so the same JAR boots with dev or prod settings.\n\nProfiles aren't only for values: annotate a bean with <code>@Profile(\"dev\")</code> and it's created only under that profile. That's how the Prior Authorization Service uses an in-memory stub <code>PolicyLoader</code> in dev and a real one in prod, with no <code>if</code> statements in your code.",
        "visual": "m07-profiles",
        "code": "# application.yml \u2014 shared defaults\npriorauth:\n  payer:\n    base-url: https://sandbox.payer.test\n    timeout: 5s\n    max-retries: 3\n---\n# application-prod.yml \u2014 overrides when 'prod' is active\npriorauth:\n  payer:\n    base-url: https://api.payer.com\n    max-retries: 5\n\n// A bean that exists only in the dev profile\n@Bean @Profile(\"dev\")\nPolicyLoader stubPolicyLoader() { return new InMemoryPolicyLoader(); }"
      },
      {
        "title": "Type-Safe, Validated & Secure Config",
        "body": "Binding config to a typed object unlocks <strong>validation</strong>. Add <code>@Validated</code> to a <code>@ConfigurationProperties</code> class and annotate fields with constraints (<code>@NotBlank</code>, <code>@Min</code>, <code>@NotNull</code>); if a deployment supplies a blank URL or a negative retry count, the application <strong>fails to start</strong> with a clear message \u2014 far better than a <code>NullPointerException</code> on the first request.\n\nSecrets are the other half. Never commit an API key or password into <code>application.yml</code>. Reference an environment variable instead \u2014 <code>api-key: ${PAYER_API_KEY}</code> \u2014 so the value comes from the deployment environment or a secret manager (Vault, AWS Secrets Manager), and source control only ever sees the placeholder. Config that's typed, validated, and secret-safe turns a class of production incidents into startup-time errors.",
        "visual": "m07-config-safety",
        "code": "@Validated\n@ConfigurationProperties(prefix = \"priorauth.payer\")\npublic record PayerProperties(\n        @NotBlank String baseUrl,     // blank \u2192 app won't start\n        @NotNull Duration timeout,\n        @Min(1) int maxRetries) {\n}\n\n# application.yml \u2014 secret comes from the environment, not the file\npriorauth:\n  payer:\n    api-key: ${PAYER_API_KEY}"
      }
    ],
    "comingFrom": {
      "java": "Without Boot you loaded a .properties file by hand with Properties.load(), read System.getProperty() / System.getenv() ad hoc, and handled environments by filtering files at build time (Maven profiles) or swapping config files at deploy \u2014 which meant a different artifact per environment and easy drift. Validating settings or keeping secrets out of the build was all manual.",
      "context": "Boot externalizes configuration into layered property sources merged by a clear precedence, binds it type-safely with @ConfigurationProperties, and varies it per environment with profiles \u2014 all from one immutable artifact. Validation runs at startup and secrets resolve from environment variables, so misconfiguration surfaces immediately and never ships in the JAR."

      "Add @Validated to fail fast on bad config, and resolve secrets from ${ENV} variables instead of committing them"
    ]

    "intro": "You can now build, configure, and auto-wire a Boot app. This module is about <em>living with it</em> \u2014 developing it quickly and operating it confidently. Spring Boot ships two features for that: <strong>DevTools</strong> for a fast development inner loop, and <strong>Actuator</strong> for a production-ready operations surface.\n\nDevTools shortens the edit-run-check cycle: change a class and the app restarts automatically in a fraction of the normal time, and your browser reloads itself. It's a dev-only convenience that's automatically excluded from your production JAR. Actuator is the opposite end \u2014 it's what you turn to in production. It exposes ready-made HTTP endpoints for <strong>health</strong>, <strong>metrics</strong>, <strong>info</strong>, environment, loggers, and more, so a load balancer can probe whether the Prior Authorization Service is up, and a dashboard can chart how many authorizations it's processing.\n\nYou'll wire DevTools, expose Actuator endpoints deliberately, write a custom health indicator that checks the payer API, and add a custom endpoint that reports prior-auth counts. Actuator is also your first taste of observability \u2014 the foundation Track 8 builds on with tracing, structured logging, and Prometheus/Grafana.",

        "title": "Actuator: Production-Ready Endpoints",
        "body": "<strong>Spring Boot Actuator</strong> adds a set of HTTP (and JMX) endpoints under <code>/actuator</code> that expose the running application's internals: <code>/health</code>, <code>/info</code>, <code>/metrics</code>, <code>/env</code>, <code>/loggers</code>, <code>/beans</code>, <code>/mappings</code>, and more. These are how operators and platforms interact with your app without reading code \u2014 a Kubernetes probe hits <code>/health</code>, a dashboard scrapes <code>/metrics</code>.\n\nBecause some endpoints reveal sensitive detail, Actuator is <strong>secure by default</strong>: over HTTP only <code>/health</code> is exposed until you opt in. You explicitly choose what to publish with <code>management.endpoints.web.exposure.include</code>. The rule of thumb: expose <code>health</code>, <code>info</code>, and <code>metrics</code> (or <code>prometheus</code>) broadly, and keep introspection endpoints like <code>env</code> and <code>beans</code> internal or secured.",

        "body": "<code>/actuator/health</code> doesn't compute one boolean \u2014 it <strong>aggregates</strong> many <code>HealthIndicator</code> beans. Boot auto-registers indicators for things on your classpath (the <code>DataSource</code>, disk space, etc.), and the overall status is the <em>worst</em> of them: if any indicator reports <code>DOWN</code>, the whole app reports <code>DOWN</code>. You add your own by implementing <code>HealthIndicator</code> \u2014 for the Prior Authorization Service, a check that the payer API is reachable.\n\nFor orchestration, Boot supports <strong>health groups</strong>: <code>liveness</code> (is the app alive \u2014 should it be restarted?) and <code>readiness</code> (can it serve traffic \u2014 should it receive requests?). These map directly to Kubernetes liveness and readiness probes, which you'll wire up in Track 9. Sensitive details are hidden by default and shown only when configured.",

    "id": "M09",
    "track": "rest",
    "track_label": "Building REST APIs",
    "track_color": "#2dd4bf",
    "level": "Intermediate",
    "title": "REST Controllers",
    "subtitle": "Turn the Prior Authorization Service into a real HTTP API: resources, verbs, and full control over the response.",
    "objectives": [
      "Build a REST resource with @RestController and map collection and item URLs",

    ],
    "intro": "Track 3 builds the API. In M04 you learned that <code>@RestController</code> is just <code>@Controller</code> + <code>@ResponseBody</code> \u2014 a handler whose return value is serialized to the response body instead of resolved to a view. Now you'll use it to expose the Prior Authorization Service as a proper REST API that clients, other services, and the eventual API gateway can call.\n\nREST organizes an API around <strong>resources</strong> identified by URLs and manipulated with <strong>HTTP verbs</strong>. A prior authorization is a resource: the collection lives at <code>/api/prior-auths</code> and a single request at <code>/api/prior-auths/{authNumber}</code>. <code>GET</code> reads, <code>POST</code> creates, <code>PUT</code>/<code>PATCH</code> update, <code>DELETE</code> removes \u2014 and Spring maps each verb to a method with one annotation, automatically converting JSON to your request objects and your return values back to JSON.\n\nYou'll also take control of the <strong>response</strong> itself with <code>ResponseEntity</code> \u2014 setting <code>201 Created</code> with a <code>Location</code> header when a prior-auth is submitted, <code>204 No Content</code> when one is withdrawn \u2014 and learn which status code fits which outcome. This module is the happy path; validation and error responses (<code>400</code>, <code>404</code>, <code>409</code>) get their own treatment in M10.",
    "concepts": [
      {
        "title": "@RestController & Resource Mapping",
        "body": "A REST API is a set of <strong>resources</strong>. You model them as nouns, usually plural, and give each a stable URL: the <em>collection</em> of authorizations is <code>/api/prior-auths</code>, and an individual one is <code>/api/prior-auths/{authNumber}</code>. A <code>@RestController</code> class groups the handlers for a resource, and a class-level <code>@RequestMapping(\"/api/prior-auths\")</code> sets the shared base path so each method only declares the part that differs.\n\nKeep controllers thin: they translate HTTP to method calls and back. The business logic stays in the <code>PriorAuthService</code> from Track 1, injected via the constructor. A good REST controller reads almost like documentation of the API's URL structure.",
        "visual": "m09-rest-resource",
        "code": "@RestController\n@RequestMapping(\"/api/prior-auths\")\npublic class PriorAuthController {\n\n    private final PriorAuthService service;\n    public PriorAuthController(PriorAuthService service) {\n        this.service = service;\n    }\n    // handler methods below map verbs onto this resource\n}"
      },
      {
        "title": "Mapping HTTP Verbs to Methods",
        "body": "Each HTTP verb maps to a handler with a dedicated annotation: <code>@GetMapping</code>, <code>@PostMapping</code>, <code>@PutMapping</code>, <code>@PatchMapping</code>, <code>@DeleteMapping</code>. The method binds request data through parameters: <code>@PathVariable</code> reads a URL segment (<code>{authNumber}</code>), <code>@RequestParam</code> reads a query value (<code>?status=PENDING</code>), and <code>@RequestBody</code> deserializes the JSON request body into an object.\n\nThe return value is serialized straight back to JSON. Note the clean separation of input and output shapes: clients <code>POST</code> a <code>SubmitPriorAuthRequest</code> (just the fields they may set) and receive a <code>PriorAuthResponse</code> (including server-assigned fields like <code>authNumber</code> and <code>status</code>). Using purpose-built request/response records \u2014 rather than exposing your entity \u2014 keeps the API contract stable and intentional.",
        "visual": "m09-verb-methods",
        "code": "@GetMapping                       // GET /api/prior-auths?status=PENDING\npublic List<PriorAuthResponse> list(@RequestParam(required=false) Status status) {\n    return service.findAll(status);\n}\n\n@GetMapping(\"/{authNumber}\")      // GET /api/prior-auths/PA-2026-000123\npublic PriorAuthResponse get(@PathVariable String authNumber) {\n    return service.findByNumber(authNumber);\n}\n\n@PostMapping                      // POST /api/prior-auths  (JSON body)\npublic PriorAuthResponse submit(@RequestBody SubmitPriorAuthRequest body) {\n    return service.submit(body);\n}"
      },
      {
        "title": "ResponseEntity: Status, Headers & Body",
        "body": "Returning an object gives a default <code>200 OK</code> with that object as the body \u2014 fine for reads. But REST is precise about status, and creating a resource deserves more: <strong><code>ResponseEntity</code></strong> lets you set the <strong>status code</strong>, <strong>headers</strong>, and <strong>body</strong> explicitly. When a prior-auth is submitted you should return <code>201 Created</code> with a <code>Location</code> header pointing at the new resource's URL.\n\nOther common shapes: <code>204 No Content</code> for a successful action with nothing to return (withdrawing an authorization), and <code>200 OK</code> with an updated body for a successful update. <code>ResponseEntity</code> has fluent builders \u2014 <code>ResponseEntity.created(uri).body(...)</code>, <code>ResponseEntity.noContent().build()</code> \u2014 so the handler's shape mirrors the HTTP response it produces.",
        "visual": "m09-responseentity",
        "code": "@PostMapping                      // 201 Created + Location header\npublic ResponseEntity<PriorAuthResponse> submit(@RequestBody SubmitPriorAuthRequest body) {\n    PriorAuthResponse created = service.submit(body);\n    URI location = URI.create(\"/api/prior-auths/\" + created.authNumber());\n    return ResponseEntity.created(location).body(created);\n}\n\n@DeleteMapping(\"/{authNumber}\")   // 204 No Content\npublic ResponseEntity<Void> withdraw(@PathVariable String authNumber) {\n    service.withdraw(authNumber);\n    return ResponseEntity.noContent().build();\n}"
      },
      {
        "title": "REST Conventions & Status Codes",
        "body": "Status codes are part of your API contract \u2014 return the one that matches the outcome. <strong>2xx</strong> means success: <code>200 OK</code> for a read or update, <code>201 Created</code> for a successful <code>POST</code> (with <code>Location</code>), <code>204 No Content</code> when there's nothing to return. <strong>4xx</strong> means the client erred: <code>400</code> for a malformed/invalid request, <code>404</code> when the <code>authNumber</code> doesn't exist, <code>409</code> for a conflict like a duplicate active authorization. <strong>5xx</strong> means the server failed unexpectedly.\n\nBeyond codes, follow conventions that make an API predictable: name resources with plural nouns, let verbs (not URLs) express actions, keep <code>GET</code> safe and <code>PUT</code>/<code>DELETE</code> idempotent, and stay stateless \u2014 every request carries what it needs. Producing the right <strong>4xx</strong> responses cleanly, from validation failures and missing resources, is exactly what M10 covers next with <code>@Valid</code> and <code>@ControllerAdvice</code>.",
        "visual": "m09-status-codes"
      }
    ],
    "comingFrom": {
      "java": "Hand-building a REST endpoint on the Servlet API meant reading the method and path off the request, switching on the verb yourself, pulling path and query values out by string parsing, deserializing the JSON body with a library call, then setting the status code and headers and writing the serialized response to the output stream \u2014 per endpoint, every time.",
      "context": "Spring REST makes all of that declarative. One verb annotation maps a method; @PathVariable/@RequestParam/@RequestBody inject typed request data; the return value is serialized to JSON automatically; and ResponseEntity expresses status, headers, and body fluently. The controller becomes a concise description of the API instead of HTTP plumbing."
    },
    "keyTakeaways": [
      "Model resources as plural-noun URLs: a collection (/api/prior-auths) and items (/{authNumber})",
      "Map verbs with @GetMapping/@PostMapping/etc., and bind data with @PathVariable, @RequestParam, @RequestBody",
      "Use ResponseEntity for explicit status, headers (201 Created + Location), and body; 204 No Content when empty",
      "Return the status code that matches the outcome (200/201/204 success); validation and 4xx errors come in M10"

    "id": "M10",
    "track": "rest",
    "track_label": "Building REST APIs",
    "track_color": "#2dd4bf",
    "level": "Intermediate",
    "title": "Request Validation & Error Handling",
    "subtitle": "Reject bad input declaratively and return consistent, standard error responses across the whole API.",
    "objectives": [
      "Declare field constraints with Jakarta Bean Validation and enforce them with @Valid",
      "Understand which exception a validation failure throws and the default 400 response",
      "Centralize exception-to-response mapping with @RestControllerAdvice and @ExceptionHandler",
      "Return standard RFC 7807 ProblemDetail error bodies, including custom fields"
    ],
    "intro": "M09 built the happy path. But real clients send blank member IDs, malformed NPIs, and ask for authorizations that don't exist \u2014 and an API is judged as much by how it <em>fails</em> as how it succeeds. This module makes the Prior Authorization Service reject bad input cleanly and report every error in one consistent shape.\n\nThe two halves are <strong>validation</strong> and <strong>error handling</strong>. Validation stops invalid data at the door: you annotate your request DTOs with <strong>Jakarta Bean Validation</strong> constraints (<code>@NotBlank</code>, <code>@Pattern</code>, <code>@Min</code>) and add <code>@Valid</code> to the controller parameter, and Spring checks them before your handler runs. Error handling decides what the client sees when something goes wrong \u2014 a validation failure, a missing <code>authNumber</code>, a duplicate request.\n\nRather than scatter <code>try/catch</code> across every handler, you centralize it in a <strong><code>@RestControllerAdvice</code></strong>: one class that maps each exception type to an HTTP response. And instead of inventing an error JSON shape per endpoint, you return <strong><code>ProblemDetail</code></strong> \u2014 Spring's implementation of <strong>RFC 7807</strong> <code>application/problem+json</code> \u2014 so every error, everywhere, has the same machine-readable structure.",
    "concepts": [
      {
        "title": "Bean Validation with @Valid",
        "body": "Validation rules belong <em>on the data</em>, not buried in handler code. <strong>Jakarta Bean Validation</strong> lets you annotate DTO fields with constraints: <code>@NotBlank</code> (a non-empty string), <code>@NotNull</code>, <code>@Pattern</code> (matches a regex \u2014 an NPI is 10 digits, a CPT code is 5), <code>@Min</code>/<code>@Max</code>, <code>@Email</code>, and many more. The constraints document the contract and enforce it in one place.\n\nTo trigger them, add <code>@Valid</code> to the <code>@RequestBody</code> parameter. Before your handler body runs, Spring validates the deserialized object against its constraints; only valid data reaches your logic. (Pull in <code>spring-boot-starter-validation</code> to enable it.) The result: <code>submit()</code> can assume its input is well-formed and focus purely on the business action.",
        "visual": "m10-constraints",
        "code": "public record SubmitPriorAuthRequest(\n        @NotBlank String patientMemberId,\n        @Pattern(regexp = \"\\\\d{10}\") String providerNpi,   // NPI: 10 digits\n        @Pattern(regexp = \"\\\\d{5}\")  String cptCode,        // CPT: 5 digits\n        @Min(1) int units) {\n}\n\n@PostMapping\npublic ResponseEntity<PriorAuthResponse> submit(\n        @Valid @RequestBody SubmitPriorAuthRequest body) {   // checked before this runs\n    return ResponseEntity.created(...).body(service.submit(body));\n}"
      },
      {
        "title": "Validation Failure \u2192 Exception \u2192 Default 400",
        "body": "When <code>@Valid</code> fails, Spring doesn't return <code>null</code> or call your handler \u2014 it throws. The exception depends on where the constraint lives: a failed <code>@Valid @RequestBody</code> throws <strong><code>MethodArgumentNotValidException</code></strong>, while constraints on <code>@PathVariable</code>/<code>@RequestParam</code> (on a <code>@Validated</code> controller) throw <strong><code>ConstraintViolationException</code></strong>. Both carry the details of <em>which</em> fields failed and why.\n\nBy default Spring Boot turns these into a <strong><code>400 Bad Request</code></strong> with a basic body. That default is correct on the status but generic on the content \u2014 it doesn't speak your domain or list field errors the way a good API should. The fix isn't to catch exceptions in every handler; it's to handle them once, centrally, which is the next concept.",
        "visual": "m10-valid-flow"
      },
      {
        "title": "Centralized Handling: @RestControllerAdvice",
        "body": "A <strong><code>@RestControllerAdvice</code></strong> is a single class whose <code>@ExceptionHandler</code> methods apply across <em>all</em> your controllers. Each method declares the exception type it handles and returns the response to send. Throw a <code>PriorAuthNotFoundException</code> from anywhere in the service and the advice maps it to <code>404</code>; throw a <code>DuplicateAuthException</code> and it becomes <code>409</code>; the framework's <code>MethodArgumentNotValidException</code> becomes a rich <code>400</code>.\n\nThis keeps controllers and services focused on the success path \u2014 they just <code>throw</code> a meaningful exception \u2014 while one place owns the HTTP translation. Your domain code raises <em>domain</em> exceptions; the advice is the only layer that knows about status codes and error bodies. Add a new error case by adding one handler method.",
        "visual": "m10-controller-advice",
        "code": "@RestControllerAdvice\npublic class ApiExceptionHandler {\n\n    @ExceptionHandler(PriorAuthNotFoundException.class)\n    public ProblemDetail handleNotFound(PriorAuthNotFoundException ex) {\n        ProblemDetail pd = ProblemDetail.forStatusAndDetail(HttpStatus.NOT_FOUND, ex.getMessage());\n        pd.setTitle(\"Prior authorization not found\");\n        return pd;\n    }\n\n    @ExceptionHandler(DuplicateAuthException.class)\n    public ProblemDetail handleDuplicate(DuplicateAuthException ex) {\n        return ProblemDetail.forStatusAndDetail(HttpStatus.CONFLICT, ex.getMessage());\n    }\n}"
      },
      {
        "title": "ProblemDetail (RFC 7807): Standard Error Bodies",
        "body": "An API that returns a different error shape per endpoint is painful to consume. <strong>RFC 7807</strong> defines a standard one \u2014 media type <code>application/problem+json</code> \u2014 and Spring 6 implements it as <strong><code>ProblemDetail</code></strong>. Its fields are conventional: <code>type</code> (a URI identifying the problem kind), <code>title</code> (a short human summary), <code>status</code> (the HTTP code), <code>detail</code> (a specific explanation), and <code>instance</code> (the URI that failed).\n\nYou can attach <strong>custom properties</strong> too \u2014 for a validation failure, a <code>setProperty(\"errors\", ...)</code> map of field \u2192 message. Returning a <code>ProblemDetail</code> (directly or via <code>ResponseEntity</code>) sets the right content type and body automatically. Now every consumer of the Prior Authorization Service \u2014 the gateway, other services, a UI \u2014 parses errors the same way, whether it's a <code>400</code>, <code>404</code>, or <code>409</code>.",
        "visual": "m10-problemdetail",
        "code": "ProblemDetail pd = ProblemDetail.forStatusAndDetail(\n        HttpStatus.BAD_REQUEST, \"One or more fields are invalid\");\npd.setType(URI.create(\"https://errors.payer.com/validation\"));\npd.setTitle(\"Invalid prior-auth request\");\npd.setProperty(\"errors\", fieldErrors);   // custom: { \"cptCode\": \"must be 5 digits\" }"
      }
    ],
    "comingFrom": {
      "java": "By hand, validation meant if-checks sprinkled through every controller (if (memberId == null || memberId.isBlank()) ...), each endpoint throwing and catching in its own way, and error responses assembled manually \u2014 a different JSON shape and status convention in every method. Keeping it consistent across a growing API was a losing battle.",
      "context": "Spring makes both declarative and central. Constraints live on the DTO and run automatically via @Valid; a single @RestControllerAdvice maps every exception to a response; and ProblemDetail gives one RFC-standard error body across the whole API. Controllers throw domain exceptions and stay clean, while clients get consistent, machine-readable errors."
    },
    "keyTakeaways": [
      "Annotate DTO fields with Bean Validation constraints and enforce them with @Valid on the @RequestBody",
      "A failed @Valid throws MethodArgumentNotValidException (body) or ConstraintViolationException (params); default response is 400",
      "@RestControllerAdvice + @ExceptionHandler map exceptions to responses in one place, so handlers just throw domain exceptions",
      "Return RFC 7807 ProblemDetail (application/problem+json) for a consistent, machine-readable error format with optional custom fields"
    ]
  },

    "id": "M11",
    "track": "rest",
    "track_label": "Building REST APIs",
    "track_color": "#2dd4bf",
    "level": "Intermediate",
    "title": "API Documentation",
    "subtitle": "Generate accurate, interactive API docs straight from your code \u2014 no hand-written spec to drift out of date.",
    "objectives": [
      "Explain how springdoc-openapi generates an OpenAPI spec from your controllers and serves Swagger UI",
      "Navigate and use Swagger UI to explore and try endpoints",
      "Enrich endpoint docs with @Operation, @ApiResponse, @Parameter, and @Tag",
      "Document request/response models and error shapes with @Schema and examples"
    ],
    "intro": "You've built the Prior Authorization API's endpoints (M09) and its error contract (M10). Now make it <strong>discoverable</strong>. Other teams, the eventual API gateway, and client-SDK generators all need to know what endpoints exist, what they accept, and what they return \u2014 and they need that description to stay accurate as the code changes.\n\nThe industry standard for describing a REST API is <strong>OpenAPI</strong> \u2014 a machine-readable JSON/YAML document that lists every path, verb, parameter, schema, and response. The trick is to never write it by hand. <strong>springdoc-openapi</strong> inspects your running application \u2014 the <code>@RestController</code> mappings, the request/response DTOs, the Bean Validation constraints, the <code>ProblemDetail</code> responses \u2014 and generates the OpenAPI spec automatically, then serves it alongside <strong>Swagger UI</strong>, an interactive page where anyone can browse and even call your endpoints.\n\nBecause the docs come from the code, they can't silently drift out of sync. You add a dependency and get a complete, live API reference for free; then you <em>enrich</em> it with annotations \u2014 <code>@Operation</code> summaries, <code>@ApiResponse</code> descriptions, <code>@Schema</code> field docs and examples \u2014 to turn an accurate spec into a genuinely helpful one.",
    "concepts": [
      {
        "title": "OpenAPI & springdoc: Docs From Code",
        "body": "<strong>OpenAPI</strong> is a specification format for describing a REST API as a structured document \u2014 every path, method, parameter, request/response schema, and status code. Tools consume it to generate client libraries, mock servers, gateway configs, and documentation sites. The key idea: it's a <em>contract</em>, and it should be derived from the real code, not maintained separately.\n\n<strong>springdoc-openapi</strong> does that derivation. Add the starter dependency and, at runtime, it scans your controllers and models and publishes the generated spec at <code>/v3/api-docs</code> (JSON) \u2014 plus a human UI at <code>/swagger-ui.html</code>. It already understands what you built in earlier modules: your verb mappings become paths, your DTO records become schemas, your <code>@Valid</code> constraints become field requirements, and your <code>ProblemDetail</code> errors become documented error responses.",
        "visual": "m11-springdoc-flow",
        "code": "<!-- Generates the OpenAPI spec and serves Swagger UI -->\n<dependency>\n  <groupId>org.springdoc</groupId>\n  <artifactId>springdoc-openapi-starter-webmvc-ui</artifactId>\n  <version>2.6.0</version>\n</dependency>\n\n<!-- then, at runtime:\n     /v3/api-docs      \u2192 the OpenAPI JSON\n     /swagger-ui.html  \u2192 the interactive UI  -->"
      },
      {
        "title": "Swagger UI: Interactive Docs",
        "body": "<strong>Swagger UI</strong> renders the generated spec as a live web page. Endpoints are grouped (by tag), each showing its verb, path, summary, parameters, and possible responses with example payloads. The <em>Try it out</em> button lets a developer fill in parameters and call the real endpoint from the browser \u2014 invaluable for exploring the Prior Authorization API without writing a client.\n\nYou get the page with zero configuration, but you can customize the top-level metadata \u2014 title, version, description, contact \u2014 by declaring an <code>OpenAPI</code> bean. This is also where you'd document API-wide concerns like security schemes (the JWT you'll add in Track 5). The UI is great for humans; the underlying <code>/v3/api-docs</code> JSON is what machines consume.",
        "visual": "m11-swagger-ui",
        "code": "@Bean\npublic OpenAPI priorAuthApi() {\n    return new OpenAPI().info(new Info()\n        .title(\"Prior Authorization API\")\n        .version(\"1.0\")\n        .description(\"Submit and track prior authorization requests\"));\n}"
      },
      {
        "title": "Enriching the Spec: @Operation, @ApiResponse, @Tag",
        "body": "The generated spec is accurate but terse \u2014 it knows your method returns a <code>PriorAuthResponse</code>, not <em>why</em> you'd call it. Annotations add the human context. <code>@Operation</code> gives a method a <code>summary</code> and <code>description</code>; <code>@ApiResponse</code> documents each status code your endpoint can return and the body it carries; <code>@Parameter</code> describes a path or query value; and <code>@Tag</code> groups related endpoints under a heading in the UI.\n\nThis is where your M10 error work pays off in the docs: you list <code>201</code>, <code>400</code>, and <code>409</code> as documented outcomes, pointing the error responses at the <code>ProblemDetail</code> schema. A consumer now sees not just the happy path but exactly which failures to expect and how they're shaped.",
        "visual": "m11-annotations",
        "code": "@Operation(summary = \"Submit a prior authorization\",\n           description = \"Creates a new prior-auth request in PENDING status\")\n@ApiResponse(responseCode = \"201\", description = \"Created\")\n@ApiResponse(responseCode = \"400\", description = \"Validation failed\",\n             content = @Content(schema = @Schema(implementation = ProblemDetail.class)))\n@ApiResponse(responseCode = \"409\", description = \"Duplicate active authorization\")\n@PostMapping\npublic ResponseEntity<PriorAuthResponse> submit(@Valid @RequestBody SubmitPriorAuthRequest body) {\n    return ResponseEntity.created(...).body(service.submit(body));\n}"
      },
      {
        "title": "Documenting Models & Errors: @Schema & examples",
        "body": "Endpoints are only half the contract; the other half is the <strong>data shapes</strong>. <code>@Schema</code> annotates a DTO or its fields with a <code>description</code>, an <code>example</code> value, and a <code>requiredMode</code>. springdoc already infers types and required-ness from your records and validation constraints, but <code>@Schema</code> adds the meaning and realistic examples that make the docs usable \u2014 a member ID is just a <code>String</code> to the compiler, but <code>example = \"M1002934\"</code> tells a reader exactly what to send.\n\nGood model docs and good examples turn Swagger UI's <em>Try it out</em> into something a newcomer can use immediately: the request body is pre-filled with sensible values. Combined with documented <code>ProblemDetail</code> error responses from the previous concept, the entire Prior Authorization API \u2014 inputs, outputs, and failures \u2014 is described in one place, generated from the code itself.",
        "visual": "m11-schema",
        "code": "public record SubmitPriorAuthRequest(\n\n    @Schema(description = \"Payer member ID\", example = \"M1002934\")\n    @NotBlank String patientMemberId,\n\n    @Schema(description = \"Provider NPI (10 digits)\", example = \"1083948272\")\n    @Pattern(regexp = \"\\\\d{10}\") String providerNpi,\n\n    @Schema(description = \"CPT procedure code\", example = \"70553\")\n    @Pattern(regexp = \"\\\\d{5}\") String cptCode) {\n}"
      }
    ],
    "comingFrom": {
      "java": "Traditionally, API documentation was a separate artifact: a wiki page, a Word doc, or a hand-curated Postman collection. It was correct the day it was written and wrong a sprint later, because nothing forced it to track the code. Consumers either trusted stale docs or read your source.",
      "context": "springdoc-openapi derives the documentation from the application itself, so it can't fall out of sync \u2014 change a mapping or a DTO and the spec changes with it. You get an interactive Swagger UI and a machine-readable OpenAPI document for free, then enrich it with @Operation and @Schema. The contract becomes a build output, not a maintenance chore."
    },
    "keyTakeaways": [
      "OpenAPI is a machine-readable API contract; springdoc-openapi generates it from your controllers and DTOs at runtime",
      "springdoc serves the spec at /v3/api-docs and an interactive Swagger UI at /swagger-ui.html with zero config",
      "@Operation, @ApiResponse, @Parameter, and @Tag add human context and document each status code (including ProblemDetail errors)",
      "@Schema documents model fields with descriptions and examples, so the docs and Try-it-out are genuinely usable"
    ]
  },

    "id": "M12",
    "track": "rest",
    "track_label": "Building REST APIs",
    "track_color": "#2dd4bf",
    "level": "Intermediate",
    "title": "Pagination, Filtering & HATEOAS",
    "subtitle": "Serve large result sets in slices, let clients filter and sort, and make responses navigable with hypermedia links.",
    "objectives": [
      "Page large collections with Pageable and return Page<T> with total metadata",
      "Sort and filter results via query parameters, building dynamic predicates",
      "Add hypermedia links to resources with Spring HATEOAS (EntityModel, link builders)",
      "Combine pagination and hypermedia with PagedModel and PagedResourcesAssembler"
    ],
    "intro": "The Prior Authorization API works and is documented \u2014 but <code>GET /api/prior-auths</code> can't keep returning <em>every</em> authorization once a payer has processed hundreds of thousands. This module makes the collection endpoints production-grade: paged, filterable, sortable, and navigable.\n\nThree capabilities come together. <strong>Pagination</strong> returns one slice at a time with metadata about the whole set, so a client fetches page 1 of 7 rather than 138 records at once. <strong>Filtering and sorting</strong> let the caller ask for exactly the rows they want \u2014 pending authorizations for a given CPT code, newest first \u2014 via simple query parameters. And <strong>HATEOAS</strong> (hypermedia) embeds <em>links</em> in each response, so a client discovers how to fetch the next page or approve a request by following links, instead of hardcoding URL patterns.\n\nSpring gives you all three with very little code: <code>Pageable</code> is bound from query parameters automatically, <code>Page&lt;T&gt;</code> computes total counts for you, and Spring HATEOAS builds type-safe links from your controller methods. Put together, the collection becomes self-describing \u2014 the highest level of REST maturity \u2014 which is exactly what the API gateway and client SDKs in later tracks will rely on.",
    "concepts": [
      {
        "title": "Pagination with Pageable",
        "body": "Returning an unbounded list is a latency and memory hazard. <strong>Pagination</strong> fixes it: the client asks for a <em>page</em> of results, and the server returns that slice plus metadata. In Spring, add a <code>Pageable</code> parameter to your handler and Spring binds it from the <code>page</code>, <code>size</code>, and <code>sort</code> query parameters automatically. Return a <code>Page&lt;T&gt;</code> and you get the slice together with the total element count, total page count, and current page number \u2014 Spring runs the count query for you.\n\nUse <code>@PageableDefault</code> to set a sensible default size and sort so a client that passes nothing still gets a bounded, ordered response. <code>GET /api/prior-auths?page=1&size=20&sort=requestDate,desc</code> returns the second page of twenty, newest first \u2014 and the <code>Page</code> tells the client there are seven pages in all.",
        "visual": "m12-pagination",
        "code": "@GetMapping     // GET /api/prior-auths?page=1&size=20&sort=requestDate,desc\npublic Page<PriorAuthResponse> list(\n        @PageableDefault(size = 20, sort = \"requestDate\") Pageable pageable) {\n    return service.findAll(pageable);   // slice + totalElements + totalPages\n}"
      },
      {
        "title": "Sorting & Filtering",
        "body": "Clients also need to narrow and order results. <strong>Sorting</strong> rides along on the same <code>Pageable</code> via the <code>sort</code> parameter (<code>sort=requestDate,desc</code>, and you can pass several). <strong>Filtering</strong> is expressed with your own query parameters \u2014 <code>?status=PENDING&cptCode=70553</code> \u2014 which you translate into a database query.\n\nWhen filters are optional and combinable, you don't want a tangle of <code>if</code> branches building query strings. The clean approach is a <strong><code>Specification</code></strong>: each filter becomes a small predicate, and you compose only the ones that were supplied (<code>where(byStatus).and(byCptCode)</code>). The repository runs the combined predicate with the paging and sort applied. This module introduces Specifications as the filtering mechanism; M14 covers building them in depth on the JPA side.",
        "visual": "m12-filter-sort",
        "code": "@GetMapping    // GET /api/prior-auths?status=PENDING&cptCode=70553&sort=requestDate,desc\npublic Page<PriorAuthResponse> list(\n        @RequestParam(required = false) Status status,\n        @RequestParam(required = false) String cptCode,\n        Pageable pageable) {\n\n    // compose only the filters that were provided (detailed in M14)\n    Specification<PriorAuth> spec = Specification\n            .where(byStatus(status))\n            .and(byCptCode(cptCode));\n    return service.search(spec, pageable);\n}"
      },
      {
        "title": "HATEOAS: Hypermedia Links",
        "body": "<strong>HATEOAS</strong> \u2014 Hypermedia As The Engine Of Application State \u2014 is the idea that a response includes the <em>links</em> a client can follow next, rather than the client hardcoding URL templates. It's the top level of the Richardson REST maturity model. A prior-auth response carries a <code>_links</code> section: a <code>self</code> link, a link to the <code>decision</code> action, a link to the related <code>patient</code> \u2014 so the client navigates by following links it's given.\n\nSpring HATEOAS provides the building blocks. You wrap your DTO in an <code>EntityModel</code> and add links built from your controller methods with <code>linkTo(methodOn(...))</code>. Because the links are derived from real handler methods, they stay correct if you change a mapping \u2014 no string concatenation, no drift. The result is an API clients can explore at runtime instead of against out-of-band documentation.",
        "visual": "m12-hateoas",
        "code": "EntityModel<PriorAuthResponse> model = EntityModel.of(response,\n    linkTo(methodOn(PriorAuthController.class).get(authNumber)).withSelfRel(),\n    linkTo(methodOn(PriorAuthController.class).decide(authNumber, null)).withRel(\"decision\"),\n    linkTo(methodOn(PatientController.class).get(memberId)).withRel(\"patient\"));"
      },
      {
        "title": "Paged Hypermedia Responses",
        "body": "The two ideas combine for collection endpoints. A paged response should carry both the <strong>page metadata</strong> and the <strong>navigation links</strong> \u2014 first, previous, self, next, last \u2014 so a client can walk the pages purely by following links. Spring HATEOAS models this as <code>PagedModel</code>, and a <code>PagedResourcesAssembler</code> builds it from a <code>Page</code> for you.\n\nInject the assembler into your handler, fetch a <code>Page</code> as before, and call <code>assembler.toModel(page)</code>. The response now contains the items under <code>_embedded</code>, a <code>page</code> block with size and totals, and a <code>_links</code> block with the page navigation. The Prior Authorization collection is now fully self-describing: a consumer knows how big the result set is and exactly which URL fetches the next page \u2014 completing the REST track before you move on to persisting all this data with JPA.",
        "visual": "m12-pagedmodel",
        "code": "@GetMapping\npublic PagedModel<EntityModel<PriorAuthResponse>> list(\n        Pageable pageable,\n        PagedResourcesAssembler<PriorAuthResponse> assembler) {\n    Page<PriorAuthResponse> page = service.findAll(pageable);\n    return assembler.toModel(page);   // _embedded + page + first/prev/next/last links\n}"
      }
    ],
    "comingFrom": {
      "java": "By hand this is fiddly: parse page and size params yourself, append LIMIT/OFFSET to SQL, run a separate COUNT(*) to compute total pages, stitch together ORDER BY from sort params, and build any 'next page' or action URLs with string concatenation that breaks the moment a path changes. Optional, combinable filters degrade into nested if-statements assembling query fragments.",
      "context": "Spring binds Pageable from the request, returns a Page that already knows the totals, applies Sort from the same parameter, and (with Specifications) composes only the filters supplied. Spring HATEOAS builds links from your actual controller methods, and PagedResourcesAssembler assembles a fully navigable paged response. You describe intent; the framework handles slicing, counting, and link generation."
    },
    "keyTakeaways": [
      "Add a Pageable parameter and return Page<T>; Spring binds page/size/sort and computes total metadata",
      "Sort via the sort parameter; express optional, combinable filters as composable Specifications (detailed in M14)",
      "Spring HATEOAS wraps DTOs in EntityModel and builds type-safe links from controller methods (linkTo/methodOn)",
      "PagedResourcesAssembler produces a PagedModel with _embedded items, page metadata, and first/prev/next/last links"
    ]
  },

    "intro": "Through Tracks 1\u20133 the Prior Authorization Service moved data around in memory \u2014 DTOs in, DTOs out \u2014 but nothing was ever stored. Track 4 gives it a database. The first step is to <strong>persist</strong> the prior-auth itself, and to do it the Spring way: with almost no data-access code.\n\n<strong>JPA</strong> (the Jakarta Persistence API, implemented by Hibernate) maps Java objects to relational tables, and <strong>Spring Data JPA</strong> layers on top to eliminate the repository boilerplate. You annotate a class as an <code>@Entity</code> so each instance becomes a row, then declare a repository <em>interface</em> \u2014 and Spring generates the implementation at runtime. <code>save</code>, <code>findById</code>, <code>findAll</code>, paging, and counting all work with zero code you wrote.\n\nNote the shift in roles: <code>PriorAuth</code> is now a persistent <strong>entity</strong>, the durable core of the system, while the <code>SubmitPriorAuthRequest</code>/<code>PriorAuthResponse</code> records from Track 3 stay at the API edge. You'll map the entity, get a repository for free, write queries just by naming methods, and \u2014 using the profiles from M07 \u2014 run against an in-memory H2 database in development and PostgreSQL in production from the very same code.",

        "visual": "m13-entity-table",
