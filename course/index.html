    ],
    "intro": "In M07 you externalized one application's configuration into <code>application.yml</code> and profiles. That's perfect for a single deployable. But the moment the Prior Authorization monolith becomes the four services from M21 \u2014 intake, review, eligibility, notification \u2014 each across dev, staging, and prod, you have a dozen separate config sets to keep consistent. Copy the payer API URL into each, and the day it changes you must update them all without missing one. Configuration <strong>drifts</strong>, and drift causes outages.\n\n<strong>Spring Cloud Config</strong> centralizes configuration into a single, <em>versioned</em> source \u2014 typically a Git repository \u2014 served by a <strong>Config Server</strong>. Each service, on startup, asks the server for <em>its</em> configuration by application name and active profile, and the server returns the matching files from Git. Configuration becomes code: reviewed in pull requests, versioned with full history, and rolled back like any commit.\n\nThe model adds two superpowers over plain files. With <code>@RefreshScope</code>, a service can pick up a configuration change <em>at runtime</em> without redeploying \u2014 flip a feature flag in Git, trigger a refresh, done. And sensitive values can be stored <strong>encrypted</strong> in the repo and decrypted by the Config Server, so secrets never sit in plaintext. This is the first shared platform piece for the prior-auth fleet.",
    "concepts": [
      {
        "title": "The Distributed Config Problem",
        "body": "Per-application config (M07) scales badly across a fleet. With many services and several environments, the same settings are duplicated in many places, and there's no single place to see or change them. When the payer endpoint or a timeout changes, you edit it in every service's repo and redeploy each \u2014 and the one you forget becomes a production incident. There's also no shared history: who changed what, when, and why is scattered.\n\nCentralized configuration solves this by making one repository the <strong>single source of truth</strong> for all services' settings, organized by service and profile. Every service reads from it, so a value is defined once. Because it's a Git repo, every change is reviewed, versioned, and auditable. The goal isn't to remove per-service config \u2014 it's to put all of it in one governed place.",
        "visual": "m22-config-problem"
      },
      {
        "title": "Spring Cloud Config Server",
        "body": "A <strong>Config Server</strong> is a small Spring Boot app annotated with <code>@EnableConfigServer</code> that exposes configuration from a backing store \u2014 most commonly a <strong>Git</strong> repository. You point it at the repo's URI, and it serves files named by convention: <code>{application}-{profile}.yml</code>. A request for the <code>prod</code> profile of <code>prior-auth-intake</code> returns <code>prior-auth-intake-prod.yml</code> layered over the shared <code>application.yml</code>.\n\nEach service becomes a <strong>config client</strong>: it declares its <code>spring.application.name</code> and imports configuration from the server. On startup it fetches its settings before the rest of the context initializes, so beans wire up with values that came from the central repo. Storing config in Git means it's versioned and reviewable, and the Config Server can serve different branches per environment \u2014 config truly as code.",
        "visual": "m22-config-server",
        "code": "// the Config Server application\n@SpringBootApplication\n@EnableConfigServer\npublic class ConfigServerApplication { }\n\n# config-server application.yml \u2014 backed by Git\nspring:\n  cloud:\n    config:\n      server:\n        git:\n          uri: https://github.com/payer/prior-auth-config\n\n# a client (prior-auth-intake) application.yml\nspring:\n  application:\n    name: prior-auth-intake\n  config:\n    import: optional:configserver:http://config-server:8888"
      },
      {
        "title": "Refreshing Config at Runtime: @RefreshScope",
        "body": "Normally a bean reads configuration once, at creation, so changing a value means restarting the service. <strong><code>@RefreshScope</code></strong> changes that: beans marked with it are re-created with fresh values when a <strong>refresh</strong> is triggered, without a redeploy. You commit a change to the config repo, then hit the <code>/actuator/refresh</code> endpoint on the service (or broadcast to all instances with Spring Cloud Bus), and the <code>@RefreshScope</code> beans rebind to the new configuration.\n\nThis is ideal for operational toggles \u2014 a feature flag like <code>auto-approve</code>, a rate limit, a timeout \u2014 that you want to adjust live. Be deliberate about what's refreshable: only beans annotated <code>@RefreshScope</code> participate, so structural settings (a datasource URL) typically still require a restart, while behavioral settings can flip on the fly. Configuration becomes something you can <em>operate</em>, not just deploy.",
        "visual": "m22-refresh",
        "code": "@RefreshScope          // re-created on /actuator/refresh with new values\n@Component\npublic class FeatureFlags {\n\n    @Value(\"${priorauth.features.auto-approve:false}\")\n    private boolean autoApprove;\n}\n// 1) commit the change in the config Git repo\n// 2) POST /actuator/refresh  (or broadcast via Spring Cloud Bus)\n// 3) FeatureFlags rebinds \u2014 no restart"
      },
      {
        "title": "Securing Config: Encryption & Secrets",
        "body": "Centralizing configuration must not mean centralizing <em>plaintext secrets</em> in Git. Spring Cloud Config supports value <strong>encryption</strong>: you encrypt a sensitive value (with the server's <code>/encrypt</code> endpoint or a CLI) and store it in the repo prefixed with <code>{cipher}</code>. The Config Server holds the key and <strong>decrypts</strong> the value before serving it to an authenticated client over TLS, so the repository only ever contains ciphertext.\n\nFor stronger secret management, back the Config Server with a dedicated secrets store like <strong>HashiCorp Vault</strong> instead of (or alongside) Git \u2014 Vault adds dynamic secrets, leasing, and rotation. Either way the principle from M07 holds at fleet scale: secrets live encrypted or in a vault, never as readable text in source control, and the platform \u2014 not each service \u2014 owns their protection. Combined with TLS between clients and the server, the config pipeline stays confidential end to end.",
        "visual": "m22-config-security",
        "code": "# in the config Git repo \u2014 stored encrypted at rest\npriorauth:\n  payer:\n    api-key: '{cipher}AQB3x9f2c8...'   # Config Server decrypts before serving\n\n# stronger: back the server with Vault for dynamic, rotated secrets\nspring:\n  cloud:\n    config:\n      server:\n        vault:\n          host: vault.payer.internal"
      }
    ],
    "comingFrom": {
      "java": "Across many services, configuration was copied into each repo and duplicated per environment, or injected as environment variables set host-by-host. Changing a shared value meant editing several places and redeploying each, with no single history of what changed, and secrets often sat in plaintext property files. Drift between environments was constant and hard to detect.",
      "context": "Spring Cloud Config makes one versioned Git repository the source of truth: services fetch their config by name and profile on startup, changes are reviewed and auditable like code, @RefreshScope lets you apply some changes live without redeploying, and encrypted values (or a Vault backend) keep secrets out of plaintext. Configuration becomes a governed, central, secure part of the platform."
    },
    "keyTakeaways": [
      "Centralized config makes one versioned Git repo the single source of truth, ending per-service duplication and drift",
      "A @EnableConfigServer app serves {application}-{profile} files; clients fetch their config on startup by name + profile",
      "@RefreshScope beans rebind to new values on /actuator/refresh (or via Cloud Bus) without a redeploy",
      "Store secrets encrypted ({cipher}) or in a Vault backend \u2014 never plaintext in the config repo; serve over TLS"
    ]

    "intro": "M22 gave every service its configuration from one place. But one piece of configuration resists being a static value: the <em>location of other services</em>. When <code>review-service</code> needs to call <code>eligibility-service</code>, what URL does it use? In a containerized, autoscaling world there's no single answer \u2014 there may be three eligibility instances today and seven tomorrow, each on an ephemeral IP that changes on every restart. Hardcoding <code>http://10.0.1.5:8082</code> is guaranteed to break.\n\n<strong>Service discovery</strong> solves this with a <strong>registry</strong>: a service that every other service registers itself with on startup, announcing its logical name and current address. When a caller needs <code>eligibility-service</code>, it asks the registry for the live instances of that name rather than guessing a URL. <strong>Eureka</strong> (Spring Cloud Netflix) is the classic registry; services register, send periodic <strong>heartbeats</strong> to prove they're alive, and are evicted when they go silent.\n\nDiscovery pairs naturally with <strong>client-side load balancing</strong>: the caller gets the full list of healthy instances and a load balancer picks one, spreading traffic without a separate network hop. You'll stand up a Eureka server, register the prior-auth services, call one by name with a load-balanced client, and see how heartbeats keep the registry self-healing as instances scale and fail.",
    "concepts": [
      {
        "title": "The Discovery Problem",
        "body": "In a monolith, components call each other with in-process method calls \u2014 no addresses involved. The moment those components become separate services, every call needs a <em>network location</em>, and in a modern deployment those locations are <strong>dynamic</strong>. Containers get fresh IPs on each start, autoscaling adds and removes instances continuously, and orchestrators reschedule pods across hosts. A URL that's correct now is wrong after the next deploy.\n\nYou could put service URLs in centralized config (M22), but that only moves the problem \u2014 someone still has to update them as instances churn, and config can't track per-instance health in real time. What you need is a <strong>live</strong> directory that reflects which instances of each service actually exist <em>right now</em>. That directory is the service registry, and consulting it by logical name \u2014 not address \u2014 is what keeps inter-service calls working as the topology shifts underneath.",
        "visual": "m23-discovery-problem"
      },
      {
        "title": "Eureka: Service Registry",
        "body": "A <strong>Eureka Server</strong> is a Spring Boot app annotated with <code>@EnableEurekaServer</code> that maintains the registry. Every other service is a <strong>Eureka client</strong>: on startup it <strong>registers</strong> itself, advertising its <code>spring.application.name</code> (the logical name, e.g. <code>eligibility-service</code>) and its host/port. The registry thus maps each name to the set of currently registered instances.\n\nA caller that wants to reach a service queries the registry by that logical name and receives the list of live instances. Because registration is automatic and self-reported, scaling a service up simply adds entries; there's no central list for an operator to maintain. Modern Spring Cloud abstracts the registry behind <code>DiscoveryClient</code>, so the same code works with Eureka, Consul, or a Kubernetes-native registry \u2014 Eureka is just the most common starting point.",
        "visual": "m23-eureka-registry",
        "code": "// the registry\n@SpringBootApplication\n@EnableEurekaServer\npublic class DiscoveryServerApplication { }\n\n# a client (eligibility-service) application.yml\nspring:\n  application:\n    name: eligibility-service        # the logical name others discover\neureka:\n  client:\n    service-url:\n      defaultZone: http://discovery-server:8761/eureka"
      },
      {
        "title": "Discovery + Client-Side Load Balancing",
        "body": "Discovery returns <em>all</em> healthy instances of a service, which sets up <strong>client-side load balancing</strong>: rather than routing through a separate load balancer, the calling service holds the instance list and a balancer (Spring Cloud LoadBalancer) picks one per request \u2014 round-robin by default. This removes a network hop and lets each caller balance independently.\n\nIn code you stop writing host:port entirely. You mark a <code>RestClient</code> (or <code>WebClient</code>) builder <code>@LoadBalanced</code> and then call using the <strong>service name as the host</strong>: <code>http://eligibility-service/api/eligibility/...</code>. Spring resolves <code>eligibility-service</code> through discovery, the load balancer chooses an instance, and the request goes out. Add or remove instances and the caller adapts automatically on the next lookup \u2014 no configuration change, no redeploy.",
        "visual": "m23-client-lb",
        "code": "@Bean\n@LoadBalanced                      // enables service-name resolution + balancing\nRestClient.Builder loadBalanced() { return RestClient.builder(); }\n\n// call by logical name \u2014 not host:port\nEligibility e = restClient.get()\n    .uri(\"http://eligibility-service/api/eligibility/{member}\", memberId)\n    .retrieve()\n    .body(Eligibility.class);"
      },
      {
        "title": "Health, Heartbeats & Self-Healing",
        "body": "A registry is only useful if it's <em>accurate</em>, so registration comes with a lifecycle. Each client periodically sends a <strong>heartbeat</strong> (a lease renewal) to the server. As long as the heartbeats arrive, the instance stays in the registry; if they stop \u2014 the instance crashed, was killed, or lost the network \u2014 its lease expires and the server <strong>evicts</strong> it, so callers stop receiving a dead address. This is what makes discovery <strong>self-healing</strong>: the topology in the registry converges on reality without manual intervention.\n\nDiscovery also ties into the Actuator health you built in M08 \u2014 an instance reporting <code>DOWN</code> can be taken out of rotation even before its lease expires. Tuned together, heartbeat intervals and health checks trade off how quickly a failed instance disappears against how much registry chatter you generate. The result is the property a microservice fleet depends on: callers reach only instances that are actually up, even as the fleet constantly changes.",
        "visual": "m23-heartbeat"
      }
    ],
    "comingFrom": {
      "java": "Historically you hardcoded another service's hostname and port, or listed them in config and kept them current by hand, and put a load balancer in front whose pool an operator updated on every scale event. In a static, long-lived-server world that was tolerable; with containers, autoscaling, and ephemeral IPs it breaks constantly, and a stale address means failed calls.",
      "context": "Service discovery replaces fixed locations with a live registry: services self-register and heartbeat, callers resolve by logical name, and client-side load balancing spreads requests across the current healthy instances. Scaling and restarts update the registry automatically, so inter-service calls keep working as the topology changes \u2014 no hand-maintained URLs or LB pools."

    "intro": "Discovery (M23) lets services find each other, but external clients \u2014 a web app, a mobile app, a partner system \u2014 still shouldn't call individual prior-auth services directly. Doing so couples clients to your internal topology, multiplies the public attack surface, and forces every service to re-implement the same edge concerns: authentication, CORS, rate limiting, request logging. The fix is a single, managed <strong>front door</strong>.\n\nAn <strong>API Gateway</strong> is that front door. Every external request enters through it, and the gateway <strong>routes</strong> each one to the right backend service \u2014 looking the service up by name through discovery, so it survives scaling and restarts. Just as importantly, the gateway is the natural place to apply <strong>cross-cutting concerns once</strong>, at the edge, instead of in every service: validate the JWT, enforce a rate limit, handle CORS, rewrite paths, add correlation headers.\n\n<strong>Spring Cloud Gateway</strong> implements this with a simple model: a <strong>route</strong> is a set of <strong>predicates</strong> (match by path, method, header) pointing at a target URI, plus a chain of <strong>filters</strong> that transform the request and response as it passes through. You'll define routes to the prior-auth services, rewrite paths with filters, and push authentication and rate limiting to the gateway \u2014 completing the Microservices Foundations track.",

        "visual": "m24-routes",

      },

        "title": "Gateway Filters",
        "body": "<strong>Filters</strong> let the gateway transform a request on the way in and the response on the way out \u2014 the <em>how</em> to complement routing's <em>where</em>. A filter can <strong>rewrite the path</strong> (strip a public prefix to match a service's internal routes), add or remove headers, set timeouts, or wrap the call in a circuit breaker (Track 8). Filters run as a chain around the proxied call: <strong>pre</strong> filters before forwarding, <strong>post</strong> filters after the response returns.\n\nYou attach filters <strong>per route</strong> for route-specific transforms, or define <strong>global</strong> filters that apply to every request (correlation IDs, access logging). For example, a route can expose a clean public path like <code>/api/prior-auths/{id}/decision</code> while rewriting it to the review service's internal <code>/decisions/{id}</code> \u2014 clients get a coherent API, services keep their own URL design. Filters are where the gateway earns its keep beyond plain proxying.",
        "visual": "m24-filters",

    "intro": "Track 6 wired the platform \u2014 a gateway out front, services that register and discover each other. Track 7 is about how those services actually <strong>talk</strong>. The most direct style is <strong>synchronous</strong>: one service sends an HTTP request to another and <em>waits</em> for the response before continuing. When <code>prior-auth-review</code> must know whether a member is covered for a procedure before it can decide, it asks <code>eligibility-service</code> and blocks on the answer \u2014 request, response, proceed.\n\nSpring gives you three ways to make that call. <strong>RestClient</strong> (Spring 6.1 / Boot 3.2+) is the modern, fluent synchronous client that supersedes <code>RestTemplate</code>. <strong>WebClient</strong> is its reactive, non-blocking sibling for high-concurrency or streaming. And <strong>declarative clients</strong> \u2014 Spring Cloud OpenFeign's <code>@FeignClient</code> or Spring's <code>@HttpExchange</code> interfaces \u2014 let you describe the remote API as a Java interface and have Spring generate the implementation. All of them integrate with the discovery and load balancing from M23, so you call by service name, not address.\n\nThe crucial discipline: a synchronous call <strong>couples</strong> the caller to the callee's availability and latency. If eligibility is slow, review is slow; if eligibility hangs, review threads pile up. So every cross-service call needs <strong>timeouts</strong> and <strong>error handling</strong> \u2014 the on-ramp to the resilience patterns in Track 8 and the asynchronous alternative in M26.",
    "concepts": [
      {
        "title": "Synchronous Calls Between Services",
        "body": "A <strong>synchronous</strong> call is request/response: the caller sends a request and its thread waits until the response arrives (or fails). It's the natural choice when the caller <em>cannot proceed without the answer</em> \u2014 <code>review</code> genuinely needs the eligibility result to make a decision, so it asks and waits. The interaction is simple to reason about: a normal method call that happens to cross the network.\n\nThat simplicity has a cost: <strong>temporal coupling</strong>. The caller is only as available and as fast as the callee. If <code>eligibility-service</code> is down, <code>review</code>'s request fails; if it's slow, <code>review</code> is slow too. This is fine and often correct for queries that must be answered immediately \u2014 but it's why you'll later prefer <em>asynchronous</em> messaging (M26) for things that don't need an instant reply, like notifying a provider. Choose sync when you need the result now; choose async when you don't.",
        "visual": "m25-sync-call"

      {
        "title": "RestClient: The Modern Synchronous Client",
        "body": "<strong><code>RestClient</code></strong> is the current synchronous HTTP client in Spring \u2014 a fluent, immutable API introduced in Spring 6.1 that replaces the older <code>RestTemplate</code> (now in maintenance). You build a request step by step \u2014 method, URI, headers, body \u2014 then <code>retrieve()</code> and bind the response to a type. Marking its builder <code>@LoadBalanced</code> wires in discovery, so you call <code>http://eligibility-service/...</code> and Spring resolves and balances across instances (M23).\n\nFor most service-to-service calls, RestClient is the right default: blocking, straightforward, type-safe. When you need <strong>non-blocking</strong> behavior \u2014 very high concurrency, streaming responses, or composing many calls \u2014 reach for <strong><code>WebClient</code></strong>, the reactive client built on Project Reactor. Both share a similar fluent shape; the difference is RestClient blocks the calling thread while WebClient returns a reactive type you compose without blocking.",
        "visual": "m25-restclient",
        "code": "@Bean\n@LoadBalanced                       // resolve service names via discovery (M23)\nRestClient.Builder builder() { return RestClient.builder(); }\n\n// in the service \u2014 call by name, get a typed body\nEligibility e = restClient.get()\n    .uri(\"http://eligibility-service/api/eligibility/{member}\", memberId)\n    .retrieve()\n    .body(Eligibility.class);\n// WebClient is the reactive, non-blocking alternative"
      },
      {
        "title": "Declarative Clients: @HttpExchange / @FeignClient",
        "body": "Writing the same request-building boilerplate for every remote endpoint gets tedious. <strong>Declarative clients</strong> remove it: you describe the remote API as a Java <strong>interface</strong> with annotations, and Spring generates the calling code. With Spring's built-in <strong><code>@HttpExchange</code></strong>, you annotate an interface and methods (<code>@GetExchange</code>, <code>@PostExchange</code>); Spring Cloud's <strong><code>@FeignClient</code></strong> offers the same idea with deep Spring Cloud integration.\n\nThe interface becomes your contract: calling <code>eligibilityClient.check(memberId)</code> reads like a local method but performs the HTTP call, deserializes the response, and (backed by a load-balanced client) routes through discovery. This keeps call sites clean and centralizes the remote API definition in one place \u2014 easy to mock in tests, easy to evolve. Declarative clients are the preferred style for anything beyond a one-off call.",
        "visual": "m25-declarative",
        "code": "@HttpExchange(\"/api/eligibility\")\npublic interface EligibilityClient {\n\n    @GetExchange(\"/{member}\")\n    Eligibility check(@PathVariable String member);\n}\n\n// Spring generates the implementation, backed by a @LoadBalanced RestClient.\n// Call it like a local method:  eligibilityClient.check(memberId)"
      },
      {
        "title": "Resilient Calls: Timeouts & Errors",
        "body": "A synchronous dependency that misbehaves can take you down with it, so two safeguards are non-negotiable. <strong>Timeouts</strong>: always set a <em>connect</em> timeout (how long to wait to establish a connection) and a <em>read</em> timeout (how long to wait for the response). Without them, a hung <code>eligibility-service</code> ties up <code>review</code>'s threads indefinitely until the whole service stops responding \u2014 a classic cascading failure. With them, a slow call fails fast and you can react.\n\n<strong>Error handling</strong>: a remote call can return a <code>4xx</code>/<code>5xx</code> or throw. Decide deliberately what each means for your operation \u2014 translate a <code>404</code> from eligibility into a domain result, surface a <code>503</code> as a retryable failure, and never let a raw remote error leak unhandled. These are the seeds of resilience: Track 8 adds <strong>circuit breakers</strong>, <strong>retries</strong>, and <strong>fallbacks</strong> on top of timeouts so a struggling dependency degrades gracefully instead of failing the whole request.",

  {
    "id": "M26",
    "track": "communication",
    "track_label": "Inter-Service Communication",
    "track_color": "#22d3ee",
    "level": "Advanced",
    "title": "Event-Driven Messaging",
    "subtitle": "Decouple services in time: publish an event and move on, instead of calling and waiting.",
    "objectives": [
      "Contrast asynchronous event-driven messaging with synchronous calls and know when each fits",
      "Explain Kafka topics, partitions, consumer groups, and offsets",

    "intro": "M25's synchronous calls are perfect when the caller needs an answer to proceed \u2014 but many interactions don't. When <code>prior-auth-review</code> decides an authorization, the provider must be notified, an analytics store updated, maybe a downstream claim pre-staged. Review shouldn't <em>wait</em> for an email to send, and it certainly shouldn't <strong>fail</strong> a decision because the notification service is down. These are <em>reactions</em> to something that happened, not prerequisites for it.\n\n<strong>Event-driven messaging</strong> fits exactly here. Instead of calling each interested service, <code>review</code> publishes a single <strong>event</strong> \u2014 <em>\"prior-auth PA-2026-000123 was decided\"</em> \u2014 to a message broker and continues immediately. Any number of services subscribe and react on their own time. The producer doesn't know or care who consumes; adding a new reaction means adding a consumer, with zero changes to <code>review</code>. This is <strong>temporal decoupling</strong>: services no longer have to be available at the same instant.\n\n<strong>Apache Kafka</strong>, with Spring for Apache Kafka, is the standard backbone for this. It's a durable, replayable <strong>log</strong> of events organized into topics, built for high throughput and many independent consumers. You'll publish decision events with <code>KafkaTemplate</code>, consume them with <code>@KafkaListener</code>, and learn to treat each event as a <strong>versioned contract</strong> other teams depend on.",
    "concepts": [
      {
        "title": "Async Messaging vs Sync Calls",
        "body": "A synchronous call (M25) is a question that blocks until answered; an <strong>event</strong> is a statement of fact that the publisher fires and forgets. The difference is <strong>coupling in time</strong>. With sync, the producer waits and fails if the consumer is unavailable. With async, the producer publishes to a broker and moves on; consumers process whenever they're ready, and the broker holds the event until they do.\n\nUse <strong>events</strong> for things that are reactions, fan out to multiple interested parties, or must not block the main flow: notifying a provider, updating a read model, triggering analytics. Use <strong>sync</strong> when you genuinely need the result to continue (review needs eligibility). The payoff of events is loose coupling and resilience \u2014 the notification service can be down for an hour and catch up later \u2014 at the cost of <strong>eventual consistency</strong>: the reaction happens <em>soon</em>, not instantly, which you design for deliberately.",
        "visual": "m26-async-vs-sync"
      },
      {
        "title": "Kafka: Topics, Partitions & Consumer Groups",
        "body": "Kafka is a distributed, durable <strong>commit log</strong>. Events are published to a named <strong>topic</strong> (e.g. <code>prior-auth.decided</code>) and retained for a configured time, so consumers can read at their own pace and even replay history. A topic is split into <strong>partitions</strong>, which provide two things: <em>parallelism</em> (more partitions = more consumers working at once) and <em>ordering</em> (events with the same <strong>key</strong> \u2014 here the <code>authNumber</code> \u2014 always land on the same partition and are processed in order).\n\n<strong>Consumer groups</strong> are how scaling and fan-out work. All consumers in one group share the partitions of a topic, so the work is divided among them \u2014 add instances to process faster. <em>Different</em> groups each receive <strong>every</strong> event independently: a <code>notification</code> group and an <code>analytics</code> group both see every decision. Each consumer tracks its position with an <strong>offset</strong>, so it knows what it has processed and can resume after a restart.",
        "visual": "m26-kafka-topics"
      },
      {
        "title": "Producing & Consuming in Spring",
        "body": "Spring for Apache Kafka makes both sides declarative. To <strong>produce</strong>, inject a <code>KafkaTemplate</code> and <code>send</code> to a topic with a key and a payload \u2014 keying by <code>authNumber</code> guarantees all events for one authorization stay ordered. The send returns immediately; review's decision flow isn't blocked on delivery.\n\nTo <strong>consume</strong>, annotate a method with <code>@KafkaListener</code> for a topic and a <code>groupId</code>; Spring runs it for each event, deserializing the payload into your type. The <code>notification-service</code> listener emails the provider entirely independently of review \u2014 if it's slow or restarts, Kafka holds the events and redelivers from the last committed offset. You configure serializers (JSON here), error handling, and retry/dead-letter behavior, but the core is just a template to send and an annotated method to receive.",
        "visual": "m26-produce-consume",
        "code": "// producer \u2014 review-service\n@Service\npublic class DecisionPublisher {\n    private final KafkaTemplate<String, PriorAuthDecided> kafka;\n    public void publish(PriorAuthDecided event) {\n        kafka.send(\"prior-auth.decided\", event.authNumber(), event);  // key = authNumber\n    }\n}\n\n// consumer \u2014 notification-service (separate app, own deploy)\n@Component\npublic class DecisionListener {\n    @KafkaListener(topics = \"prior-auth.decided\", groupId = \"notification\")\n    public void on(PriorAuthDecided event) {\n        notifier.emailProvider(event);   // runs independently of the producer\n    }\n}"
      },
      {
        "title": "Event Schemas & Evolution",
        "body": "An event is a <strong>contract</strong>: once <code>review</code> publishes <code>PriorAuthDecided</code>, other teams' consumers depend on its shape, and you can't see all of them. So events need the same versioning discipline as a public API. Define the payload explicitly (a record serialized as JSON, or Avro/Protobuf with a <strong>schema registry</strong> that enforces compatibility), and evolve it <strong>backward-compatibly</strong>: <em>add</em> optional fields, never remove or rename existing ones or change their meaning. Old consumers must keep working when a new producer ships.\n\nA few habits keep events healthy: include a stable key and a timestamp; make consumers <strong>idempotent</strong>, because at-least-once delivery means an event can arrive twice (process <code>authNumber</code> + a dedupe check, not blind inserts); and keep events focused facts (\"decided\", with the decision and who made it), not commands. Treated this way, the event log becomes a durable, replayable source of truth that new services can subscribe to \u2014 the foundation for the Saga (M27) and CQRS/event-sourcing (M28) patterns next.",
        "visual": "m26-event-schema",
        "code": "public record PriorAuthDecided(\n        String authNumber,     // stable key\n        String decision,       // APPROVED / DENIED\n        String reviewer,\n        Instant decidedAt) {\n}\n// Evolve safely: ADD optional fields (e.g. denialReason) \u2014 never remove/rename.\n// Consumers must be idempotent: the same event may be delivered more than once."
      }
    ],
    "comingFrom": {
      "java": "Without messaging, a service that needed several things to happen called each one synchronously in a chain \u2014 review calls notification calls audit \u2014 so every link had to be up at once, latency stacked, and a failure deep in the chain failed the whole operation. Adding a new reaction meant editing the producer. Home-grown queues (a DB table polled as a queue) lacked durability, ordering, replay, and scale.",
      "context": "Kafka with Spring inverts this: the producer publishes one event to a durable topic and returns immediately, and any number of independent consumer groups react on their own schedule, replaying from the log after downtime. New consumers subscribe without touching the producer, partitions give ordering and parallelism, and @KafkaListener/KafkaTemplate keep it to a few lines \u2014 trading instant consistency for loose coupling and resilience."
    },
    "keyTakeaways": [
      "Events decouple services in time: publish a fact and continue; consumers react independently \u2014 use for reactions/fan-out, not when you need an immediate answer",
      "Kafka topics are durable logs split into partitions (ordering by key + parallelism); consumer groups share work, different groups each get every event; offsets track progress",
      "Produce with KafkaTemplate.send(topic, key, payload); consume with @KafkaListener(topics, groupId) \u2014 the consumer runs independently of the producer",
      "Events are versioned contracts: evolve backward-compatibly (add optional fields), and make consumers idempotent because delivery is at-least-once"

    "id": "M27",
    "track": "communication",
    "track_label": "Inter-Service Communication",
    "track_color": "#22d3ee",
    "level": "Advanced",
    "title": "Saga Pattern",
    "subtitle": "Keep a multi-service operation consistent without a distributed transaction \u2014 by undoing steps when a later one fails.",
    "objectives": [
      "Explain why ACID transactions can't span microservices and what that risks",
      "Use the Saga pattern: local transactions plus compensating actions to maintain consistency",
      "Compare choreography (event-driven) and orchestration (central coordinator) sagas",
      "Implement sagas with durable state, idempotency, and timeouts"
    ],
    "intro": "Submitting a prior authorization isn't one write anymore. In the decomposed platform it touches several services: <code>intake</code> records the request, <code>eligibility</code> reserves a coverage verification, <code>review</code> assigns it to a reviewer's queue \u2014 three services, three private databases (M21). In the monolith a single <code>@Transactional</code> method (M15) made all of that atomic. Across services, <strong>that transaction no longer exists</strong>.\n\nThere's no practical way to wrap a database transaction around calls to independent services. So if <code>review</code> assignment fails after <code>eligibility</code> already reserved a slot, you're left with inconsistent state: a reservation with no usable request. The <strong>Saga pattern</strong> is the standard answer. A saga models the operation as a <em>sequence of local transactions</em>, one per service, where each step has a matching <strong>compensating action</strong> that semantically undoes it. If a later step fails, the saga runs the compensations for the steps already done, walking the system back to a consistent state.\n\nSagas come in two flavors \u2014 <strong>choreography</strong>, where services react to each other's events (M26), and <strong>orchestration</strong>, where a central coordinator directs the steps. Either way you trade the monolith's instant, all-or-nothing consistency for <strong>eventual</strong> consistency managed explicitly, with durable saga state and idempotent steps to survive retries and partial failures.",
    "concepts": [
      {
        "title": "The Distributed Transaction Problem",
        "body": "A database transaction gives you ACID guarantees within <em>one</em> database. The shared-nothing rule from M21 means each service has its own database, and there is no transaction that spans them \u2014 distributed two-phase commit exists in theory but is avoided in practice because it's slow, fragile, and holds locks across the network. So a multi-service operation is really several independent local commits with gaps between them.\n\nThat's where partial failure lives. <code>intake</code> commits the request, <code>eligibility</code> commits a reservation, then <code>review</code>'s assignment fails. Each individual commit succeeded, but the <em>operation</em> didn't \u2014 and nothing automatically rolls the others back. Left alone, you accumulate orphaned reservations and stuck requests. You need a way to detect the failure and deliberately undo the earlier successful steps. That's the job the Saga pattern takes on.",
        "visual": "m27-no-2pc"
      },
      {
        "title": "The Saga: A Sequence with Compensations",
        "body": "A <strong>saga</strong> reframes a distributed operation as an ordered list of <strong>local transactions</strong> T1, T2, T3 \u2014 each committing in its own service \u2014 paired with <strong>compensating transactions</strong> C1, C2, C3 that semantically reverse them. The happy path runs the steps forward. If a step fails, the saga executes the compensations for the steps already completed, in reverse order, to restore consistency.\n\nThe key word is <em>semantically</em>. A compensation isn't a database rollback \u2014 those commits are final \u2014 it's a new action that <em>counteracts</em> the prior one: <code>cancelReservation</code> undoes <code>reserve</code>, <code>markFailed</code> closes out the created request. Some actions can't be perfectly undone (an email was sent), so you compensate with a follow-up (send a correction). Designing each step's compensation up front is the core of saga work: every forward action needs a defined way to walk it back.",
        "visual": "m27-saga-compensation",
        "code": "// orchestrated saga: a coordinator drives steps and compensations\npublic void submit(SubmitCommand cmd) {\n    var ctx = intake.create(cmd);                 // T1: create request\n    try {\n        eligibility.reserve(ctx.authNumber());    // T2: reserve verification\n        review.assign(ctx.authNumber());          // T3: assign to reviewer\n    } catch (Exception failure) {\n        eligibility.cancelReservation(ctx.authNumber());  // C2: undo T2\n        intake.markFailed(ctx.authNumber());              // C1: undo T1\n        throw new SagaFailedException(failure);\n    }\n}"
      },
      {
        "title": "Choreography vs Orchestration",
        "body": "Sagas are coordinated in one of two styles. In <strong>choreography</strong>, there's no central brain: each service does its local step and publishes an event (M26), and the next service reacts to that event. <code>intake</code> emits <code>PriorAuthSubmitted</code>, <code>eligibility</code> reacts and emits <code>EligibilityReserved</code>, <code>review</code> reacts and assigns. Failures emit compensating events that prior services consume to undo. It's loosely coupled and has no single point of failure, but the overall flow is <em>implicit</em> \u2014 spread across services \u2014 and harder to see and debug as it grows.\n\nIn <strong>orchestration</strong>, a dedicated <strong>orchestrator</strong> owns the workflow: it tells each service when to run its step and explicitly invokes compensations on failure. The logic lives in one place, so the flow is easy to follow, monitor, and change \u2014 at the cost of a central component the steps depend on. Rule of thumb: choreography for simple, few-step flows where decoupling matters most; orchestration as the number of steps and the need for visibility grow.",
        "visual": "m27-choreo-vs-orch"
      },
      {
        "title": "Implementing Sagas: State & Idempotency",
        "body": "A saga spans time and may pause, retry, or crash mid-flight, so it needs <strong>durable state</strong>: which step it's on, what's been done, what must be compensated. Model it as a <strong>state machine</strong> \u2014 <code>PENDING \u2192 ELIGIBILITY_RESERVED \u2192 ASSIGNED \u2192 COMPLETED</code>, with failure paths to <code>COMPENSATING \u2192 FAILED</code> \u2014 persisted so progress survives restarts and a recovery process can resume or compensate stuck sagas.\n\nTwo properties make this survivable. Steps and compensations must be <strong>idempotent</strong>: because events and retries can fire twice (M26's at-least-once delivery), running <code>reserve</code> or <code>cancelReservation</code> again must be safe. And steps need <strong>timeouts</strong> so a step that never responds eventually triggers compensation rather than hanging the saga forever. You can hand-roll this with events and a state table, or use frameworks (Axon, Temporal, Camunda) that provide the state machine, persistence, retries, and timers. Sagas complete the inter-service toolkit: sync for immediate answers (M25), events for reactions (M26), and sagas for consistency across multi-step operations.",
        "visual": "m27-saga-state",
        "code": "@Entity\npublic class PriorAuthSaga {\n    @Id String authNumber;\n    @Enumerated(EnumType.STRING) SagaState state;  // PENDING, ELIGIBILITY_RESERVED,\n                                                   // ASSIGNED, COMPLETED, COMPENSATING, FAILED\n    Instant updatedAt;\n    // persisted after every step so a crashed saga can resume or compensate;\n    // each step keyed by authNumber + step \u2192 idempotent on redelivery\n}"
      }
    ],
    "comingFrom": {
      "java": "In the monolith, a multi-step operation was one @Transactional method: create the request, reserve, assign \u2014 and if any line threw, the database rolled all of it back atomically. Ported naively to microservices, that becomes a chain of remote calls with no shared transaction, so a failure midway leaves committed side effects in other services (an orphaned reservation, a stuck request) and no automatic cleanup.",
      "context": "The Saga pattern restores consistency without a distributed transaction: model the operation as local commits each paired with a compensating action, and on failure run the compensations to walk the system back. Coordinate by choreography (events) or orchestration (a coordinator), persist saga state as a state machine, and make steps idempotent with timeouts \u2014 trading instant atomicity for managed eventual consistency."
    },
    "keyTakeaways": [
      "There's no ACID transaction across services (shared-nothing); a multi-service operation is separate local commits that can partially fail",
      "A saga is a sequence of local transactions each with a compensating action that semantically undoes it when a later step fails",
      "Choreography coordinates via events (decoupled, implicit flow); orchestration uses a central coordinator (visible flow, central dependency)",
      "Implement sagas with durable state (a state machine), idempotent steps/compensations, and timeouts; frameworks (Axon/Temporal) can manage it"
    ]
  },

    "id": "M28",
    "track": "communication",
    "track_label": "Inter-Service Communication",
    "track_color": "#22d3ee",
    "level": "Advanced",
    "title": "Event Sourcing & CQRS",
    "subtitle": "Store what happened, not just the current state \u2014 and serve reads from models built for them.",
    "objectives": [
      "Separate write and read concerns with CQRS and connect them via events",
      "Store events as the source of truth with event sourcing and rebuild state by replay",
      "Build query-optimized read-model projections from the event stream",
      "Judge when event sourcing and CQRS are worth their complexity"
    ],
    "intro": "So far events have been <em>messages between</em> services (M26). This module turns events inward: what if a service's own source of truth were the <strong>sequence of events</strong> that happened to it, rather than a row holding the current state? For the Prior Authorization Service's review domain, that's compelling \u2014 healthcare prior-auth is heavily audited, and \"who decided what, when, and why\" must be reconstructable forever. A normal <code>UPDATE</code> that flips <code>status</code> from <code>PENDING</code> to <code>APPROVED</code> <em>destroys</em> the history; an event log keeps all of it.\n\nTwo related patterns make this work. <strong>CQRS</strong> (Command Query Responsibility Segregation) splits the model in two: a <strong>command</strong> side that handles writes and a separate <strong>query</strong> side optimized for reads, kept in sync by events. <strong>Event Sourcing</strong> persists the <strong>events</strong> themselves as the system of record; current state is <em>derived</em> by replaying them. Together they let you store an immutable audit trail, rebuild state at any past point, and project many read models tailored to different queries.\n\nThis power comes with real complexity \u2014 eventual consistency between write and read sides, event schema evolution, a steeper learning curve \u2014 so it's a pattern you apply <em>selectively</em>, where the benefits clearly pay for the cost. It's the right closing topic for the communication track: the deepest expression of building a system out of events.",
    "concepts": [
      {
        "title": "CQRS: Separate Reads from Writes",
        "body": "Most applications use one model for both writing and reading \u2014 the same entities and tables serve a <code>POST</code> and a complex dashboard query. That's simple, but the two have opposing needs: writes want a normalized, consistent model that enforces invariants; reads want denormalized, query-shaped data that's fast to fetch. <strong>CQRS</strong> separates them into a <strong>command</strong> model (handles state changes) and a <strong>query</strong> model (serves reads), each designed for its job.\n\nThe command side validates and applies changes, emitting <strong>events</strong>; the query side consumes those events to maintain read models. Because the two are decoupled, they can scale and evolve independently \u2014 you can add a new way to query without touching write logic. The cost is <strong>eventual consistency</strong>: a read model lags the write by however long event propagation takes. CQRS doesn't require event sourcing, but the two pair naturally, because events are exactly what flows from the command side to the query side.",
        "visual": "m28-cqrs"
      },
      {
        "title": "Event Sourcing: Store Events, Not State",
        "body": "Traditional persistence stores <em>current state</em>: a <code>prior_auth</code> row whose <code>status</code> column you overwrite. <strong>Event sourcing</strong> stores the <em>events</em> instead \u2014 an append-only log: <code>PriorAuthSubmitted</code>, <code>EligibilityReserved</code>, <code>PriorAuthDecided</code>. The log is the source of truth, and the current state of an authorization is <strong>derived</strong> by replaying its events in order (folding them into a state object).\n\nThis flips the trade-offs. You never lose history \u2014 the full sequence of what happened is permanently recorded, which is an auditor's dream and, in healthcare, often a requirement. You can reconstruct the state <em>as of any past moment</em> (temporal queries: \"what did this look like last Tuesday?\"), debug by replaying, and fix a bug then rebuild state from the untouched log. The events are immutable facts; you only ever <em>append</em>. The cost is that \"give me the current status\" now means replaying events (mitigated with periodic <strong>snapshots</strong>), and your events become a long-lived schema you must evolve carefully.",
        "visual": "m28-event-sourcing",
        "code": "// commands are validated, then produce events appended to the event store\nrecord SubmitPriorAuth(String authNumber, String cptCode) {}   // command (intent)\nrecord PriorAuthSubmitted(String authNumber, String cptCode) {} // event (fact)\nrecord PriorAuthDecided(String authNumber, String decision) {}  // event (fact)\n\n// current state is DERIVED by replaying the events \u2014 never stored directly\nPriorAuth state = eventStore.eventsFor(authNumber)\n    .reduce(PriorAuth.initial(), PriorAuth::apply);   // fold events \u2192 state"
      },
      {
        "title": "Read Model Projections",
        "body": "If state is derived from events, you're not limited to <em>one</em> derived view. A <strong>projection</strong> is a read model built by consuming the event stream and shaping it for a specific query. The same events that produce the authoritative state can feed a <code>reviewer_dashboard</code> projection (pending items per reviewer), an <code>audit_trail</code> projection (every change with who and when), and an <code>analytics</code> projection (approval rates by CPT) \u2014 each stored in whatever form makes its queries fast.\n\nBecause projections are <em>derived</em>, they're disposable and rebuildable: drop a read model and replay the log to recreate it, or build a brand-new projection retroactively over all historical events to answer a question nobody asked when the data was first written. A projection handler is just an event listener that updates its read store. This is CQRS's query side made concrete \u2014 many purpose-built read models, all consistent with the one event log.",
        "visual": "m28-projections",
        "code": "@Component\nclass ReviewerDashboardProjection {\n\n    @EventHandler\n    void on(PriorAuthSubmitted e) {\n        dashboard.addPending(e.authNumber(), e.cptCode());\n    }\n\n    @EventHandler\n    void on(PriorAuthDecided e) {\n        dashboard.markDecided(e.authNumber(), e.decision());\n    }\n    // drop the table and replay the log to rebuild this view anytime\n}"
      },
      {
        "title": "Trade-offs & When to Use",
        "body": "Event sourcing and CQRS are powerful but <strong>not free</strong>, and the most important skill is knowing when <em>not</em> to use them. The benefits: a complete, immutable <strong>audit trail</strong>; <strong>temporal queries</strong> and time-travel debugging; multiple independent <strong>read models</strong> you can add or rebuild anytime; and natural read/write scaling. The costs: pervasive <strong>eventual consistency</strong> the whole team must reason about; <strong>event schema evolution</strong> over a log you can never rewrite; more moving parts; and a real learning curve.\n\nReach for it where those benefits are genuinely worth it \u2014 domains rich in <strong>auditability and history</strong>, complex business workflows, or where many different read shapes are needed. Prior-auth <em>decisions</em> are a good candidate: the compliance audit trail alone can justify it. But the rest of the platform \u2014 simple CRUD on patients or reference data \u2014 is better served by the plain JPA of Track 4. Apply event sourcing surgically, to the bounded contexts that earn it, not across the whole system. With that judgment, you've completed the inter-service toolkit: sync calls, async events, sagas, and event-sourced read/write models.",
        "visual": "m28-tradeoffs"
      }
    ],
    "comingFrom": {
      "java": "Classic CRUD stores only the current state and serves reads and writes from the same model: an UPDATE overwrites the previous value, so the history of how a record reached its state is gone unless you bolt on audit tables, and a complex read competes with write logic over the same schema. You know the current status of an authorization but not the full story of how it got there.",
      "context": "CQRS splits the write model from purpose-built read models, and event sourcing makes the append-only event log the source of truth, deriving state by replay. You gain a permanent audit trail, time-travel queries, and rebuildable projections \u2014 at the price of eventual consistency and added complexity, so you apply it selectively to the bounded contexts (like prior-auth decisions) whose audit and history needs justify it."
    },
    "keyTakeaways": [
      "CQRS separates a write (command) model from read (query) models, connected by events and eventually consistent",
      "Event sourcing stores immutable events as the source of truth and derives current state by replaying them (snapshots optimize this)",
      "Projections build multiple query-optimized read models from the same event stream and can be rebuilt by replaying the log",
      "The patterns add real complexity (eventual consistency, schema evolution) \u2014 use them selectively where audit/history/multi-view needs justify it"
    ]
  },
  {
    "id": "M29",
    "track": "resilience",
    "track_label": "Resilience & Observability",
    "track_color": "#f472b6",
    "level": "Advanced",
    "title": "Circuit Breakers & Retry",
    "subtitle": "Stop a struggling dependency from taking you down: retry the transient, trip on the persistent, and degrade gracefully.",
    "objectives": [
      "Apply resilience patterns to remote calls with Resilience4j",
      "Use a circuit breaker to stop hammering a failing dependency (CLOSED/OPEN/HALF_OPEN)",
      "Combine retry, rate limiter, and time limiter appropriately",
      "Provide fallbacks for graceful degradation instead of hard failure"
    ],
    "intro": "Track 7 connected the prior-auth services; Track 8 keeps them <em>running</em> when things go wrong \u2014 and in a distributed system, things always go wrong. M25 added timeouts so a single slow call to <code>eligibility-service</code> can't hang forever. But that's only the start. What about a transient network blip you should just retry? Or a dependency that's genuinely down, where every call is wasted effort that piles up and cascades? Or protecting a fragile service from being overwhelmed?\n\n<strong>Resilience4j</strong> provides these patterns as Spring annotations. A <strong>retry</strong> re-attempts a call that failed transiently, with backoff. A <strong>circuit breaker</strong> watches the failure rate and, when a dependency is clearly failing, <em>trips</em> \u2014 short-circuiting further calls so you fail fast instead of hammering a service that can't respond, then probes periodically to see if it's recovered. A <strong>rate limiter</strong> caps how fast you call, and a <strong>time limiter</strong> bounds duration. And a <strong>fallback</strong> turns a failure into a degraded-but-useful response.\n\nFor the Prior Authorization Service this is concrete: if <code>eligibility-service</code> is struggling, <code>review</code> should retry a blip, trip the breaker if it's truly down, and fall back to routing the request to <strong>manual review</strong> \u2014 keeping the system responsive instead of failing every decision. These patterns turn inevitable failures into manageable, graceful degradation.",
    "concepts": [
      {
        "title": "Resilience Patterns for Remote Calls",
        "body": "Every cross-service call is a chance for failure, slowness, or overload, and there's a named pattern for each risk. <strong>Retry</strong> handles <em>transient</em> faults \u2014 a dropped packet, a brief blip \u2014 by trying again. <strong>Circuit Breaker</strong> handles a <em>persistently failing</em> dependency by stopping calls to it. <strong>Rate Limiter</strong> caps how many calls you make in a window, protecting a fragile downstream. <strong>Time Limiter</strong> bounds how long an async call may take. <strong>Bulkhead</strong> isolates resources so one slow dependency can't consume all your threads. And <strong>Fallback</strong> supplies an alternative result when the call ultimately fails.\n\n<strong>Resilience4j</strong> (the modern successor to Netflix Hystrix) implements all of these as lightweight, composable decorators, exposed in Spring Boot as annotations like <code>@Retry</code> and <code>@CircuitBreaker</code> plus configuration in <code>application.yml</code>. You pick the patterns a given call needs and layer them; the rest of this module focuses on the two you'll reach for most \u2014 circuit breaker and retry \u2014 plus fallbacks.",
        "visual": "m29-patterns"
      },
      {
        "title": "Circuit Breaker",
        "body": "A <strong>circuit breaker</strong> is a state machine that protects you from a failing dependency. In the <strong>CLOSED</strong> state, calls flow through normally while the breaker tracks the failure rate. If failures exceed a threshold over a window, it trips to <strong>OPEN</strong>: for a configured wait, calls are <em>not</em> attempted at all \u2014 they fail fast (or invoke a fallback) instead of piling up against a service that's clearly down. After the wait, it moves to <strong>HALF_OPEN</strong> and lets a few trial calls through; if they succeed it returns to CLOSED, and if they fail it snaps back to OPEN.\n\nThis is what stops a <strong>cascading failure</strong>. Without it, a down <code>eligibility-service</code> means every <code>review</code> request blocks until timeout, exhausting threads until <code>review</code> falls over too. With it, once the breaker opens, <code>review</code> instantly fails fast (and falls back), staying healthy while eligibility recovers. You apply it by annotating the method and pointing it at a fallback.",
        "visual": "m29-circuit-states",
        "code": "@CircuitBreaker(name = \"eligibility\", fallbackMethod = \"eligibilityFallback\")\npublic Eligibility check(String memberId) {\n    return eligibilityClient.check(memberId);     // real remote call\n}\n\n// same signature + a Throwable; invoked when the call fails or the breaker is OPEN\nprivate Eligibility eligibilityFallback(String memberId, Throwable t) {\n    return Eligibility.unknown();                 // degrade \u2192 route to manual review\n}"
      },
      {
        "title": "Retry, Rate Limiter & Time Limiter",
        "body": "Beyond the breaker, three more patterns earn their place. <strong><code>@Retry</code></strong> re-attempts a call that failed transiently, ideally with <em>exponential backoff</em> so you don't retry instantly into the same problem \u2014 but only for <em>idempotent</em> operations and <em>retryable</em> errors (a 503 or timeout, not a 400). <strong><code>@RateLimiter</code></strong> caps the number of calls you make per window, shielding a fragile dependency (or staying within a partner API quota). <strong><code>@TimeLimiter</code></strong> bounds the duration of an asynchronous call, cancelling it if it overruns.\n\nThese compose, and <strong>order matters</strong>: typically retry wraps the circuit breaker (each retry is a breaker-guarded call), and the breaker counts a retried-and-still-failed call as one failure. Configure them per name in <code>application.yml</code> \u2014 failure thresholds, wait durations, backoff, limits \u2014 so behavior is tunable without code changes. The goal is a call that absorbs blips, backs off under stress, respects limits, and never hangs.",
        "visual": "m29-retry-others",
        "code": "@Retry(name = \"eligibility\")          // re-attempt transient failures (with backoff)\n@CircuitBreaker(name = \"eligibility\", fallbackMethod = \"eligibilityFallback\")\npublic Eligibility check(String memberId) { return eligibilityClient.check(memberId); }\n\n# application.yml \u2014 tune without code changes\nresilience4j.retry.instances.eligibility:\n  max-attempts: 3\n  wait-duration: 200ms\nresilience4j.circuitbreaker.instances.eligibility:\n  failure-rate-threshold: 50\n  wait-duration-in-open-state: 10s"
      },
      {
        "title": "Fallbacks & Graceful Degradation",
        "body": "Resilience isn't only about avoiding failure \u2014 it's about <strong>failing well</strong>. A <strong>fallback</strong> method runs when the primary call fails (or the breaker is open) and returns a sensible degraded result instead of propagating the error. The art is choosing a degradation that keeps the system <em>useful</em>: return cached or last-known data, a safe default, or a result that reroutes the workflow.\n\nFor <code>review</code>, the right fallback when eligibility is unavailable isn't to deny or crash \u2014 it's to mark the authorization for <strong>manual review</strong>, so a human handles what the automated check couldn't. The decision still gets made, just by a different path; the business keeps moving. Good degradation is designed, not accidental: decide, per dependency, what \"reduced service\" looks like and make the fallback express it. Combined with timeouts (M25), retries, and circuit breakers, fallbacks complete the picture \u2014 a service that bends under failure instead of breaking, which is exactly what the tracing and monitoring in the rest of Track 8 will help you observe.",
        "visual": "m29-fallback"
      }

    "subtitle": "Follow one request across every service it touches, and see exactly where the time went.",
    "objectives": [

    ],
    "intro": "A single prior-auth submission no longer runs in one process. It enters the <strong>gateway</strong>, is routed to <strong>intake</strong>, which calls <strong>review</strong>, which calls <strong>eligibility</strong> and publishes a Kafka event that <strong>notification</strong> consumes. When that request is slow, or fails, or behaves oddly, the first question is brutally hard to answer in a microservice system: <em>where?</em> Which hop was slow? Which service threw? Per-service logs each tell a fragment of the story, and correlating them by timestamp across machines is guesswork.\n\n<strong>Distributed tracing</strong> answers that question. It stitches the entire journey of one request into a single <strong>trace</strong> made of timed <strong>spans</strong> \u2014 one span per unit of work in each service \u2014 linked into a parent-child tree. A <strong>trace ID</strong> is generated at the edge and <strong>propagated</strong> to every downstream call (over HTTP headers and message metadata), so every span everywhere is tagged with the same trace. Now you can pull up one request and see its whole path with per-step timing.\n\nIn Spring Boot, <strong>Micrometer Tracing</strong> provides this with almost no code: it auto-instruments incoming requests, outgoing HTTP/messaging, and even puts the trace and span IDs into your logs. Spans are exported to a tracing backend like <strong>Zipkin</strong> (or Tempo/Jaeger), which renders a timeline waterfall where the slow or failed span is immediately visible. Tracing is the observability backbone that makes a distributed system debuggable.",
    "concepts": [
      {
        "title": "The Distributed Debugging Problem",
        "body": "In a monolith, a request's whole life happens in one process, one log, one stack trace \u2014 debugging is local. Decomposition scatters that life across services and machines. A prior-auth submission's journey is now spread over the gateway, intake, review, eligibility, and a Kafka consumer, each logging only its own slice with no inherent link to the others.\n\nWhen something goes wrong, you're left grepping multiple log files, trying to line up timestamps across servers with clock skew, and <em>guessing</em> which service caused the slowness or error. There's no end-to-end view of the request, so you can't see that, say, 90% of the latency was a slow eligibility call, or that the failure originated three hops deep. This loss of a single, coherent view of one request is the core problem distributed tracing exists to solve.",
        "visual": "m30-debug-problem"
      },
      {
        "title": "Traces, Spans & Context Propagation",
        "body": "Two concepts carry tracing. A <strong>span</strong> is a single timed operation \u2014 handling a request, making an outbound call, processing a message \u2014 with a start, a duration, a name, and tags (status, errors). A <strong>trace</strong> is the whole request: a tree of spans linked by parent-child relationships, where one service's outbound span is the parent of the next service's inbound span.\n\nWhat ties them together is <strong>context propagation</strong>. When a request first arrives, a <strong>trace ID</strong> (and a root span ID) is created. On every downstream call, that context is carried along \u2014 injected into HTTP headers (the W3C <code>traceparent</code> header, or B3) and into Kafka message headers \u2014 and the receiving service extracts it and starts a child span under the same trace. Because the trace ID flows everywhere, all spans for one request, across all services, share it and can be assembled into the complete picture. Get propagation right and the trace is whole; miss it on one hop and the trace breaks there.",
        "visual": "m30-trace-spans"
      },
      {
        "title": "Micrometer Tracing in Spring Boot",
        "body": "<strong>Micrometer Tracing</strong> is Spring Boot's tracing facade (the successor to Spring Cloud Sleuth). You add a tracing <em>bridge</em> dependency \u2014 to <strong>Brave</strong> (Zipkin's library) or <strong>OpenTelemetry</strong> \u2014 and a reporter for your backend, and Boot auto-configures the rest. It <strong>instruments automatically</strong>: incoming web requests, outgoing <code>RestClient</code>/<code>WebClient</code> calls, <code>@KafkaListener</code> consumption, scheduled tasks \u2014 each gets a span, and context is propagated across them without you writing tracing code.\n\nTwo practical wins come for free. First, the trace and span IDs are placed in the logging <strong>MDC</strong>, so every log line includes them (the basis for correlating logs and traces in M31). Second, you can add custom spans or tags around specific business operations when the automatic ones aren't granular enough. You configure a <strong>sampling</strong> rate \u2014 trace everything in dev, a percentage in production \u2014 to balance insight against overhead. The instrumentation is the framework's job; you mostly just add dependencies and read the results.",
        "visual": "m30-micrometer",
        "code": "<!-- bridge to a tracer + a reporter -->\n<dependency>\n  <groupId>io.micrometer</groupId>\n  <artifactId>micrometer-tracing-bridge-brave</artifactId>\n</dependency>\n<dependency>\n  <groupId>io.zipkin.reporter2</groupId>\n  <artifactId>zipkin-reporter-brave</artifactId>\n</dependency>\n\n# application.yml\nmanagement:\n  tracing:\n    sampling:\n      probability: 1.0          # trace everything in dev; lower in prod\n# trace/span IDs are auto-added to logs (MDC): [traceId, spanId]"
      },
      {
        "title": "Visualizing with Zipkin / Tempo",
        "body": "Collected spans are exported to a <strong>tracing backend</strong> \u2014 <strong>Zipkin</strong>, Grafana <strong>Tempo</strong>, or <strong>Jaeger</strong> \u2014 which assembles them by trace ID and renders the request as a <strong>waterfall</strong>: each span a horizontal bar on a shared timeline, nested to show parent-child structure, labeled with its service and duration. One glance answers the questions that used to take an hour: the total request time, how it breaks down per service, and exactly which span dominated or errored.\n\nFor the slow prior-auth submission, the waterfall makes it obvious \u2014 the gateway and intake spans are thin, but the eligibility span is a wide bar consuming most of the time, so that's where to look. Error tags mark failed spans in red. Backends also support querying by trace ID (the one in your logs and error responses), by service, or by latency, so you can jump straight from a user-reported slow request to its exact trace. This turns 'the system feels slow' into a precise, evidence-based diagnosis \u2014 and sets up centralized logging (M31) and metrics (M32) to complete the observability story.",
        "visual": "m30-zipkin"
      }
    ],
    "comingFrom": {
      "java": "Debugging a monolith meant one process, one log, one stack trace. Across microservices that became grepping a different log file per service, manually aligning timestamps across machines with clock skew, and guessing which hop caused a slow or failed request \u2014 there was simply no single, end-to-end view of one request's journey, so root-causing latency or errors in a call chain was slow and uncertain.",
      "context": "Distributed tracing reconstructs that single view: a trace ties together the spans from every service a request touches, linked by a trace ID propagated over HTTP and message headers. Micrometer Tracing instruments Spring Boot automatically and injects trace IDs into logs, and a backend like Zipkin renders the request as a timeline waterfall \u2014 so you see exactly where time went and where it failed, turning distributed debugging from guesswork into reading a chart."
    },
    "keyTakeaways": [
      "A request crossing many services has no single log or stack trace; distributed tracing gives one end-to-end view",
      "A trace is a tree of spans (timed operations) linked by a trace ID propagated across services via HTTP/message headers (traceparent/B3)",
      "Micrometer Tracing auto-instruments Spring Boot (web, clients, Kafka) and adds trace/span IDs to logs; you configure a sampling rate",
      "Export spans to Zipkin/Tempo/Jaeger to see a waterfall timeline that pinpoints the slow or failed span"
    ]
